<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Combustible Registrar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        <script>
                            window.onload = function () {
                                var fechaActual = new Date();
                                var dia = String(fechaActual.getDate()).padStart(2, '0');
                                var mes = String(fechaActual.getMonth() + 1).padStart(2, '0');
                                var anio = fechaActual.getFullYear();
                                var fechaFormateada = anio + '-' + mes + '-' + dia;

                                document.getElementById('fecha').max = fechaFormateada;
                            };
                        </script>
                        </head>
                        <body>
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/index}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-8 text-center">
                                        <h4>Registrar Carga</h4>
                                    </div>
                                    <div title="Ir a Ver Cargas" class="col-2 text-center">
                                        <a th:href="@{/combustible/listarChofer/__${idChofer}__}">
                                            <svg id='white' xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-fuel-pump-diesel" viewBox="0 0 16 16">
                                                <path d="M3.5 2a.5.5 0 0 0-.5.5v5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5v-5a.5.5 0 0 0-.5-.5zM4 14V9h1.796q.75 0 1.237.293t.725.85Q8 10.7 8 11.487q0 .792-.242 1.355a1.8 1.8 0 0 1-.732.861Q6.54 14 5.796 14zm1.666-4.194h-.692v3.385h.692q.343 0 .595-.103a1 1 0 0 0 .412-.315q.162-.213.241-.528.084-.314.083-.74 0-.565-.144-.94a1.1 1.1 0 0 0-.436-.569q-.293-.19-.75-.19Z"/>
                                                <path d="M3 0a2 2 0 0 0-2 2v13H.5a.5.5 0 0 0 0 1h11a.5.5 0 0 0 0-1H11v-4a1 1 0 0 1 1 1v.5a1.5 1.5 0 0 0 3 0V8h.5a.5.5 0 0 0 .5-.5V4.324c0-.616 0-1.426-.294-2.081a1.97 1.97 0 0 0-.794-.907Q14.345.999 13.5 1a.5.5 0 0 0 0 1c.436 0 .716.086.9.195a.97.97 0 0 1 .394.458c.147.328.19.746.201 1.222H13.5a.5.5 0 0 0-.5.5V7.5a.5.5 0 0 0 .5.5h.5v4.5a.5.5 0 0 1-1 0V12a2 2 0 0 0-2-2V2a2 2 0 0 0-2-2zm7 2v13H2V2a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1"/>
                                            </svg> <h6 id="icono">Cargas</h6> </a>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2"> 
                                <div class="card border-secondary p-2" id="color-card">
                                    <form id="form" th:action="@{/combustible/registro}" method="POST">

                                        <input hidden th:value="${camion.id}" name="idCamion"> 
                                            <input hidden id="kmAnterior" th:value="${kmAnterior}" name="kmAnterior">
                                                <input type="date" id="fechaAnterior" hidden th:value="${fechaAnterior}">
                                                    <div class="row">
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4  mb-2">
                                                            <label for="idCamion" class="form-floting text-secondary">Camión*</label>
                                                            <select class="form-control" id="idCamion" name="opciones" required onchange="enviarDatos()">
                                                                <option th:text="${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}" th:value="${camion.id}"></option>
                                                                <option th:each="camion : ${camiones}"
                                                                        th:value="${camion.id}"
                                                                        th:text="${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}"/>
                                                            </select>
                                                        </div>
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4  mb-2">
                                                            <label for="idAcoplado" class="form-floting text-secondary">Acoplado*</label>
                                                            <select class="form-control" id="idAcoplado" name="idAcoplado" required>
                                                                <option th:if="${acoplado != null}" th:text="${acoplado.dominio}+' - '+${acoplado.marca}+' '+${acoplado.modelo}" th:value="${acoplado.id}"></option>
                                                                <option th:if="${acoplado == null}" value="" selected disabled >Seleccione Acoplado</option>
                                                                <option th:value=null>Sin Acoplado</option>
                                                                <option th:each="acoplado : ${acoplados}"
                                                                        th:value="${acoplado.id}"
                                                                        th:text="${acoplado.dominio}+' - '+${acoplado.marca}+' '+${acoplado.modelo}"/>
                                                            </select>
                                                        </div>
                                                    </div>
                                                    <div class="row">
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                            <label for="anterior" class="form-floting text-secondary">KM Carga Anterior</label>
                                                            <input type="text" class="form-control" id="anterior" th:value="${#numbers.formatDecimal(kmAnterior, 0, 'POINT', 1, 'COMMA')}" disabled readonly>
                                                        </div>
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                            <label for="fecha" class="form-label text-secondary">Fecha*</label>
                                                            <input type="date" class="form-control" id="fecha" name="fecha" required>
                                                        </div>
                                                    </div>
                                                    <div class="row">
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                            <label for="km" class="form-label text-secondary">KM Carga Actual*</label>
                                                            <div class="input-group">
                                                                <span class="input-group-text">KM</span>
                                                                <input type="number" class="form-control" id="km" placeholder="Ingrese KM" name="km" required oninput="calcularTotalKm(); calcularConsumo()">
                                                            </div>    
                                                        </div>
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4">
                                                            <label for="kmTotal" class="form-label text-secondary">Total KM</label>
                                                            <div class="input-group">
                                                                <span class="input-group-text">km</span>
                                                                <input type="number" step="0.01" class="form-control" id="kmTotal" readonly>
                                                            </div>
                                                        </div>
                                                        <div class="d-none d-sm-block col-lg-4 col-xl-4">
                                                        </div>
                                                    </div>
                                                    <div class="row">
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                            <label for="litros" class="form-label text-secondary">Litros Carga*</label>
                                                            <div class="input-group">
                                                                <span class="input-group-text">Lts</span>
                                                                <input type="number" class="form-control" id="litros" placeholder="Ingrese Litros" name="litro" required oninput="calcularConsumo()">
                                                            </div>    
                                                        </div>
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4">
                                                            <label for="consumo" class="form-label text-secondary">Consumo</label>
                                                            <div class="input-group">
                                                                <span class="input-group-text">Lts</span>
                                                                <input type="number" step="0.01" class="form-control" id="consumo" readonly>
                                                            </div>
                                                        </div>
                                                        <div class="d-none d-sm-block col-lg-4 col-xl-4">
                                                        </div>
                                                    </div>
                                                    <div  class="row">
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-5">
                                                            <label for="completo" class="form-floting text-secondary">Tanque Completo*</label>
                                                            <select class="form-control" id="completo" name="completo" required>
                                                                <option selected disabled value="">Seleccione</option>
                                                                <option value="SI">SI</option>
                                                                <option value="NO">NO</option>
                                                            </select>
                                                        </div>   
                                                        <div th:if="${camion.azul == 'HABILITADO'}" class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-5">
                                                            <label for="azul" class="form-label text-primary">Urea</label>
                                                            <div class="input-group">
                                                                <span class="input-group-text bg-primary">Lts</span>
                                                                <input type="number" class="form-control" id="azul" placeholder="Ingrese Litros" name="azul">
                                                            </div>    
                                                        </div>
                                                    </div>
                                                    <div class="text-center mb-2">
                                                        <button id="registrar" class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Registrar Disel">Registrar</button>
                                                    </div>
                                                    <div class="text-center">
                                                        <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href="@{/index}" title="Cancelar">Cancelar</a>
                                                    </div> 
                                                    </form>
                                                    </div>
                                                    </div>
                                                    <div id="spinner" class="modal" style="display: none;">
                                                        <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                                            <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                                                <span class="sr-only">Cargando...</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <script>
                                                        function enviarDatos() {
                                                            let idCamion = document.getElementById("idCamion").value;

                                                            window.location.href = `/combustible/registrarChofer?idCamion=${idCamion}`;
                                                        }
                                                        function calcularTotalKm() {
                                                            const kmInicial = parseFloat(document.getElementById('kmAnterior').value) || 0;
                                                            const kmFinal = parseFloat(document.getElementById('km').value) || 0;
                                                            const kmTotal = kmFinal - kmInicial;

                                                            document.getElementById('kmTotal').value = kmTotal >= 0 ? kmTotal.toFixed(1) : '';
                                                        }
                                                        function calcularConsumo() {
                                                            const litros = parseFloat(document.getElementById('litros').value) || 0;
                                                            const kmTotal = parseFloat(document.getElementById('kmTotal').value) || 0;

                                                            if (litros > 0 && kmTotal > 0) {

                                                                const consumoPromedio = (100 * litros) / kmTotal;

                                                                document.getElementById('consumo').value = consumoPromedio.toFixed(2);
                                                            } else {

                                                                document.getElementById('consumo').value = '';
                                                            }
                                                        }
                                                        document.getElementById('form').addEventListener('submit', function (event) {
                                                            var fechaAnterior = new Date(document.getElementById('fechaAnterior').value);
                                                            var fechaActual = new Date(document.getElementById('fecha').value);
                                                            const kmAnterior = parseInt(document.getElementById('kmAnterior').value);
                                                            const kmActual = parseInt(document.getElementById('km').value);
                                                            const litros = parseInt(document.getElementById('litros').value);

                                                            if (fechaActual < fechaAnterior) {
                                                                alert('Fecha Seleccionada debe ser mayor a ' + formatearFecha(fechaAnterior));
                                                                event.preventDefault();
                                                                return;
                                                            }
                                                            if (kmActual <= kmAnterior) {
                                                                alert('KM Carga Actual debe ser mayor que KM Carga Anterior: ' + kmAnterior);
                                                                event.preventDefault();
                                                                return;
                                                            }
                                                            if (litros <= 0) {
                                                                alert('Litros debe ser mayor que 0');
                                                                event.preventDefault();
                                                                return;
                                                            }
                                                            
                                                            document.getElementById("spinner").style.display = "block";
                                                            
                                                            function formatearFecha(fecha) {
                                                                var dia = String(fecha.getDate()).padStart(2, '0');
                                                                var mes = String(fecha.getMonth() + 1).padStart(2, '0'); // Los meses empiezan desde 0
                                                                var anio = fecha.getFullYear();
                                                                return dia + '-' + mes + '-' + anio;
                                                            }
                                                        });
                                                    </script>
                                                    
                                                    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                    </body>
                                                    </html>

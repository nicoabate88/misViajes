<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Registrar Masivo</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css"> 
                        <style>
                            .tabla-scroll {
                                max-height: 250px;       /* altura total de unas dos filas */
                                min-height: 250px;       /* fuerza que tenga esa altura aunque esté vacía */
                                overflow-y: auto;        /* agrega scroll vertical si se pasa */
                                border: 1px solid #dee2e6; /* mismo tono de borde bootstrap */
                                border-radius: 0.25rem;
                            }

                            .tabla-scroll table {
                                margin-bottom: 0;
                            }

                            .tabla-scroll thead th {
                                top: 0;
                                background-color: #f8f9fa;
                                z-index: 1;
                            }

                            .tabla-scroll tbody:empty::before {
                                content: "";
                                display: block;
                                height: 250px; 
                            }
                            .btn-eliminar {
                                background: none;
                                border: none;
                                color: red;          /* podés ajustar el color si querés */
                                font-size: 18px;     /* tamaño del ícono */
                                cursor: pointer;
                            }

                            .btn-eliminar:hover {
                                transform: scale(1.2);  /* efecto sutil al pasar el mouse */
                            }
                        </style>
                        </head>
                        <body>
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/documentacion/listarAdmin}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-7 col-sm-7 col-md-7 col-lg-8 col-xl-8 text-center">
                                        <h4>Registrar Documentación</h4>
                                    </div>
                                    <div title="Ir a Registrar por Tipo" class="col-3 col-sm-3 col-md-3 col-lg-2 col-xl-2 text-center">
                                        <a th:href="@{/documentacion/registrarMasivoTipo}">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-justify" viewBox="0 0 16 16">
                                                <path fill-rule="evenodd" d="M2 12.5a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5"/>
                                            </svg>
                                            <h6 id="icono">Por Tipo</h6> </a>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2">  
                                <form id="formulario" th:action="@{/documentacion/registroMasivo}" method="POST">
                                    <div class="card border-secondary p-2 mb-2" id="color-card">
                                        <div class="row">                                                                      
                                            <div class="col-12 col-sm-12 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                <label for="idCamion" class="form-floting text-secondary">Camión*</label>
                                                <select class="form-control text-secondary" id="idCamion" name="idCamion" required>
                                                    <option selected disabled value="">Seleccione Camión</option>
                                                    <option th:each="camion : ${camiones}"
                                                            th:value="${camion.id}"
                                                            th:text="${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}"/>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="row mb-3">
                                            <div class="col-12 col-sm-12 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                <label for="tipoC" class="form-floting text-secondary">Tipo Documentación*</label>
                                                <select class="form-control text-secondary" id="tipoC">
                                                    <option selected disabled value="">Seleccione Tipo</option>
                                                    <option th:each="tipo : ${tiposCamion}"
                                                            th:value="${tipo.id}"
                                                            th:text="${tipo.nombre}"/>
                                                </select>
                                            </div> 
                                            <div class="col-6 col-sm-6 col-md-3 col-lg-2 col-xl-2 mb-2">
                                                <label for="fechaDesdeC" class="form-floting text-secondary">Fecha Desde*</label>
                                                <input type="date" class="form-control text-secondary" id="fechaDesdeC">
                                            </div>
                                            <div class="col-6 col-sm-6 col-md-3 col-lg-2 col-xl-2 mb-2">
                                                <label for="fechaHastaC" class="form-floting text-secondary">Fecha Hasta*</label>
                                                <input type="date" class="form-control text-secondary" id="fechaHastaC">
                                            </div>
                                            <div class="col-10 col-sm-10 col-md-11 col-lg-3 col-xl-3">
                                                <label for="observacionC" class="form-floting text-secondary">Observación</label>
                                                <input type="text" class="form-control text-secondary" id="observacionC" placeholder="Ingrese Observación..." maxlength="30" size="30">
                                            </div>
                                            <div class="form-floating" >
                                                <label class="form-label text-white"></label><br><br>
                                                        <button type="button" class="btn btn-outline-primary border-primary p-1" id="addDocumentacionCamion" title="Agregar Documentación">
                                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-plus-square-fill" viewBox="0 0 16 16">
                                                                <path d="M2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2zm6.5 4.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3a.5.5 0 0 1 1 0"/>
                                                            </svg>
                                                        </button>
                                                        </div>
                                                        </div>
                                                        <div class="row mb-4">
                                                            <div class="col-12">
                                                                <div class="table-responsive tabla-scroll">
                                                                    <table class="table table-sm table-bordered mb-0" id="tablaDocumentacionCamion">
                                                                        <thead class="thead-light">
                                                                            <tr class="text-center">
                                                                                <th>Tipo</th>
                                                                                <th>Fecha Desde</th>
                                                                                <th>Fecha Hasta</th>
                                                                                <th>Observación</th>
                                                                                <th class="text-center" style="width: 50px;">Acción</th>
                                                                            </tr>
                                                                        </thead>
                                                                        <tbody></tbody>
                                                                    </table>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div th:if="${error != null}" class="card bg-secondary mb-2 p-3 border-secondary text-center">                        
                                                            <h6 id="white" th:text="${error}"></h6>                                                                             
                                                        </div>
                                                        <div class="text-center mb-2">
                                                            <button class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Registrar">Registrar</button>
                                                        </div>
                                                        <div class="text-center mb-2">
                                                            <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href="@{/documentacion/listarAdmin}" title="Cancelar">Cancelar</a>
                                                        </div>
                                                        </div>
                                                        </form>
                                                        </div>
                                                        <div id="spinner" class="modal" style="display: none;">
                                                            <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                                                <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                                                    <span class="sr-only">Cargando...</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                        <script>
                                                            let documentacionCamion = [];

                                                            $('#addDocumentacionCamion').click(function () {
                                                                $('#idCamion').prop('disabled', true);

                                                                if ($('#idCamionHidden').length === 0) {
                                                                    $('<input>').attr({
                                                                        type: 'hidden',
                                                                        id: 'idCamionHidden',
                                                                        name: 'idCamion',
                                                                        value: $('#idCamion').val()
                                                                    }).appendTo('form');
                                                                } else {
                                                                    $('#idCamionHidden').val($('#idCamion').val());
                                                                }

                                                                const tipo = $('#tipoC').val();
                                                                const tipoTexto = $('#tipoC option:selected').text();
                                                                const fechaDesde = $('#fechaDesdeC').val();
                                                                const fechaHasta = $('#fechaHastaC').val();
                                                                const observacion = $('#observacionC').val();

                                                                if (!tipo || !fechaDesde || !fechaHasta) {
                                                                    alert("Debe completar todos los campos antes de agregar.");
                                                                    return;
                                                                }

                                                                var fechaAlta = new Date(document.getElementById('fechaDesdeC').value);
                                                                var fechaVencimiento = new Date(document.getElementById('fechaHastaC').value);

                                                                if (fechaVencimiento <= fechaAlta) {
                                                                    alert('Fecha Hasta debe ser mayor que Fecha Desde');
                                                                    event.preventDefault();
                                                                    return;
                                                                }

                                                                // 🔹 Validar si el tipo ya fue agregado para CAMIÓN
                                                                const existe = documentacionCamion.some(d => d.tipoDocumentacion === tipo);
                                                                if (existe) {
                                                                    alert("Ya se ha agregado este tipo de documentación para el camión.");
                                                                    return;
                                                                }

                                                                function formatearFecha(fechaISO) {
                                                                    if (!fechaISO)
                                                                        return "";
                                                                    const partes = fechaISO.split("-"); // ["yyyy", "mm", "dd"]
                                                                    return `${partes[2]}/${partes[1]}/${partes[0]}`; // dd/mm/yyyy
                                                                }

                                                                const fechaDesdeFormateada = formatearFecha(fechaDesde);
                                                                const fechaHastaFormateada = formatearFecha(fechaHasta);

                                                                function corregirFecha(fechaISO) {
                                                                    const fecha = new Date(fechaISO);
                                                                    fecha.setDate(fecha.getDate() + 1);
                                                                    return fecha.toISOString().substring(0, 10); // Devuelve "yyyy-MM-dd"
                                                                }

                                                                const fechaDesdeCorregida = corregirFecha($('#fechaDesdeC').val());
                                                                const fechaHastaCorregida = corregirFecha($('#fechaHastaC').val());

                                                                const documentacion = {
                                                                    tipoDocumentacion: tipo,
                                                                    aplicaA: "CAMION",
                                                                    fechaAlta: fechaDesdeCorregida,
                                                                    fechaVencimiento: fechaHastaCorregida,
                                                                    observacion: observacion,
                                                                    estado: tipoTexto
                                                                };

                                                                documentacionCamion.push(documentacion);

                                                                // Agregar fila visualmente
                                                                const fila = `
<tr class="text-center text-secondary">
<td>${tipoTexto}</td>
<td>${fechaDesdeFormateada}</td>
<td>${fechaHastaFormateada}</td>
<td>${observacion}</td>
<td><button type="button" class="btn-eliminar eliminarFilaCamion">❌</button></td>
</tr>`;
                                                                $('#tablaDocumentacionCamion tbody').append(fila);

                                                                document.getElementById("tipoC").value = "";
                                                                document.getElementById("fechaDesdeC").value = "";
                                                                document.getElementById("fechaHastaC").value = "";
                                                                document.getElementById("observacionC").value = "";

                                                            });

                                                            // Eliminar fila de camión
                                                            $(document).on('click', '.eliminarFilaCamion', function () {
                                                                const index = $(this).closest('tr').index();
                                                                documentacionCamion.splice(index, 1);
                                                                $(this).closest('tr').remove();
                                                            });

                                                            $('#formulario').submit(function (event) {
                                                                // 🔹 Validar que haya al menos un mantenimiento cargado
                                                                if (documentacionCamion.length === 0) {
                                                                    alert("Debe agregar al menos un tipo de documentación antes de enviar el formulario.");
                                                                    event.preventDefault(); // Evita que se envíe
                                                                    return;
                                                                }

                                                                document.getElementById("spinner").style.display = "block";

                                                                // 🔹 Crear inputs ocultos con los JSON para enviar al backend
                                                                $('<input>').attr({
                                                                    type: 'hidden',
                                                                    name: 'documentacionCamionJson',
                                                                    value: JSON.stringify(documentacionCamion)
                                                                }).appendTo('#formulario');
                                                            });
                                                        </script>
                                                        </body>
                                                        </html>

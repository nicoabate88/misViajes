<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Neumatico Registrar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        <script>
                            window.onload = function () {
                                var fechaActual = new Date();
                                var dia = String(fechaActual.getDate()).padStart(2, '0');
                                var mes = String(fechaActual.getMonth() + 1).padStart(2, '0');
                                var anio = fechaActual.getFullYear();
                                var fechaFormateada = anio + '-' + mes + '-' + dia;

                                document.getElementById('fecha').max = fechaFormateada;
                            };
                        </script>
                        </head>
                        <body>
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/neumatico/listarAdmin}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-6 col-sm-6 col-md-6 col-lg-8 col-xl-8 text-center">
                                        <h4>Registrar Neumático</h4>
                                    </div>
                                    <div class="col-2 col-sm-2 col-md-2 col-lg-1 col-xl-1 text-center">
                                        <a href="/neumaticoMarca/listar" title="Ir a Marca">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-arrow-down-right-circle" viewBox="0 0 16 16">
                                                <path fill-rule="evenodd" d="M1 8a7 7 0 1 0 14 0A7 7 0 0 0 1 8m15 0A8 8 0 1 1 0 8a8 8 0 0 1 16 0M5.854 5.146a.5.5 0 1 0-.708.708L9.243 9.95H6.475a.5.5 0 1 0 0 1h3.975a.5.5 0 0 0 .5-.5V6.475a.5.5 0 1 0-1 0v2.768z"/>
                                            </svg> <h6 id="icono">Marca</h6> </a>
                                    </div>
                                    <div class="col-2 col-sm-2 col-md-2 col-lg-1 col-xl-1 text-center">
                                        <a href="/neumaticoProveedor/listar" title="Ir a Marca">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-box-arrow-in-right" viewBox="0 0 16 16">
                                                <path fill-rule="evenodd" d="M6 3.5a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-2a.5.5 0 0 0-1 0v2A1.5 1.5 0 0 0 6.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-8A1.5 1.5 0 0 0 5 3.5v2a.5.5 0 0 0 1 0z"/>
                                                <path fill-rule="evenodd" d="M11.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.708.708L10.293 7.5H1.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
                                            </svg> <h6 id="icono">Proveedor</h6> </a>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2"> 
                                <div class="card border-secondary p-2" id="color-card">
                                    <form th:action="@{/neumatico/registro}" method="POST" onsubmit="return validarCheckboxes()">
                                        <div class="row">
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                <label type="number" step="1" class="form-label text-secondary">N° de Neumático*</label>                                
                                                <input type="text" class="form-control" id="numero" th:value="${numero}" name="numero" required>     
                                            </div>
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                <label for="fecha" class="form-label text-secondary">Fecha de Ingreso*</label>
                                                <input type="date" class="form-control" id="fecha" name="fecha" th:value="${fecha}" required>
                                            </div>
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                <label for="marca" class="form-label text-secondary">Marca*</label>
                                                <select class="form-control text-secondary" id="marca" name="idMarca" required>
                                                    <option th:if="${marca != null}" selected th:text="${marca.marca}" th:value="${marca.id}"></option>
                                                    <option th:if="${marca == null}" selected disabled value="">Seleccione Marca</option>
                                                    <option th:each="marca : ${marcas}" th:value="${marca.id}" th:text="${marca.marca}"/>
                                                </select>
                                            </div>
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                <label for="modelo" class="form-label text-secondary">Modelo*</label>
                                                <input type="text" class="form-control" id="modelo" name="modelo" placeholder="Ingrese Modelo" th:value="${modelo}"
                                                       minlength="1" maxlength="30" size="30" required>
                                            </div>                                       
                                        </div>
                                        <div class="row">    
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                <label for="proveedor" class="form-label text-secondary">Proveedor*</label>
                                                <select class="form-control text-secondary" id="proveedor" name="idProveedor" required>
                                                    <option th:if="${proveedor != null}" selected th:text="${proveedor.nombre}" th:value="${proveedor.id}"></option>
                                                    <option th:if="${proveedor == null}" selected disabled value="">Seleccione Proveedor</option>
                                                    <option th:each="proveedor : ${proveedores}" th:value="${proveedor.id}" th:text="${proveedor.nombre}"/>
                                                </select>
                                            </div>
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                <label for="estado" class="form-floting text-secondary">Estado*</label>
                                                <select class="form-control" id="estado" name="estado" required>
                                                    <option th:if="${estado} != null" selected th:text="${estado}" th:value="${estado}"></option>
                                                    <option th:if="${estado} == null" selected disabled value="">Seleccione Opción</option>
                                                    <option value="NUEVO">NUEVO</option>
                                                    <option value="USADO">USADO</option>
                                                    <option value="RECAPADO">RECAPADO</option>
                                                </select>
                                            </div>
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                <label for="km" class="form-label text-secondary">KM Actual*</label>
                                                <div class="input-group">
                                                    <span class="input-group-text">KM</span>
                                                    <input type="number" step="1" class="form-control" id="km" placeholder="Ingrese KM" 
                                                           th:value="${km}" name="km" required>
                                                </div>    
                                            </div> 
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                <label for="kmEstimado" class="form-label text-secondary">KM Estimado*</label>
                                                <div class="input-group">
                                                    <span class="input-group-text">KM</span>
                                                    <input type="number" step="1" class="form-control" id="kmEstimado" placeholder="Ingrese KM Estimado" 
                                                           th:value="${kmEstimado}" name="kmEstimado" required>
                                                </div>    
                                            </div>
                                        </div>
                                        <div class="mb-2">
                                            <label>Aplica a*</label>
                                            <div th:each="valor : ${aplicaA}">
                                                <input type="checkbox" name="aplicaA" th:value="${valor}" th:id="${valor}"/>
                                                <label th:for="${valor}" th:text="${valor}"></label>
                                            </div>
                                        </div>
                                        <div class="row col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                <label for="cantidad" class="form-label text-secondary">Cantidad*</label>
                                                <div class="input-group">
                                                    <span class="input-group-text text-dark">Cantidad</span>
                                                    <input type="number" step="1" class="form-control" id="cantidad" 
                                                           th:value="${cantidad}" name="cantidad" required>
                                                </div>    
                                        </div> 
                                        <div class="row">    
                                            <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 mb-5">
                                                <label for="obs" class="form-label text-secondary">Observación</label>
                                                <textarea class="form-control text-secondary" id="obs" name="observacion" rows="2" placeholder="Ingrese Observación..." 
                                                          th:value="${observacion}" maxlength="150" size="150"></textarea>
                                            </div> 
                                        </div>    
                                        <div th:if="${error != null}" class="card-body mb-5 text-center border border-secondary rounded" id="mensaje">                        
                                            <h6 id="white" th:text="${error}"></h6>                                                                             
                                        </div>
                                        <br>
                                            <div class="text-center mb-2">
                                                <button class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Registrar Neumático">Registrar</button>
                                            </div>
                                            <div class="text-center">
                                                <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href="@{/neumatico/listarAdmin}" title="Cancelar">Cancelar</a>
                                            </div> 
                                    </form>
                                </div>
                            </div>
                             <div id="spinner" class="modal" style="display: none;">
                                    <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                            <span class="sr-only">Cargando...</span>
                                        </div>
                                    </div>
                                </div>
                            <script>
                                document.getElementById('numero').addEventListener('keydown', function (event) {
                                    if (event.key === '.' || event.key === ',') {
                                        event.preventDefault();
                                    }
                                });

                                document.getElementById('numero').addEventListener('input', function () {
                                    this.value = this.value.replace(/[^0-9]/g, '');
                                });
                                document.getElementById('km').addEventListener('keydown', function (event) {
                                    if (event.key === '.' || event.key === ',') {
                                        event.preventDefault();
                                    }
                                });

                                document.getElementById('km').addEventListener('input', function () {
                                    this.value = this.value.replace(/[^0-9]/g, '');
                                });
                                document.getElementById('kmEstimado').addEventListener('keydown', function (event) {
                                    if (event.key === '.' || event.key === ',') {
                                        event.preventDefault();
                                    }
                                });

                                document.getElementById('kmEstimado').addEventListener('input', function () {
                                    this.value = this.value.replace(/[^0-9]/g, '');
                                });

                                function validarCheckboxes() {

                                    const km = parseInt(document.getElementById('km').value);
                                    const kmEstimado = parseInt(document.getElementById('kmEstimado').value);

                                    if (kmEstimado < km) {
                                        alert('KM Estimado debe debe ser mayor KM Actual');
                                        event.preventDefault();
                                        return;
                                    }

                                    const checkboxes = document.querySelectorAll('input[name="aplicaA"]');
                                    const algunoSeleccionado = Array.from(checkboxes).some(checkbox => checkbox.checked);

                                    if (!algunoSeleccionado) {
                                        alert('Debe seleccionar al menos una opción en "Aplica a".');
                                        return false; // evita el envío del formulario
                                    }
                                    
                                    document.getElementById("spinner").style.display = "block";
                                    
                                    return true; // permite el envío
                                }
                            </script>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Combustible Mostrar Consumo</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">   
                        <style>
                            @media (max-width: 991.98px) {
                                .table {
                                    font-size: 13px;
                                }
                            }
                            @media (max-width: 767.98px) {
                                .table {
                                    font-size: 10px;
                                }
                            }
                        </style>
                        </head>
                        <body>                         
                            <div class="card-header" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/index}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-8 text-center">
                                        <h4>Consumo de Combustible</h4>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2"> 
                                <div class="card-body pb-2">
                                    <h6 th:text="${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}"></h6>
                                    <h6 id="dimgray" th:text="'Consumo '+${consumo}+' L / 100 Km'"></h6>
                                </div>
                                <div th:if="${!cargas.isEmpty()}">
                                    <div class="table-responsive border border-secondary rounded">
                                    <table class="table bg-light table-hover table-sm mb-0" id="dimgray">
                                        <thead>
                                            <tr>
                                                <th class="text-center">Fecha</th>                                         
                                                <th class="text-center">Km Carga</th>
                                                <th class="text-center">Km Recorrido</th>
                                                <th class="text-center">Litros</th>
                                                <th class="text-center">Consumo Carga</th>
                                                <th class="text-center">Consumo Tanque</th>
                                            </tr>
                                        </thead>
                                        <tbody th:each="carga : ${cargas}">
                                            <tr>
                                                <td class="text-center" th:text="${#dates.format(carga.fechaCarga, 'dd-MM-yyyy')}"></td>
                                                <td class="text-center" th:text="${#numbers.formatDecimal(carga.kmCarga, 0, 'POINT', 1, 'COMMA')}"></td>
                                                <td class="text-center" th:text="${#numbers.formatDecimal(carga.kmRecorrido, 0, 'POINT', 1, 'COMMA')}"></td>
                                                <td class="text-center" th:text="${#numbers.formatDecimal(carga.litro, 0, 'POINT', 1, 'COMMA')}"></td>
                                                <th id="dimgray" class="text-center" th:text="${carga.consumo}"></th>
                                                <th id="dimgray" class="text-center" th:text="${carga.consumoPromedio}" th:if="${carga.completo == 'SI'}"></th>

                                            </tr>     
                                        </tbody>
                                    </table>
                                    </div>
                                    <br>
                                        <div class="text-center mb-2">
                                            <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/index}">Volver</a>
                                        </div>
                                </div>
                                <div th:if="${cargas.isEmpty()}">
                                    <div class="card border-secondary p-4 mb-2 text-center" id="color-card">
                                        <h6 id="azul">No existen Cargas de Combustible para mostrar consumo</h6>
                                    </div>
                                    <br>

                                        <div class="text-center mb-2">
                                            <a class="btn btn-primary bg-primary btn-lg w-50" type="button" th:href="@{/index}">Volver</a>
                                        </div>
                                </div>
                            </div>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

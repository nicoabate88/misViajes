<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Camion Registrar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        <script>
                            // JS para agregar un nuevo eje dinámicamente
                            function agregarEje() {
                                const index = document.querySelectorAll('.eje-row').length;
                                const contenedor = document.getElementById('ejesContainer');

                                const nuevaFila = document.createElement('tr');
                                nuevaFila.className = 'eje-row';
                                nuevaFila.innerHTML = `
            <td><input type="hidden" name="ejes[${index}].id" value="">
                <input type="text" class="form-control" name="ejes[${index}].numero" value="" readonly></td>
            <td><input type="text" class="form-control" name="ejes[${index}].nombre" required minlength="1" maxlength="20" size="20"></td>
            <td class="text-center">
                <select class="form-control" name="ejes[${index}].elevable">
                    <option value="false">No</option>
                    <option value="true">Sí</option>
                </select>
            </td>
            <td><input type="number" class="form-control" name="ejes[${index}].porcentaje" min="1" max="100" required></td>
            <td><input type="number" class="form-control" name="ejes[${index}].cantidadNeumatico" min="1" max="4" required></td>
            <td><button type="button" class="btn btn-danger btn-sm" onclick="eliminarFila(this)">Eliminar</button></td>
        `;
                                contenedor.appendChild(nuevaFila);
                            }

                            function eliminarFila(boton) {
                                boton.closest('tr').remove();
                            }
                        </script>
                        </head>
                        <body>
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/camion/listar}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-7 col-sm-7 col-md-7 col-lg-8 col-xl-8 text-center">
                                        <h4>Modificar Camión</h4>
                                    </div>
                                    <div title="Ir a Eliminar Camión" class="col-3 col-sm-3 col-md-3 col-lg-2 col-xl-2 text-center">
                                        <a th:href="@{/camion/eliminar/__${camion.id}__}">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                                                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                                                <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                                            </svg> <h6 id="icono">Eliminar</h6> </a>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2"> 
                                <div class="card border-secondary p-2" id="color-card">
                                    <form id="form" th:action="@{/camion/modifica}" method="POST">
                                        <input hidden th:value="${camion.id}" name="id">
                                            <div class="row">
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                    <label for="dominio" class="form-label text-secondary">Dominio de Camión*</label>                                
                                                    <input type="text" step="0.01" class="form-control" id="dominio" name="dominio" th:value="${camion.dominio}" 
                                                           required minlength="6" maxlength="7" size="7">     
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                    <label for="marca" class="form-label text-secondary">Marca de Camión*</label>
                                                    <input type="text" class="form-control" id="marca" name="marca" th:value="${camion.marca}" 
                                                           required minlength="1" maxlength="30" size="30">
                                                </div>

                                                <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                    <label for="modelo" class="form-label text-secondary">Modelo de Camión*</label>
                                                    <input type="text" class="form-control" id="modelo" name="modelo" th:value="${camion.modelo}" 
                                                           required minlength="1" maxlength="30" size="30">
                                                </div>
                                            </div>
                                            <div class="row">
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                    <label for="estado" class="form-floting text-secondary">Habilitar Camion*</label>
                                                    <select class="form-control" id="estado" name="estado" required>
                                                        <option selected th:text="${camion.estado}" th:value="${camion.estado}"></option>
                                                        <option value="HABILITADO">HABILITADO</option>
                                                        <option value="INHABILITADO">INHABILITADO</option>
                                                    </select>
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                    <label for="azul1" class="form-floting text-secondary">Carga de Urea*</label>
                                                    <select class="form-control" id="azul1" name="azul" required>
                                                        <option selected th:text="${camion.azul}" th:value="${camion.azul}"></option>
                                                        <option value="HABILITADO">HABILITADO</option>
                                                        <option value="INHABILITADO">INHABILITADO</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div class="row">    
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-3">
                                                    <label>Neumático de Auxilio*</label>
                                                    <input type="number" id="auxilio" class="form-control" th:value="${camion.cantidadAuxilio}" name="cantidadAuxilio" 
                                                           min="0" max="5" required>
                                                </div>
                                            </div>    
                                            <h6>Ejes del Camión:</h6>
                                            <table class="table">
                                                <thead class="text-center">
                                                    <tr>
                                                        <th id="dimgray">Número</th>
                                                        <th id="dimgray">Nombre de Eje</th>
                                                        <th id="dimgray">Eje Izable</th>
                                                        <th id="dimgray">Porcentaje de Km</th>
                                                        <th id="dimgray">Cantidad de Neumáticos</th>
                                                        <th id="dimgray">Acciones</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="ejesContainer">
                                                    <tr th:each="eje, iterStat : ${camion.ejes}" class="eje-row">
                                                        <td>
                                                            <input type="hidden" name="ejes[__${iterStat.index}__].id" th:name="'ejes[' + ${iterStat.index} + '].id'" th:value="${eje.id}">
                                                                <input type="text" class="form-control" th:name="'ejes[' + ${iterStat.index} + '].numero'" th:value="${eje.numero}" readonly>
                                                                    </td>
                                                                    <td>
                                                                        <input type="text" class="form-control" th:name="'ejes[' + ${iterStat.index} + '].nombre'" th:value="${eje.nombre}" required>
                                                                    </td>
                                                                    <td class="text-center">
                                                                        <select class="form-control" th:name="'ejes[' + ${iterStat.index} + '].elevable'">
                                                                            <option value="false" th:selected="${!eje.elevable}">No</option>
                                                                            <option value="true" th:selected="${eje.elevable}">Sí</option>
                                                                        </select>
                                                                    </td>
                                                                    <td>
                                                                        <input type="number" class="form-control" th:name="'ejes[' + ${iterStat.index} + '].porcentaje'"
                                                                               th:value="${eje.porcentaje}" min="1" max="100" required>
                                                                    </td>
                                                                    <td>
                                                                        <input type="number" class="form-control" th:name="'ejes[' + ${iterStat.index} + '].cantidadNeumatico'"
                                                                               th:value="${eje.cantidadNeumatico}" min="0" required>
                                                                    </td>
                                                                    <td>
                                                                        <button type="button" class="btn btn-danger btn-sm text-center" onclick="eliminarFila(this)">Eliminar</button>
                                                                    </td>
                                                                    </tr>
                                                                    </tbody>
                                                                    </table>

                                                                    <div class="mb-3">
                                                                        <button type="button" class="btn btn-outline-success" onclick="agregarEje()">Agregar Eje</button>
                                                                    </div>
                                                                    <div class="container">
                                                                        <div th:if="${error != null}" class="card-body mb-5 text-center border border-secondary rounded" id="mensaje">                        
                                                                            <h6 id="white" th:text="${error}"></h6>                                                                             
                                                                        </div>
                                                                    </div>
                                                                    <div class="text-center mb-2">
                                                                        <button class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Modificar Camión">Modificar</button>
                                                                    </div>
                                                                    <div class="text-center">
                                                                        <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href= "@{/camion/listar}" title="Cancelar">Cancelar</a>
                                                                    </div> 
                                                                    </form>
                                                                    </div>
                                                                    </div>
                                                                    <div id="spinner" class="modal" style="display: none;">
                                                                        <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                                                            <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                                                                <span class="sr-only">Cargando...</span>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                    <script>
                                                                        document.getElementById("form").addEventListener("submit", function () {
                                                                            document.getElementById("spinner").style.display = "block";
                                                                        });
                                                                    </script>
                                                                    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                                    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                                    </body>
                                                                    </html>

<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Titular Cheque Listar</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">  

        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">

        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

        <style>

            body{
                background-color:#f4f6f9;
            }

            .card-financiera{
                border:none;
                border-radius:15px;
                overflow:hidden;
            }

            .card-header-financiero{
                background:linear-gradient(135deg,#1e3c72,#2a5298);
                color:white;
                padding:20px;
            }

            .btn-financiero{
                border-radius:10px;
                font-weight:600;
            }

            .tabla-financiera tbody tr:hover{
                background-color:#f8f9fa;
            }

            .nombre-banco{
                font-size:1.05rem;
                font-weight:700;
                color:#1e3c72;
            }

            .badge-estado{
                padding:8px 10px;
                border-radius:8px;
                font-size:0.85rem;
            }

        </style>

    </head>

    <body>

        <div class="container-fluid py-4">

            <!-- HEADER -->

            <div class="card shadow-sm card-financiera mb-4">

                <div class="card-header-financiero">

                    <div class="d-flex justify-content-between align-items-center row">

                        <div class="col-12 col-md-6 mt-3 mt-md-0">

                            <h3 class="font-weight-bold mb-1">
                                Módulo de Titular Cheque
                            </h3>

                            <p class="mb-0" style="opacity:0.85;">
                                Administración de titulares
                            </p>

                        </div>

                        <div class="col-12 col-md-6 text-md-right mt-3 mt-md-0">

                            <div class="d-flex flex-column flex-md-row justify-content-md-end">

                                <a href="/titularCheque/registrar-titular"
                                   class="btn btn-primary btn-financiero mb-2 mb-md-0 mr-md-2">

                                    <i class="bi bi-plus-circle mr-1"></i>

                                    Nuevo Titular

                                </a>

                                <a href="/cheque/registrar-cheque"
                                   class="btn btn-secondary btn-financiero">

                                    <i class="bi bi-arrow-left mr-1"></i>

                                    Volver

                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- RESUMEN -->

            <div class="row mb-4">

                <div class="col-md-4 mb-3">

                    <div class="card border-0 shadow-sm h-100 card-financiera">

                        <div class="card-body">

                            <div class="text-muted small mb-2">
                                Total Titulares
                            </div>

                            <h3 class="font-weight-bold mb-0"
                                th:text="${#lists.size(lista)}">
                                0
                            </h3>

                        </div>

                    </div>

                </div>

            </div>

            <!-- TABLA -->

            <div class="card border-0 shadow-sm card-financiera">

                <div class="card-body">

                    <div class="table-responsive">

                        <table class="table table-hover align-middle tabla-financiera">

                            <thead class="thead-light">

                                <tr>

                                    <th>Titular</th>

                                    <th>Estado</th>

                                    <th class="text-center">
                                        Acción
                                    </th>

                                </tr>

                            </thead>

                            <tbody>

                                <tr th:each="t : ${lista}">

                                    <!-- NOMBRE -->

                                    <td>

                                        <span class="nombre-banco"
                                              th:text="${t.nombre}">
                                            Titular
                                        </span>

                                    </td>

                                    <!-- ESTADO -->

                                    <td>

                                        <span th:if="${t.estado.name() == 'HABILITADA'}"
                                              class="badge badge-success badge-estado">

                                            HABILITADA

                                        </span>

                                        <span th:if="${t.estado.name() == 'INHABILITADA'}"
                                              class="badge badge-danger badge-estado">

                                            INHABILITADA

                                        </span>

                                    </td>

                                    <!-- ACCIONES -->

                                    <td class="text-center">

                                        <a th:href="@{/titularCheque/modificar-titular/{id}(id=${t.id})}"
                                           class="btn btn-sm btn-outline-primary"
                                           title="Modificar Titular">

                                            <i class="bi bi-pencil-square"></i>

                                        </a>

                                    </td>

                                </tr>

                                <!-- SIN DATOS -->

                                <tr th:if="${#lists.isEmpty(lista)}">

                                    <td colspan="4"
                                        class="text-center text-muted py-5">

                                        No existen titulares registrados.

                                    </td>

                                </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>
        
         <div class="modal fade"
             id="modalExito"
             tabindex="-1"
             aria-labelledby="modalExitoLabel"
             aria-hidden="true">

            <div class="modal-dialog modal-dialog-centered">

                <div class="modal-content border-0 shadow">

                    <div class="modal-header text-white"
                         style="background:linear-gradient(135deg,#1e3c72,#2a5298);">

                        <h5 class="modal-title"
                            id="modalExitoLabel">

                            Operación Exitosa

                        </h5>

                    </div>

                    <div class="modal-body text-center py-4">

                        <i class="bi bi-check-circle-fill text-success"
                           style="font-size:4rem;">
                        </i>

                        <p class="mt-3 mb-0 font-weight-bold"
                           th:text="${exito}">

                            Operación realizada correctamente.

                        </p>

                    </div>

                    <div class="modal-footer justify-content-center border-0">

                        <button type="button"
                                class="btn btn-primary btn-financiero"
                                data-dismiss="modal">

                            Aceptar

                        </button>

                    </div>

                </div>

            </div>

        </div>


        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
        
        <script th:if="${exito != null}">

            $(document).ready(function () {

            $('#modalExito').modal('show');

            });

        </script>

    </body>

</html>

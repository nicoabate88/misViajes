<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Chofer Estadistica</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">   
                        <style>

                            .fila-alta {
                                height: 50px;
                            }

                            /* Estilo para pantallas md */
                            @media (max-width: 991.98px) {
                                .table {
                                    font-size: 13px;
                                    .fila-alta {
                                        height: 35px;
                                    }
                                }
                            }
                            /* Estilo para pantallas sm */
                            @media (max-width: 767.98px) {
                                .table {
                                    font-size: 10px;
                                }
                                .fila-alta {
                                    height: 35px;
                                }
                            }
                        </style>
                        </head>
                        <body>                       
                            <div class="card-header" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a id="volver1" title="Volver" th:href="@{/chofer/mostrarEstadistica}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-7 col-sm-7 col-md-8 col-lg-8 col-xl-8 text-center">
                                        <h4>Estadísticas de Chofer</h4>
                                    </div>
                                    <div title="Exportar a Excel" class="col-3 col-sm-3 col-md-2 col-lg-2 col-xl-2 text-center" th:if="${flag == true}">
                                        <form th:action="@{/chofer/estadisticaExportar}" method="POST">
                                            <input hidden th:value="${desde}" name="desde"> 
                                                <input hidden th:value="${hasta}" name="hasta"> 
                                                    <input hidden th:value="${chofer.id}" name="id">     
                                                        <button id="exportar" class="btn btn-light" type="submit">
                                                            <h6 id="icono">Exportar</h6> 
                                                        </button>
                                                        </form>
                                                        </div>
                                                        </div>
                                                        </div>
                                                        <div class="container mb-2"> 
                                                            <div class="card-header pb-0" id="bgWhite">
                                                                <form class="row" th:action="@{/chofer/estadisticaFiltro}" method="POST">
                                                                    <input hidden th:value="${chofer.id}" name="idChofer">  

                                                                        <div class="col-5 col-sm-5 col-md-5 col-lg-3 col-xl-3">
                                                                            <label for="desde" class="form-label">Desde</label>
                                                                            <input type="date" class="form-control border-secondary" id="desde" th:value="${desde}" name="desde" required>
                                                                        </div>
                                                                        <div class="col-5 col-sm-5 col-md-5 col-lg-3 col-xl-3">
                                                                            <label for="hasta" class="form-label">Hasta</label>
                                                                            <input type="date" class="form-control border-secondary" id="hasta" th:value="${hasta}" name="hasta" required>                                                                                              
                                                                        </div>
                                                                        <div class="col-2 col-sm-2 col-md-1 col-lg-1 col-xl-1 text-center">
                                                                            <label for="ver" class="form-label">Ver</label>
                                                                            <button id="ver" class="btn btn-primary" type="submit">
                                                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="24" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                                                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                                                </svg>
                                                                            </button>
                                                                        </div>

                                                                </form>   
                                                            </div>
                                                            <div th:if="${estadistica.size > 1}">
                                                                <div class="card-body p-2">
                                                                    <h6 class="text-dark" th:text="${chofer.nombre}"></h6>
                                                                </div>
                                                                <div class="table-responsive border border-secondary rounded">
                                                                    <table class="table table-md bg-light table-hover mb-0" id="dimgray">
                                                                        <thead>
                                                                            <tr>
                                                                                <th class="text-center">Año</th>
                                                                                <th class="text-center">Mes</th>
                                                                                <th class="text-center">Viajes</th>
                                                                                <th class="text-center">KM</th>
                                                                                <th class="text-center">Diesel</th>
                                                                                <th class="text-center">Consumo</th>
                                                                                <th class="text-center">Gastos</th>
                                                                                <th class="text-center">Neto</th>
                                                                                <th class="text-center">Neto/Km</th>  
                                                                            </tr>
                                                                        </thead>
                                                                        <tbody th:each="e, iter : ${estadistica}">
                                                                            <tr class="fila-alta" th:classappend="${iter.last} ? 'font-weight-bold bg-light' : ''">
                                                                                <td class="text-center" th:text="${iter.last} ? 'TOTAL' : ${e.year}"></td>
                                                                                <td class="text-center" th:text="${iter.last} ? '' : ${e.month}"></td>
                                                                                <td class="text-center" th:text="${#numbers.formatDecimal(e.flete, 0, 'POINT', 0, 'POINT')}"></td>
                                                                                <td class="text-center" th:text="${#numbers.formatDecimal(e.kmRecorrido, 0, 'POINT', 0, 'POINT')}"></td>
                                                                                <td class="text-center" th:text="${#numbers.formatDecimal(e.litro, 0, 'POINT', 0, 'POINT')}"></td>
                                                                                <td class="text-center" th:text="${#numbers.formatDecimal(e.consumo, 1, 'POINT', 1, 'POINT')}"></td>
                                                                                <td class="text-center" th:text="'$'+${#numbers.formatDecimal(e.gasto, 0, 'POINT', 0, 'POINT')}"></td>
                                                                                <td class="text-center" th:text="'$'+${#numbers.formatDecimal(e.neto, 0, 'POINT', 0, 'POINT')}"></td>
                                                                                <td class="text-center" th:text="'$'+${#numbers.formatDecimal(e.rentabilidad, 0, 'POINT', 0, 'POINT')}"></td>
                                                                            </tr>     
                                                                        </tbody>
                                                                    </table>
                                                                </div>
                                                                <br>
                                                                    <div class="text-center mb-2">
                                                                        <a id="volver2" class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/chofer/mostrarEstadistica}">Volver</a>
                                                                    </div>
                                                            </div>
                                                            <div th:if="${estadistica.size <= 1}">
                                                                <br>
                                                                    <div class="card border-secondary p-4 mb-2 text-center" id="color-card">
                                                                        <h6 id="azul">No existen Estadísticas de Chofer para la fecha seleccionada</h6>
                                                                    </div>
                                                                    <br>
                                                                        <div class="text-center mb-2">
                                                                            <a id="volver3" class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/chofer/mostrarEstadistica}">Volver</a>
                                                                        </div>
                                                                        </div>
                                                                        <div id="spinner" class="modal" style="display: none;">
                                                                            <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                                                                <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                                                                    <span class="sr-only">Cargando...</span>
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                        </div>
                                                                        <script>
                                                                            document.addEventListener("DOMContentLoaded", function () {
                                                                                const volverBtn = document.getElementById("exportar");
                                                                                volverBtn.addEventListener("click", function (e) {
                                                                                    // Mostrar spinner
                                                                                    document.getElementById("spinner").style.display = "block";
                                                                                });
                                                                            });
                                                                            document.addEventListener("DOMContentLoaded", function () {
                                                                                const volverBtn = document.getElementById("ver");
                                                                                volverBtn.addEventListener("click", function (e) {
                                                                                    // Mostrar spinner
                                                                                    document.getElementById("spinner").style.display = "block";
                                                                                });
                                                                            });
                                                                            document.addEventListener("DOMContentLoaded", function () {
                                                                                const volverBtn = document.getElementById("volver1");
                                                                                volverBtn.addEventListener("click", function (e) {
                                                                                    // Mostrar spinner
                                                                                    document.getElementById("spinner").style.display = "block";
                                                                                });
                                                                            });
                                                                            document.addEventListener("DOMContentLoaded", function () {
                                                                                const volverBtn = document.getElementById("volver2");
                                                                                volverBtn.addEventListener("click", function (e) {
                                                                                    // Mostrar spinner
                                                                                    document.getElementById("spinner").style.display = "block";
                                                                                });
                                                                            });
                                                                            document.addEventListener("DOMContentLoaded", function () {
                                                                                const volverBtn = document.getElementById("volver3");
                                                                                volverBtn.addEventListener("click", function (e) {
                                                                                    // Mostrar spinner
                                                                                    document.getElementById("spinner").style.display = "block";
                                                                                });
                                                                            });
                                                                        </script>
                                                                        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                                        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                                        </body>
                                                                        </html>

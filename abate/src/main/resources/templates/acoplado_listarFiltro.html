<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Acoplado Listar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">   
                        </head>
                        <body>  
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2">   
                                        <a title="Volver" th:href="@{/acoplado/listar}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-7 col-sm-7 col-md-7 col-lg-8 col-xl-8 text-center">
                                        <h4>Lista de Acoplados</h4>
                                    </div>
                                    <div title="Ir a Registrar Acoplado" class="col-3 col-sm-3 col-md-3 col-lg-2 col-xl-2 text-center">
                                        <a th:href="@{/acoplado/registrar}">
                                            <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="18" height="18" viewBox="0 0 512 512" style="enable-background:new 0 0 512 512;" xml:space="preserve"><g><g><path d="M512,121H0v188.333h60V361H30v30h60v-81.667h30V361h154.58c6.192,17.458,22.865,30,42.42,30 c11.517,0,22.032-4.354,30-11.495c7.968,7.142,18.483,11.495,30,11.495c11.517,0,22.032-4.354,30-11.495 c7.968,7.142,18.483,11.495,30,11.495c24.813,0,45-20.187,45-45c0-15.114-7.498-28.502-18.961-36.667H512V121z M272,331H150 v-21.667h122V331z M317,361c-8.271,0-15-6.729-15-15s6.729-15,15-15s15,6.729,15,15S325.271,361,317,361z M377,361 c-8.271,0-15-6.729-15-15s6.729-15,15-15s15,6.729,15,15S385.271,361,377,361z M437,361c-8.271,0-15-6.729-15-15s6.729-15,15-15 s15,6.729,15,15S445.271,361,437,361z M482,279.333H30V151h452V279.333z" fill="#000000" style="fill: rgb(255, 255, 255);"></path></g></g></svg>
                                            <h6 id="icono">Nuevo</h6> </a>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2">
                                <div th:if="${exito != null}" class="card-body mb-2 text-center border border-secondary rounded" id="mensaje">                        
                                    <h6 id="white" th:text="${exito}"></h6>                                                                             
                                </div>
                                <div class="card-header pb-0" id="bgWhite">
                                    <form class="row" th:action="@{/acoplado/listarFiltro}" method="GET">
                                        <div class="col-10 col-sm-10 col-md-10 col-lg-5 col-xl-5 mb-2">
                                            <label for="camion" class="form-floting">Acoplado</label>  
                                            <select class="form-control border-secondary" id="camion" name="id">
                                                <option selected th:text="${acoplado.dominio}+' - '+${acoplado.marca}+' '+${acoplado.modelo}"></option>
                                                <option th:value=null>Todos</option>
                                                <option th:each="acoplado : ${acoplados}"
                                                        th:value="${acoplado.id}"
                                                        th:text="${acoplado.dominio}+' - '+${acoplado.marca}+' '+${acoplado.modelo}"/>
                                            </select>
                                        </div>
                                        <div class="col-1 text-center">
                                            <label for="ver" class="form-floting">Ver</label> 
                                            <button id="ver"  class="btn btn-primary" type="submit">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="24" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                </svg>
                                            </button>
                                        </div>
                                    </form>   
                                </div>
                                <div class="card border-secondary p-3 mb-1" id="color-card">
                                    <h6 th:text="'Dominio '+${acoplado.dominio}"></h6>
                                    <div class="row">
                                        <div class="col-8">                                                
                                            <h6 id="dimgray" th:text="'Marca '+${acoplado.marca}+' Modelo '+${acoplado.modelo}"></h6>
                                            <h6 class='mb-2' id="dimgray" th:text="'Estado '+${acoplado.estado}"></h6>
                                            <p th:if="${acoplado.cantidadAuxilio != 0}" id="dimgray" class="mb-2" th:text="'Neumáticos de Auxilio '+${acoplado.cantidadAuxilio}"></p>
                                            <p th:if="${acoplado.cantidadAuxilio == 0}" id="dimgray" class="mb-2" th:text="'Neumáticos de Auxilio (sin auxilio)'"></p>
                                            <h6 class="mb-1 text-dark" th:text="'➖ Ejes del Acoplado ➖ '"></h6>
                                            
                                        </div>
                                        <div title="Ir a Modificar Acoplado" class="col-4 text-center">
                                            <a th:href= "@{/acoplado/modificar/__${acoplado.id}__}">
                                                <svg id="modificar" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                                                    <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                                                </svg>     <p id="modificar">Modificar</p>
                                            </a>
                                        </div>
                                    </div> 
                                    <div class="table-responsive">
                                                <table class="table table-borderless table-hover table-sm">
                                                    <thead>
                                                        <tr id="darkblue" class="text-center">
                                                            <td></td>
                                                            <td>Número</td>
                                                            <td>Nombre</td>
                                                            <td>Izable</td>
                                                            <td>% de Km</td>
                                                            <td>Cantidad de Neumáticos</td> 
                                                            <td></td>
                                                        </tr>
                                                    </thead>
                                                    <tbody class="text-center" th:each="eje : ${acoplado.ejes}">
                                                        <tr id="dimgray">
                                                            <td></td>
                                                            <td th:text="${eje.numero}"></td>
                                                            <td th:text="${eje.nombre}"></td>
                                                            <td th:text="${eje.elevable} ? 'Sí' : 'No'"></td>
                                                            <td th:text="${eje.porcentaje}"></td>
                                                            <td th:text="${eje.cantidadNeumatico}"></td>
                                                            <th></th>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                </div>  

                                <br>
                                    <div class="text-center mb-2">
                                        <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Ir a Registrar Acoplado" th:href="@{/acoplado/registrar}">Nuevo</a>
                                    </div>
                                    <div class="text-center mb-2">
                                        <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/acoplado/listar}">Volver</a>
                                    </div>
                            </div>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

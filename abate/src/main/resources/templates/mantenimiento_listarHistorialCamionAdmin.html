<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Camiones Hisotorial</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
                        <link rel="stylesheet" href="/css/medidas_container.css">   
                            <style>

                                /* Estilo para pantallas md */
                                @media (max-width: 991.98px) {
                                    .table {
                                        font-size: 13px;
                                    }
                                    .text-dark {
                                        font-size: 13px;
                                    }
                                }
                                /* Estilo para pantallas sm */
                                @media (max-width: 767.98px) {
                                    .table {
                                        font-size: 10px;
                                    }
                                    .text-dark {
                                        font-size: 13px;
                                    }
                                }
                                .text-green {
                                    color: green;
                                    font-size: 1.2em;
                                }

                                .text-yellow {
                                    color: orange;
                                    font-size: 1.2em;
                                }

                                .text-red {
                                    color: red;
                                    font-size: 1.2em;
                                }
                            </style>
                            </head>
                            <body>                        
                                <div class="card-header mb-4" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">    
                                            <form th:action="@{/mantenimiento/listarAdminCamionFiltro}" method="POST">
                                                <input hidden th:value="${idCamion}" name="idCamion">
                                                    <input hidden th:value="${idTipo}" name="idTipo">
                                                        <input hidden th:value="${clase}" name="clase">
                                                            <button type="submit" class="border-0 bg-transparent shadow-none" title="Volver">
                                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                                </svg> 
                                                            </button>
                                                            </form>
                                                            </div>
                                                            <div  class="col-6 col-sm-6 col-md-7 col-lg-8 col-xl-8 text-center" th:if="${flag == true}">
                                                                <h4>Historial Mantenimientos</h4>
                                                            </div>
                                                            <div  class="col-8 text-center" th:if="${flag != true}">
                                                                <h4>Historial Mantenimientos</h4>
                                                            </div>
                                                            <div class="col-2 col-sm-2 col-md-1 col-lg-1 col-xl-1 text-center" th:if="${flag == true}">
                                                                <form>
                                                                    <button id="exportButton" onclick="startExport(event)" class="btn btn-light" type="button">
                                                                        <input hidden id="idCamion" th:value="${idCamion}" name="idCamion">
                                                                            <h6 id="icono">Excel</h6>
                                                                    </button>
                                                                </form>
                                                            </div>
                                                            <div class="col-2 col-sm-2 col-md-2 col-lg-1 col-xl-1 text-center" th:if="${flag == true}">
                                                                <a title="Ir a Imprimir Mantenimiento" target="_blank" th:href="@{/mantenimiento/imprimirHistorialCamion(idCamion=${idCamion}, tipo=${tipoId})}" >
                                                                    <svg id="imprimirExporta" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-printer" viewBox="0 0 16 16">
                                                                        <path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1"/>
                                                                        <path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1h1a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1V3a2 2 0 0 0-2-2zM4 3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2H4zm1 5a2 2 0 0 0-2 2v1H2a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v-1a2 2 0 0 0-2-2zm7 2v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1"/>
                                                                    </svg><p id="imprimirExporta">Imprimir</p>
                                                                </a>
                                                            </div>
                                                            </div>
                                                            </div>
                                                            <div class="container mb-2">  
                                                                <div id="loadingModalExport" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); color: white; text-align: center; z-index: 1000;">
                                                                    <div style="margin-top: 20%; font-size: 20px;">
                                                                        <div class="spinner" style="margin-bottom: 20px;">
                                                                            <svg viewBox="0 0 50 50" style="width: 50px; height: 50px;">
                                                                                <circle cx="25" cy="25" r="20" fill="none" stroke-width="5" stroke="#fff" stroke-dasharray="31.4 31.4" stroke-linecap="round">
                                                                                    <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite" />
                                                                                </circle>
                                                                            </svg>
                                                                        </div>
                                                                        Exportando... Por favor, espere.
                                                                    </div>
                                                                </div>  
                                                                <div class="row">
                                                                    <div class="mb-2 p-2">
                                                                        <h6><strong class="text-dark" th:text="'☑ Camión '+${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}"></strong></h6>     
                                                                    </div>
                                                                </div>
                                                                <form id="form" th:action="@{/mantenimiento/listarHistorialCamionAdminFiltro}" method="POST">
                                                                    <input hidden th:value="${idCamion}" name="idCamion">
                                                                        <input hidden th:value="${clase}" name="clase">
                                                                            <div class="row">
                                                                                <div class="col-10 col-sm-10 col-md-5 col-lg-5 col-xl-5 pb-3">
                                                                                    <label for="idTipo" class="form-floting text-secondary">Tipo de Mantenimiento</label>
                                                                                    <select class="form-control text-secondary border-secondary" id="tipo" name="tipo">
                                                                                        <option th:if="${tipo == null && seleccioneT != null}" value="" selected disabled>Seleccione Tipo de Mantenimiento</option>
                                                                                        <option th:if="${tipo != null}" selected th:value="${tipo.id}" th:text="${tipo.nombre}"></option>
                                                                                        <option th:if="${tipo == null && seleccioneT == null}" selected value="">TODOS</option>
                                                                                        <option value="">TODOS</option>
                                                                                        <option th:each="tipo : ${tipos}"
                                                                                                th:value="${tipo.id}"
                                                                                                th:text="${tipo.nombre}"/>
                                                                                    </select>
                                                                                </div>
                                                                                <div class="col-2 col-sm-2 col-md-1 col-lg-1 col-xl-1 text-center">
                                                                                    <label for="ver" class="form-floting">Ver</label> 
                                                                                    <button id="ver"  class="btn btn-primary" type="submit">
                                                                                        <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="24" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                                                            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                                                        </svg>
                                                                                    </button>
                                                                                </div>
                                                                            </div>
                                                                            </form>
                                                                            </div>
                                                                            <div th:if="${mantenimientos.size >= 1}" class="row justify-content-center">
                                                                                <div th:each="entry : ${mantenimientos}" class="col-12 col-lg-10 px-3 px-md-4 px-lg-3 mb-4">
                                                                                    <h6 class="text-dark p-1 text-center"><strong th:text="${entry.key}"></strong></h6> 
                                                                                    <div class="table-responsive border border-secondary rounded">
                                                                                        <table class="table border bg-light table-hover table-sm mb-0" id="dimgray">
                                                                                            <thead>
                                                                                                <tr>
                                                                                                    <th class="text-center">Fecha Mantenimiento</th>
                                                                                                    <th class="text-center">Km Mantenimiento</th>
                                                                                                    <th class="text-center">Fecha Actualizado</th>
                                                                                                    <th class="text-center">Km Actualizado</th>
                                                                                                    <th class="text-center">Km Recorrido</th>
                                                                                                    <th class="text-center">Observación</th>
                                                                                                </tr>
                                                                                            </thead>
                                                                                            <tbody>
                                                                                                <tr th:each="mantenimiento : ${entry.value}">
                                                                                                    <td class="text-center" th:text="${#dates.format(mantenimiento.fecha, 'dd-MM-yyyy')}"></td>
                                                                                                    <td class="text-center" th:text="${#numbers.formatDecimal(mantenimiento.km, 0, 'POINT', 0, 'POINT')}"></td>
                                                                                                    <td class="text-center" th:text="${#dates.format(mantenimiento.fechaActualizado, 'dd-MM-yyyy')}"></td>
                                                                                                    <td class="text-center" th:text="${#numbers.formatDecimal(mantenimiento.kmActual, 0, 'POINT', 0, 'POINT')}"></td>
                                                                                                    <th class="text-center text-primary" th:text="${#numbers.formatDecimal(mantenimiento.kmVigencia, 0, 'POINT', 0, 'POINT')}"></th>
                                                                                                    <td class="text-center"><span th:text="${#strings.length(mantenimiento.observacion) > 20 ? #strings.substring(mantenimiento.observacion, 0, 20) + '...' : mantenimiento.observacion}"></span>
                                                                                                        <a href="#" th:if="${#strings.length(mantenimiento.observacion) > 20}" 
                                                                                                           th:attr="data-observacion=${mantenimiento.observacion}" 
                                                                                                           class="text-primary ver-mas">Ver</a>
                                                                                                    </td>
                                                                                                </tr>
                                                                                            </tbody>
                                                                                        </table>
                                                                                    </div>
                                                                                </div>
                                                                            </div>
                                                                            <div th:if="${mantenimientos.size >= 1}" class="container">

                                                                                <div class="text-center">
                                                                                    <form th:action="@{/mantenimiento/listarAdminCamionFiltro}" method="POST">
                                                                                        <input hidden th:value="${idCamion}" name="idCamion">
                                                                                            <input hidden th:value="${idTipo}" name="idTipo">
                                                                                                <input hidden th:value="${clase}" name="clase">
                                                                                                    <button title="Volver" type="submit" class="btn btn-primary bg-primary btn-lg w-50">Volver</button>
                                                                                                    </form>
                                                                                                    </div>
                                                                                                    </div>
                                                                                                    <div th:if="${mantenimientos.size < 1}" class="container">
                                                                                                        <br>
                                                                                                            <div class="card border-secondary p-4 mb-2 text-center" id="color-card">
                                                                                                                <h6 id="azul">No existe Historial de Mantenimientos para mostrar</h6>
                                                                                                            </div>
                                                                                                            <br>
                                                                                                                <div class="text-center">
                                                                                                                    <form th:action="@{/mantenimiento/listarAdminCamionFiltro}" method="POST">
                                                                                                                        <input hidden th:value="${idCamion}" name="idCamion">
                                                                                                                            <input hidden th:value="${idTipo}" name="idTipo">
                                                                                                                                <input hidden th:value="${clase}" name="clase">
                                                                                                                                    <button title="Volver" type="submit" class="btn btn-primary bg-primary btn-lg w-50">Volver</button>
                                                                                                                                    </form>
                                                                                                                                    </div>
                                                                                                                                    </div>

                                                                                                                                    <script>

                                                                                                                                        document.addEventListener("DOMContentLoaded", function () {
                                                                                                                                        document.querySelectorAll(".ver-mas").forEach(function (link) {
                                                                                                                                        link.addEventListener("click", function (event) {
                                                                                                                                        event.preventDefault();

                                                                                                                                        let observacionCompleta = this.getAttribute("data-observacion");

                                                                                                                                        let observacionBox = document.getElementById("observacion-box");
                                                                                                                                        if (!observacionBox) {
                                                                                                                                        observacionBox = document.createElement("div");
                                                                                                                                        observacionBox.id = "observacion-box";
                                                                                                                                        observacionBox.style.position = "fixed";
                                                                                                                                        observacionBox.style.top = "50%";
                                                                                                                                        observacionBox.style.left = "50%";
                                                                                                                                        observacionBox.style.transform = "translate(-50%, -50%)";
                                                                                                                                        observacionBox.style.background = "#fff";
                                                                                                                                        observacionBox.style.padding = "20px";
                                                                                                                                        observacionBox.style.boxShadow = "0px 0px 10px rgba(0,0,0,0.3)";
                                                                                                                                        observacionBox.style.borderRadius = "10px";
                                                                                                                                        observacionBox.style.zIndex = "1000";
                                                                                                                                        observacionBox.style.maxWidth = "400px";
                                                                                                                                        observacionBox.style.textAlign = "center";
                                                                                                                                        document.body.appendChild(observacionBox);
                                                                                                                                        }

                                                                                                                                        observacionBox.innerHTML = `
                                                                                                                                        <p>${observacionCompleta}</p>
                                                                                                                                        <button onclick="document.getElementById('observacion-box').remove()" class="btn btn-danger btn-sm">Cerrar</button>
                                                                                                                                        `;
                                                                                                                                        });
                                                                                                                                        });
                                                                                                                                        });
                                                                                                                                    </script>
                                                                                                                                    <script>
                                                                                                                                        function startExport(event) {
                                                                                                                                        event.preventDefault();

                                                                                                                                        const modal = document.getElementById('loadingModalExport');
                                                                                                                                        modal.style.display = 'block';

                                                                                                                                        const idCamion = document.getElementById('idCamion').value;
                                                                                                                                        const tipo = document.getElementById('tipo').value;

                                                                                                                                        const url = `/mantenimiento/exportaHistorialCamion?idCamion=${idCamion}&tipo=${tipo}`;

                                                                                                                                        fetch(url, {method: 'POST'})
                                                                                                                                        .then(response => {
                                                                                                                                        const contentDisposition = response.headers.get('Content-Disposition');
                                                                                                                                        let fileName = 'exportacion.xlsx';

                                                                                                                                        if (contentDisposition) {
                                                                                                                                        const match = contentDisposition.match(/filename="?([^"]+)"?/);
                                                                                                                                        if (match && match[1]) {
                                                                                                                                        fileName = match[1];
                                                                                                                                        }
                                                                                                                                        }

                                                                                                                                        return response.blob().then(blob => ({blob, fileName}));
                                                                                                                                        })
                                                                                                                                        .then(({ blob, fileName }) => {
                                                                                                                                        const downloadUrl = window.URL.createObjectURL(blob);
                                                                                                                                        const a = document.createElement('a');
                                                                                                                                        a.href = downloadUrl;
                                                                                                                                        a.download = fileName;
                                                                                                                                        document.body.appendChild(a);
                                                                                                                                        a.click();
                                                                                                                                        a.remove();
                                                                                                                                        })
                                                                                                                                        .catch(error => {
                                                                                                                                        console.error('Error:', error);
                                                                                                                                        alert('Error durante la exportación.');
                                                                                                                                        })
                                                                                                                                        .finally(() => {
                                                                                                                                        modal.style.display = 'none';
                                                                                                                                        });
                                                                                                                                        }

                                                                                                                                    </script>
                                                                                                                                    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                                                                                                    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                                                                                                    </body>
                                                                                                                                    </html>

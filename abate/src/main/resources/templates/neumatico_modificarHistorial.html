<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Neumatico Modificar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        </head>
                        <body>
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2" th:if="${historial.camion != null}">   
                                        <a title="Volver" th:href="@{/neumatico/asignar1(aplicaA=${camion}, idEntidad=${historial.camion.id})}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div class="col-2" th:if="${historial.acoplado != null}">   
                                        <a title="Volver" th:href="@{/neumatico/asignar1(aplicaA=${acoplado}, idEntidad=${historial.acoplado.id})}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-7 col-sm-7 col-md-7 col-lg-8 col-xl-8 text-center">
                                        <h4>Modificar Historial de Neumático</h4>
                                    </div>
                                    <div title="Ir a Eliminar Historial de Neumático" class="col-3 col-sm-3 col-md-3 col-lg-2 col-xl-2 text-center">
                                        <a th:href="@{/neumatico/eliminarHistorial/__${historial.id}__}">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                                                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                                                <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                                            </svg><h6 id="icono">Eliminar</h6> </a>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2"> 
                                <div class="card border-secondary p-2" id="color-card">
                                    <form th:action="@{/neumatico/modificaHistorial}" method="POST">
                                        <input hidden th:value="${historial.id}" name="id">
                                            <div class="row">
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-5">
                                                    <label for="fecha" class="form-label text-secondary">Fecha Colocación*</label>
                                                    <input type="date" class="form-control text-secondary" id="fecha" th:value="${historial.fechaColocacion}" name="fecha" required>
                                                </div>
                                                <div th:if="${historial.camion != null}" class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-5"> 
                                                    <label for="km" class="form-label text-secondary">Km Camión</label> 
                                                    <div class="input-group"> 
                                                        <span class="input-group-text text-secondary">km</span> 
                                                        <input type="number" class="form-control text-secondary" id="km" th:value=${historial.kmColocacion} name="km" required> 
                                                    </div> 
                                                    <input hidden th:value="${camion}" name="aplicaA">
                                                    <input hidden th:value="${historial.camion.id}" name="idEntidad">
                                                </div>   
                                                <div th:if="${historial.acoplado != null}" class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-5"> 
                                                    <label for="km" class="form-label text-secondary">Km Acoplado</label> 
                                                    <div class="input-group"> 
                                                        <span class="input-group-text text-secondary">km</span> 
                                                        <input type="number" class="form-control text-secondary" id="km" th:value=${historial.kmColocacion} name="km" required> 
                                                    </div> 
                                                    <input hidden th:value="${acoplado}" name="aplicaA">
                                                    <input hidden th:value="${historial.acoplado.id}" name="idEntidad">
                                                </div>            
                                            </div>
                                            <div th:if="${error != null}" class="card-body mb-5 text-center border border-secondary rounded" id="mensaje">                        
                                                <h6 id="white" th:text="${error}"></h6>                                                                             
                                            </div>
                                            <br>
                                                <div class="text-center mb-2">
                                                    <button class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Modificar Historial">Modificar</button>
                                                </div>
                                                <div class="text-center" th:if="${historial.camion != null}">
                                                    <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href="@{/neumatico/asignar1(aplicaA=${camion}, idEntidad=${historial.camion.id})}" title="Cancelar">Cancelar</a>
                                                </div> 
                                                <div class="text-center" th:if="${historial.acoplado != null}">
                                                    <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href="@{/neumatico/asignar1(aplicaA=${acoplado}, idEntidad=${historial.acoplado.id})}" title="Cancelar">Cancelar</a>
                                                </div>
                                                </form>
                                                </div>
                                                </div>
                                                <script>
                                                    document.getElementById('km').addEventListener('input', function () {
                                                        this.value = this.value.replace(/[^0-9]/g, ''); // Elimina cualquier carácter no numérico
                                                    });
                                                    document.getElementById('kmEstimado').addEventListener('keydown', function (event) {
                                                        if (event.key === '.' || event.key === ',') {
                                                            event.preventDefault();
                                                        }
                                                    });
                                                </script>
                                                <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                </body>
                                                </html>

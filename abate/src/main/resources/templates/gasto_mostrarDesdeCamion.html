<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Gasto Mostrar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css"> 
                        </head>
                        <body>                        
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/gasto/listarCamion/__${gasto.camion.id}__}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-8 text-center">
                                        <h4>Detalle de Gasto</h4>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2">   
                                <div  class="card border-secondary p-3 mb-2" id="color-card">
                                    <div class="row">
                                        <div class="col-9">                     
                                            <h6 th:text="'Fecha ' + ${#dates.format(gasto.fecha, 'dd-MM-yyyy')}+' - '+${gasto.nombre}"></h6>
                                            <h6 id="dimgray" th:text="'Importe: $'+${#numbers.formatDecimal(gasto.importe, 0, 'POINT', 0, 'POINT')}"></h6>
                                            <p id="dimgray" th:text="'Camión '+${gasto.camion.dominio}"></p>
                                        </div>
                                        <div class="col-3 text-center pb-0">
                                            <div>
                                                <a th:href="@{/imagen/verGastoCaja/__${gasto.id}__}">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-card-image" viewBox="0 0 16 16">
                                                        <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"/>
                                                        <path d="M1.5 2A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2zm13 1a.5.5 0 0 1 .5.5v6l-3.775-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12v.54L1 12.5v-9a.5.5 0 0 1 .5-.5z"/>
                                                    </svg>    <p id="icono2">Imagen</p>
                                                </a>
                                            </div>
                                        </div>
                                    </div>  
                                    <div class="table-responsive">
                                        <table class="table table-borderless table-hover table-sm">
                                            <thead>
                                                <tr id="darkblue">                                              
                                                    <td class="col-6 text-center">Concepto</td>
                                                    <td class="col-2 text-center">Cantidad</td>
                                                    <td class="col-2 text-center">Precio</td>
                                                    <td class="col-2 text-center">SubTotal</td> 
                                                </tr>
                                            </thead>
                                            <tbody th:each="detalle : ${gasto.detalles}">
                                                <tr id="dimgray">
                                                    <td class="col-6 text-center" th:text="${detalle.concepto}"></td>
                                                    <td class="col-2 text-center" th:text="${detalle.cantidad}"></td>
                                                    <td class="col-2 text-center" th:text="'$'+${#numbers.formatDecimal(detalle.precio, 0, 'POINT', 0, 'POINT')}"></td>
                                                    <td class="col-2 text-center" th:text="'$'+${#numbers.formatDecimal(detalle.total, 0, 'POINT', 0, 'POINT')}"></td>
                                                </tr>
                                            </tbody>
                                            <tr> 
                                                <td class="col-6"></td>
                                                <td class="col-2"></td>
                                                <th class="text-center col-2" id="dimgray">TOTAL</th>
                                                <th class="text-center col-2" id="dimgray" th:text="'$'+${#numbers.formatDecimal(gasto.importe, 0, 'POINT', 0, 'POINT')}"></th>
                                            </tr>
                                        </table>
                                    </div> 
                                    <p class='mb-0' th:if="${gasto.estado == 'ACEPTADO'}" id="darkgray" th:text="'Confirmó '+${gasto.usuario.nombre}"></p>
                                </div>
                                <div th:if="${exito != null}" class="card-body mb-4 text-center border border-secondary rounded" id="mensaje">                        
                                    <h6 id="white" th:text="${exito}"></h6>                                                                             
                                </div>
                                <br>
                                    <div class="text-center mb-2">
                                        <a class="btn btn-primary bg-primary btn-lg w-50" type="button" th:href="@{/gasto/listarCamion/__${gasto.camion.id}__}">Volver</a>
                                    </div>
                            </div>
                            <script>
                                // Obtener referencias a los elementos de radio y al botón
                                const option1 = document.querySelector('input[name="options"][value="option1"]');
                                const option2 = document.querySelector('input[name="options"][value="option2"]');
                                const myButton = document.getElementById('myButton');

                                // Añadir evento para detectar el cambio en los inputs de radio
                                option1.addEventListener('change', function () {
                                    if (option1.checked) {
                                        myButton.style.display = 'none'; // Ocultar el botón si Opción 1 está seleccionada
                                    }
                                });

                                option2.addEventListener('change', function () {
                                    if (option2.checked) {
                                        myButton.style.display = 'block'; // Mostrar el botón si Opción 2 está seleccionada
                                    }
                                });
                            </script>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

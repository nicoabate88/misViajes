<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Proveedor Listar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">   
                        </head>
                        <body>  
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/ordenDeTrabajo/listar}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-7 col-sm-7 col-md-7 col-lg-8 col-xl-8 text-center">
                                        <h4>Lista de Proveedores</h4>
                                    </div>
                                    <div title="Ir a Registrar Proveedor" class="col-3 col-sm-3 col-md-3 col-lg-2 col-xl-2 text-center">
                                        <a th:href="@{/proveedor/registrar}">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-person-check" viewBox="0 0 16 16">
                                                <path d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7m1.679-4.493-1.335 2.226a.75.75 0 0 1-1.174.144l-.774-.773a.5.5 0 0 1 .708-.708l.547.548 1.17-1.951a.5.5 0 1 1 .858.514M11 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0M8 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4"/>
                                                <path d="M8.256 14a4.5 4.5 0 0 1-.229-1.004H3c.001-.246.154-.986.832-1.664C4.484 10.68 5.711 10 8 10q.39 0 .74.025c.226-.341.496-.65.804-.918Q8.844 9.002 8 9c-5 0-6 3-6 4s1 1 1 1z"/>
                                            </svg><h6 id="icono">Nuevo</h6> </a>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2">   
                                <div th:if="${exito != null}" class="card bg-secondary mb-2 p-3 border border-secondary rounded text-center">                        
                                    <h6 id="white" th:text="${exito}"></h6>                                                                             
                                </div>
                                <div th:if="${!proveedores.isEmpty()}">
                                    <div th:each="proveedor : ${proveedores}">
                                        <div class="card border-secondary p-3 mb-1" id="color-card">
                                            <div class="row mb-3">
                                                <div class="col-8">
                                                    <h6 th:text="${proveedor.nombre}"></h6>
                                                    <p class='mb-1' id="dimgray" th:text="'CUIT '+${proveedor.cuit}"></p>
                                                    <h6 th:if="${proveedor.estado == 'HABILITADO'}" id="dimgray"class="mb-0" th:text="'Estado '+${proveedor.estado}"></h6>
                                                    <h6 th:if="${proveedor.estado == 'INHABILITADO'}" class="text-danger mb-0" th:text="'Estado '+${proveedor.estado}"></h6>
                                                </div>
                                                <div title="Ir a Modificar Proveedor" class="col-4 text-center">
                                                    <a th:href= "@{/proveedor/modificar/__${proveedor.id}__}">
                                                        <svg id="modificar" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                                                            <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                                                        </svg>     <p id="modificar">Modificar</p>
                                                    </a>
                                                </div>
                                            </div>  
                                        </div> 
                                    </div>
                                    <br>
                                        <div class="text-center mb-2">
                                            <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Ir a Registrar Proveedor" th:href="@{/proveedor/registrar}">Nuevo Proveedor</a>
                                        </div>    
                                        <div class="text-center mb-2">
                                            <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/ordenDeTrabajo/listar}">Volver</a>
                                        </div>
                                </div>    
                                <div th:if="${proveedores.isEmpty()}">
                                    <br>
                                        <div class="card border-secondary p-4 mb-2 text-center" id="color-card">
                                            <h6 id="azul">No existen Proveedor registrados</h6>
                                        </div>
                                        <br>
                                            <div class="text-center mb-2">
                                                <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Ir a Registrar Proveedor" th:href="@{/proveedor/registrar}">Nuevo Proveedor</a>
                                            </div>
                                            <div class="text-center mb-2">
                                                <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/ordenDeTrabajo/listar}">Volver</a>
                                            </div>
                                            </div>
                                            </div>
                                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                            </body>
                                            </html>

<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Cheque Registrar</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">  

        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">

        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

        <style>

            body{
                background-color:#f4f6f9;
            }

            .card-financiera{
                border:none;
                border-radius:15px;
                overflow:hidden;
            }

            .card-header-financiero{
                background:linear-gradient(135deg,#1e3c72,#2a5298);
                color:white;
                padding:20px;
            }

            .titulo-financiero{
                font-weight:700;
                margin-bottom:5px;
            }

            .subtitulo-financiero{
                opacity:0.85;
                margin-bottom:0;
            }

            .label-financiero{
                font-weight:600;
                color:#495057;
            }

            .form-control{
                border-radius:10px;
            }

            .custom-select{
                border-radius:10px;
            }

            .btn-financiero{
                border-radius:10px;
                padding:10px 20px;
                font-weight:600;
            }

            .importe-input{
                font-size:1.2rem;
                font-weight:700;
                color:#198754;
            }

            textarea{
                resize:none;
                border-radius:10px !important;
            }

            .badge-estado{
                font-size:0.85rem;
                padding:8px 12px;
                border-radius:10px;
            }

        </style>

    </head>

    <body>

        <div class="container py-5">

            <!-- TITULO -->

            <div class="row mb-4">

                <h2 class="font-weight-bold mb-1">
                    Modificar Cheque
                </h2>

            </div>

            <!-- MENSAJES -->

            <div th:if="${error}"
                 class="alert alert-danger alert-dismissible fade show"
                 role="alert">

                <span th:text="${error}"></span>

                <button type="button"
                        class="close"
                        data-dismiss="alert">

                    <span>&times;</span>

                </button>

            </div>

            <!-- CARD -->

            <div class="card shadow-sm card-financiera">

                <!-- HEADER -->

                <div class="card-header-financiero">

                    <div class="d-flex justify-content-between align-items-center flex-wrap">

                        <div>

                            <h4 class="titulo-financiero">
                                Datos del Cheque
                            </h4>

                            <p class="subtitulo-financiero">
                                Modifique la información necesaria del cheque
                            </p>

                        </div>

                    </div>

                </div>

                <!-- BODY -->

                <div class="card-body p-4">

                    <form action="/cheque/actualizar-cheque" method="POST">

                        <input type="hidden" name="idCheque" th:value="${cheque.id}">

                        <div class="row">

                            <!-- NUMERO -->

                            <div class="col-md-6 mb-4">

                                <label class="label-financiero">
                                    Número de Cheque
                                </label>

                                <input type="text"
                                       name="numeroCheque"
                                       class="form-control"
                                       placeholder="Ingrese número de cheque"
                                       th:value="${cheque.numeroCheque}"
                                       required>

                            </div>

                            <!-- BANCO -->

                            <div class="col-md-6 mb-4">

                                <label class="label-financiero">
                                    Banco Emisor
                                </label>

                                <select name="idBanco"
                                        class="custom-select"
                                        required>

                                    <option value="">
                                        Seleccione banco
                                    </option>

                                    <option th:each="b : ${bancos}"
                                            th:value="${b.id}"
                                            th:text="${b.nombre}"
                                            th:selected="${cheque.bancoEmisor != null and cheque.bancoEmisor.id == b.id}">
                                    </option>

                                </select>

                            </div>

                            <!-- TITULAR -->
                            
                            <div class="col-md-6 mb-4">

                                <label class="label-financiero">
                                    Titular Emisor
                                </label>

                                <select name="idTitular" class="custom-select" required>

                                    <option value="">Seleccione titular</option>

                                    <option th:each="t : ${titulares}"
                                            th:value="${t.id}"
                                            th:text="${t.nombre}"
                                            th:selected="${cheque.titularEmisor != null and cheque.titularEmisor.id == t.id}">
                                    </option>

                                </select>

                            </div>

                            <!-- IMPORTE -->

                            <div class="col-md-6 mb-1">

                                <label class="label-financiero">
                                    Importe
                                </label>

                                <input type="number"
                                       step="0.01"
                                       min="0"
                                       name="importe"
                                       class="form-control importe-input"
                                       placeholder="0.00"
                                       th:value="${cheque.importe}"
                                       required>

                            </div>

                            <!-- FECHA EMISION -->

                            <div class="col-md-4 mb-4">

                                <label class="label-financiero">
                                    Fecha Emisión
                                </label>

                                <input type="date"
                                       name="fechaEmision"
                                       class="form-control"
                                       th:value="${#dates.format(cheque.fechaEmision, 'yyyy-MM-dd')}"
                                       required>

                            </div>

                            <!-- FECHA VENCIMIENTO -->

                            <div class="col-md-4 mb-1">

                                <label class="label-financiero">
                                    Fecha Vencimiento
                                </label>

                                <input type="date"
                                       id="fechaVencimiento"
                                       name="fechaVencimiento"
                                       class="form-control"
                                       th:value="${#dates.format(cheque.fechaVencimiento, 'yyyy-MM-dd')}"
                                       required>

                            </div>

                            <!-- FECHA ACREDITACION -->

                            <div class="col-md-4 mb-1">

                                <label class="label-financiero">
                                    Fecha Acreditación
                                </label>

                                <input type="date"
                                       id="fechaAcreditacion"
                                       name="fechaAcreditacion"
                                       class="form-control"
                                       th:value="${#dates.format(cheque.fechaAcreditacion, 'yyyy-MM-dd')}"
                                       required>

                                <small class="form-text text-muted">
                                    2 días hábiles posteriores a fecha vencimiento.
                                </small>

                            </div>

                            <!-- ESTADO -->

                            <div class="col-md-6 mb-4">

                                <label class="label-financiero">
                                    Estado del Cheque
                                </label>

                                <select name="estado"
                                        class="custom-select"
                                        required>

                                    <option th:each="e : ${estados}"
                                            th:value="${e}"
                                            th:text="${e}"
                                            th:selected="${cheque.estado == e}">
                                    </option>

                                </select>

                            </div>

                            <!-- OBSERVACION -->

                            <div class="col-12 mb-3">

                                <label class="label-financiero">
                                    Observación
                                </label>

                                <textarea name="observacion"
                                          rows="3"
                                          class="form-control"
                                          placeholder="Ingrese observaciones del cheque"
                                          th:text="${cheque.observacion}"></textarea>

                            </div>

                        </div>

                        <!-- BOTONES -->

                        <div class="text-right mt-4">

                            <a href="/cheque/listar"
                               class="btn btn-outline-secondary btn-financiero mr-2">

                                Cancelar

                            </a>

                            <button type="submit"
                                    class="btn btn-primary btn-financiero shadow-sm">

                                <i class="bi bi-save mr-1"></i>

                                Guardar Cambios

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>

        <script>

            document.addEventListener('DOMContentLoaded', function () {

            const fechaVencimiento = document.getElementById('fechaVencimiento');
            const fechaAcreditacion = document.getElementById('fechaAcreditacion');

            function esFinDeSemana(fecha) {
            const diaSemana = fecha.getDay();
            return diaSemana === 0 || diaSemana === 6;
            }

            function moverAlProximoDiaHabil(fecha) {

            while (esFinDeSemana(fecha)) {
            fecha.setDate(fecha.getDate() + 1);
            }

            return fecha;
            }

            function sumarDiasHabiles(fecha, cantidadDias) {

            let diasHabiles = 0;

            while (diasHabiles < cantidadDias) {

            fecha.setDate(fecha.getDate() + 1);

            if (!esFinDeSemana(fecha)) {
            diasHabiles++;
            }
            }

            return fecha;
            }

            function formatearFecha(fecha) {

            const yyyy = fecha.getFullYear();
            const mm = String(fecha.getMonth() + 1).padStart(2, '0');
            const dd = String(fecha.getDate()).padStart(2, '0');

            return `${yyyy}-${mm}-${dd}`;
            }

            fechaVencimiento.addEventListener('change', function () {

            if (!this.value) {
            fechaAcreditacion.value = '';
            return;
            }

            let fecha = new Date(this.value + 'T00:00:00');

            fecha = moverAlProximoDiaHabil(fecha);

            fecha = sumarDiasHabiles(fecha, 2);

            fechaAcreditacion.value = formatearFecha(fecha);

            });

            fechaAcreditacion.addEventListener('change', function () {

            if (!fechaVencimiento.value || !this.value) {
            return;
            }

            if (this.value < fechaVencimiento.value) {

            alert('La fecha de acreditación no puede ser anterior a la fecha de vencimiento.');

            this.value = '';

            this.focus();
            }

            });

            });

        </script>

    </body>

</html>

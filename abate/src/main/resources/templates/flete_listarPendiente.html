<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Viaje Listar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css"> 
                        </head>
                        <body>
                            <section>
                                <div class="card-header mb-2" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">   
                                            <a title="Volver" th:href="@{/index}" type="button">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                </svg> 
                                            </a>   
                                        </div>
                                        <div  class="col-8 text-center">
                                            <h4>Viajes Pendientes</h4>
                                        </div>
                                        <div class="col-2 text-center">
                                            <a id="todos" th:href="@{/flete/listarTodo}">
                                                <svg width="30" height="30" viewBox="0 -50 522 230" xmlns="http://www.w3.org/2000/svg"><g id="Layer_42"><path d="m519.9 112.3-5.7-10.3c-.5-.8-.8-1.7-.9-2.7l-4.7-54.7v-1.7c-.8-8-7-14.4-15-15.3l-95.7-10.9c-9.3-1-17.6 5.6-18.7 14.9-.1.6-.1 1.3-.1 1.9v120.4h-4.4v-145.2c0-4.8-3.8-8.6-8.6-8.7h-357.4c-4.8 0-8.7 3.9-8.7 8.7v146.9c0 3.7 2.3 7 5.8 8.2v18.2c0 8.4 5.1 16 12.8 19.3 2.5 18.3 19.4 31.1 37.7 28.6 14.3-2 25.7-12.8 28.4-26.9h4.2c3.5 18.2 21.1 30 39.3 26.5 13.7-2.7 24.3-13.5 26.6-27.2 9.3-2.4 15.8-10.7 15.8-20.3v-17.7h44.3v17.7c0 9.8 6.8 18.3 16.4 20.5 3.2 18.2 20.6 30.4 38.8 27.2 13.7-2.4 24.5-13 27.1-26.7h4.3c3.5 18.2 21 30.1 39.2 26.6 13.5-2.6 24-13.1 26.6-26.6h56.5c3.5 18.2 21 30.1 39.2 26.6 13.5-2.6 24-13.1 26.6-26.6h15.4c9.3 0 16.9-7.6 16.9-16.9v-65.6c0-2.9-.7-5.7-2-8.2zm-17.5-23h-71v-34.7h68l1.8 21.1zm-413.9 103.7h-3.4c-1.4-13.5-10.8-24.9-23.9-28.7h51.2c-13.1 3.8-22.5 15.2-23.9 28.7zm-72.7-28.7h26.5c-11.9 3.5-20.8 13.2-23.4 25.3-2-2-3.1-4.8-3.1-7.6zm36 55.7c-10.5 0-19.7-6.9-22.6-17-.6-2.1-1-4.4-1-6.6 0-1.1.1-2.3.3-3.4 1.9-12.8 13.8-21.7 26.7-19.8 10.3 1.5 18.3 9.6 19.8 19.8.2 1.1.3 2.3.3 3.4 0 2.2-.3 4.5-.9 6.6-2.9 10.1-12.1 17-22.6 17zm70 0c-10.5 0-19.7-6.9-22.6-17-.6-2.1-.9-4.4-.9-6.6 0-1.1.1-2.3.2-3.4 2.1-12.9 14.2-21.6 27.1-19.5 10.1 1.6 17.9 9.5 19.5 19.5.2 1.1.3 2.3.3 3.4 0 2.2-.4 4.5-1 6.6-2.9 10.1-12.1 17-22.6 17zm38.8-38c0 4-2.2 7.6-5.6 9.6-1.9-13-11.1-23.6-23.7-27.3h29.3zm10-27.7v-.4h-160.6v-143.9h354.7v143.9h-149.8v.4zm130.4 38.7h-3.3c-1.4-13.5-10.8-24.9-23.9-28.7h51.1c-13 3.9-22.4 15.2-23.9 28.7zm-76.1-11v-17.7h30c-12.7 3.7-22 14.5-23.8 27.6-3.8-1.8-6.2-5.7-6.2-9.9zm39.4 38c-10.5 0-19.7-6.9-22.6-17-.6-2.1-.9-4.4-.9-6.6 0-1.1.1-2.3.3-3.4 1.9-12.8 13.8-21.7 26.7-19.8 10.3 1.5 18.3 9.6 19.8 19.8.2 1.1.3 2.3.3 3.4 0 2.2-.4 4.5-1 6.6-2.9 10.1-12.1 17-22.6 17zm70.1 0c-10.5 0-19.7-6.9-22.6-17-.6-2.1-.9-4.4-.9-6.6 0-1.1.1-2.3.2-3.4 2.1-12.9 14.2-21.6 27.1-19.5 10.1 1.6 17.9 9.5 19.5 19.5.1 1.1.2 2.3.2 3.4 0 2.2-.3 4.5-.9 6.6-2.9 10.1-12.1 17-22.6 17zm33.4-27c-1.4-13.5-10.8-24.9-23.9-28.7h22.2c.8 0 1.6-.2 2.4-.4h10.6v22.2c0 2.4.5 4.7 1.5 6.9zm88.9 27c-10.5 0-19.7-6.9-22.6-17-.6-2.1-.9-4.4-.9-6.6 0-1.1.1-2.3.2-3.4 2.1-12.9 14.2-21.6 27.1-19.5 10.1 1.6 17.9 9.5 19.5 19.5.2 1.1.2 2.3.2 3.4 0 2.2-.3 4.5-.9 6.6-2.9 10.1-12.1 17-22.6 17zm55.2-33.9c0 3.8-3.1 6.9-6.9 6.9h-14.9c-1.7-18.4-18.1-31.9-36.5-30.2-16 1.5-28.7 14.2-30.2 30.2h-27.4c-1.9 0-3.7-.8-5-2.2-1.2-1.3-1.9-2.9-1.9-4.7v-152.6c0-2 .8-3.9 2.3-5.2 1.3-1.1 2.9-1.7 4.6-1.7h.8l95.6 10.9c3.3.4 5.8 3 6.1 6.3v.8h-70.2c-3.8 0-6.9 3.1-6.9 6.9v40.8c-.1 3.8 3 6.9 6.8 7h.1 75v.8c.2 2.3.9 4.6 2 6.7l5.7 10.4c.6 1 .9 2.1.9 3.3z" fill="#000000" style="fill: rgb(255, 255, 255);"></path><path d="m321 19.7h13.2v119.6h-13.2z" fill="#000000" style="fill: rgb(255, 255, 255);"></path><path d="m278.9 19.7h13.2v119.6h-13.2z" fill="#000000" style="fill: rgb(255, 255, 255);"></path><path d="m236.8 19.7h13.2v119.6h-13.2z" fill="#000000" style="fill: rgb(255, 255, 255);"></path><path d="m194.8 19.7h13.2v119.6h-13.2z" fill="#000000" style="fill: rgb(255, 255, 255);"></path><path d="m152.7 19.7h13.2v119.6h-13.2z" fill="#000000" style="fill: rgb(255, 255, 255);"></path><path d="m110.6 19.7h13.2v119.6h-13.2z" fill="#000000" style="fill: rgb(255, 255, 255);"></path><path d="m68.5 19.7h13.2v119.6h-13.2z" fill="#000000" style="fill: rgb(255, 255, 255);"></path><path d="m26.4 19.7h13.2v119.6h-13.2z" fill="#000000" style="fill: rgb(255, 255, 255);"></path></g></svg>
                                                <h6 id="icono">Todos</h6> </a>
                                        </div>
                                    </div>
                                </div>
                                <div class="container mb-2">   
                                    <div th:if="${cantidad != 0 && cantidad == 1}" class="card bg-primary mb-2 p-3 border-success text-center">
                                        <h6 id="white" th:text=" 'Existe '+${cantidad}+ ' Viaje Pendiente de Confirmar.' "></h6>
                                    </div> 
                                    <div th:if="${cantidad != 0 && cantidad != 1}" class="card bg-primary mb-2 p-3 border-success text-center">
                                        <h6 id="white" th:text=" 'Existen '+${cantidad}+ ' Viajes Pendientes de Confirmar.' "></h6>
                                    </div> 
                                    <div th:if="${exito != null}" class="alert bg-secondary alert-secondary alert-dismissible fade show mb-2 p-3 text-center" role="alert">
                                    <h6 id="white" th:text="${exito}" class="mb-0 d-inline"></h6>
                                    <button id="white" type="button" class="close" data-dismiss="alert" aria-label="Close">
                                        <span aria-hidden="true">&times;</span>
                                    </button>
                                </div>
                                    <div th:if="${!fletes.isEmpty()}">
                                        <div th:each="flete : ${fletes}">
                                            <div class="card border-secondary p-3 mb-1" id="color-card">
                                                <div class="row">
                                                    <div class="col-9 col-md-9">
                                                        <h6 th:text="${flete.estado}" th:if="${flete.estado != 'ACEPTADO'}"></h6>
                                                        <h6 th:text="'Fecha ' + ${#dates.format(flete.fechaFlete, 'dd-MM-yyyy')}+' - ID'+${flete.idFlete}"></h6>
                                                    </div>
                                                    <div class="col-3 col-md-3 text-center">
                                                        <a id="ver" th:href="@{/flete/mostrarPendiente/__${flete.id}__}">
                                                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                            </svg>
                                                            <p id="icono2">Ver</p>
                                                        </a>
                                                    </div>
                                                </div>  
                                                <div>
                                                    <p class="mb-0" id="dimgray" th:text="'Origen '+${flete.origenFlete}"></p>
                                                    <p class="mb-1" id="dimgray" th:text="'Destino '+${flete.destinoFlete}"></p>
                                                    <h6 id="azul" th:text="'Cliente '+${flete.cliente.nombre}"></h6>
                                                    <h6 class="mb-0" id="dimgray" th:text="'Chofer '+${flete.chofer.nombre}"></h6>
                                                </div>
                                            </div>
                                        </div>
                                        <br>
                                            <div class="text-center mb-2">
                                                <a id="botonTodos" class="btn btn-secondary bg-secondary btn-lg w-50" type="button" th:href="@{/flete/listarTodo}">Ver Todos</a>
                                            </div>
                                            <div class="text-center mb-2">
                                                <a class="btn btn-primary bg-primary btn-lg w-50" type="button" th:href="@{/index}">Volver</a>
                                            </div>
                                    </div>
                                    <div th:if="${fletes.isEmpty()}">
                                        <div class="card border-secondary p-4 mb-4 text-center" id="color-card">
                                            <h6 class="mb-4" id="azul">No existen Viajes Pendientes</h6>
                                        </div>
                                        <div class="text-center mb-2">
                                            <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" th:href="@{/flete/listarTodo}">Ver Todos</a>
                                        </div>
                                        <div class="text-center mb-2">
                                            <a class="btn btn-primary bg-primary btn-lg w-50" type="button" th:href="@{/index}">Volver</a>
                                        </div>

                                    </div>
                                </div>
                                <div id="spinner" class="modal" style="display: none;">
                                    <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                            <span class="sr-only">Cargando...</span>
                                        </div>
                                    </div>
                                </div>
                            </section>
                            <script>
                                    document.addEventListener("DOMContentLoaded", function () {
                                        const volverBtn = document.getElementById("todos");
                                        volverBtn.addEventListener("click", function (e) {
                                            // Mostrar spinner
                                            document.getElementById("spinner").style.display = "block";
                                        });
                                    });
                                    document.addEventListener("DOMContentLoaded", function () {
                                        const volverBtn = document.getElementById("botonTodos");
                                        volverBtn.addEventListener("click", function (e) {
                                            // Mostrar spinner
                                            document.getElementById("spinner").style.display = "block";
                                        });
                                    });
                                    document.addEventListener("DOMContentLoaded", function () {
                                        const volverBtn = document.getElementById("ver");
                                        volverBtn.addEventListener("click", function (e) {
                                            // Mostrar spinner
                                            document.getElementById("spinner").style.display = "block";
                                        });
                                    });
                                </script>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

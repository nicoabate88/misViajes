<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Neumatico Listar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">   
                        </head>
                        <body>
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/neumatico/listarAdmin}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-8 col-sm-8 col-md-8 col-lg-8 col-xl-8 text-center">
                                        <h4>Lista de Recapado</h4>
                                    </div>
                                    <div title="Ir a Registrar Neumático" class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 text-center">
                                        <a th:href="@{/neumatico/recapar}">
                                            <svg id='white' xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-bootstrap-reboot" viewBox="0 0 16 16">
                                                <path d="M1.161 8a6.84 6.84 0 1 0 6.842-6.84.58.58 0 1 1 0-1.16 8 8 0 1 1-6.556 3.412l-.663-.577a.58.58 0 0 1 .227-.997l2.52-.69a.58.58 0 0 1 .728.633l-.332 2.592a.58.58 0 0 1-.956.364l-.643-.56A6.8 6.8 0 0 0 1.16 8z"/>
                                                <path d="M6.641 11.671V8.843h1.57l1.498 2.828h1.314L9.377 8.665c.897-.3 1.427-1.106 1.427-2.1 0-1.37-.943-2.246-2.456-2.246H5.5v7.352zm0-3.75V5.277h1.57c.881 0 1.416.499 1.416 1.32 0 .84-.504 1.324-1.386 1.324z"/>
                                            </svg><h6 id="icono">Nuevo</h6> </a>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2"> 
                                <div th:if="${exito != null}" class="card bg-secondary mb-2 p-3 border-secondary text-center">                        
                                    <h6 id="white" th:text="${exito}"></h6>                                                                             
                                </div>
                                <div th:if="${!recapados.isEmpty()}">
                                    <div th:each="recapado : ${recapados}">
                                        <div class="card border-secondary p-3 mb-1" id="color-card">
                                            <div class="row">
                                                <div class="col-12 col-sm-12 col-md-12 col-lg-9 col-xl-9">
                                                    <h6>
                                                        <span th:text="'N° '+${recapado.neumatico.numero}+' - '+${recapado.neumatico.marca.marca}+' '+${recapado.neumatico.modelo}"></span>
                                                        <span id="darkgray" th:text="${recapado.neumatico.aplicaA}"></span>
                                                    </h6>                            
                                                    <p class="mb-1" id="dimgray" th:text="'Fecha de envío '+${#dates.format(recapado.fechaEnvio, 'dd-MM-yyyy')}+' (KM '+${#numbers.formatDecimal(recapado.kmAlRecapar, 0, 'POINT', 0, 'POINT')}+')'"></p>
                                                    <h6 id="dimgray" class="mb-2" th:text="'Proveedor '+${recapado.proveedor.nombre}"></h6>
                                                    <h6 class="mb-2 text-dark" th:text="'📌 Ubicación '+${recapado.neumatico.ubicacion}"></h6>
                                                    <p th:if="${recapado.observacion != ''}" id="dimgray" th:text="'Observación '+${recapado.observacion}"></p>
                                                </div>  
                                                <div class="col-12 col-sm-12 col-md-12 col-lg-3 col-xl-3 text-center">
                                                    <div class="pb-0">
                                                        <a title="Reingrasar Neumático" id="myButton" type="button" 
                                                           th:href="@{/neumatico/reingresarRecapado(id=${recapado.id})}">
                                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-check-square-fill" viewBox="0 0 16 16">
                                                                <path d="M2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2zm10.03 4.97a.75.75 0 0 1 .011 1.05l-3.992 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.75.75 0 0 1 1.08-.022z"/>
                                                            </svg> <p id="icono2">Reingresar</p>
                                                        </a>
                                                    </div> 
                                                    <div title="Ir a Modificar Neumático">
                                                        <a th:href= "@{/neumatico/modificarRecapado(id=${recapado.id})}">
                                                            <svg id="modificar" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                                                                <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                                                            </svg>     <p id="modificar">Modificar</p>
                                                        </a>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>    
                                    </div>
                                    <br>
                                        <div class="text-center mb-2">
                                            <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Ir a Registrar Neumático" th:href="@{/neumatico/recapar}">Nuevo Recapado</a>
                                        </div>    
                                        <div class="text-center mb-2">
                                            <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/neumatico/listarAdmin}">Volver</a>
                                        </div>
                                </div>    
                                <div th:if="${recapados.isEmpty()}">
                                    <br>
                                        <div class="card border-secondary p-4 mb-2 text-center" id="color-card">
                                            <h6 id="azul">No existen Neumáticos Recapados para mostrar</h6>
                                        </div>
                                        <br>
                                            <div class="text-center mb-2">
                                                <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Ir a Registrar Recapado" th:href="@{/neumatico/recapar}">Nuevo</a>
                                            </div>
                                            <div class="text-center mb-2">
                                                <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/neumatico/listarAdmin}">Volver</a>
                                            </div>
                                            </div>
                                            </div>
                                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                            </body>
                                            </html>

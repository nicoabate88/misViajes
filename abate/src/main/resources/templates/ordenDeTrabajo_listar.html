<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Lista Orden de Trabajo</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
                        <link rel="stylesheet" href="/css/medidas_container.css">   
                            <style>
                                .link-historial {
                                    color: darkgrey;
                                    background: none;
                                    border: none;
                                    padding: 0;
                                    cursor: pointer;
                                }
                                .modal-header-darkblue {
                                    background-color: darkblue;
                                    color: white;
                                }

                                /* Estilo para pantallas md */
                                @media (max-width: 991.98px) {
                                    .table {
                                        font-size: 13px;
                                    }
                                    .text-dark {
                                        font-size: 13px;
                                    }
                                }
                                /* Estilo para pantallas sm */
                                @media (max-width: 767.98px) {
                                    .table {
                                        font-size: 10px;
                                    }
                                    .text-dark {
                                        font-size: 13px;
                                    }
                                }
                                .text-green {
                                    color: green;
                                    font-size: 1.2em;
                                }

                                .text-yellow {
                                    color: orange;
                                    font-size: 1.2em;
                                }

                                .text-red {
                                    color: red;
                                    font-size: 1.2em;
                                }
                            </style>
                            </head>
                            <body>                        
                                <div class="card-header mb-4" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">   
                                            <a title="Volver" th:href="@{/mantenimiento/listarAdmin}" type="button">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                </svg> 
                                            </a>   
                                        </div>
                                        <div  class="col-6 col-sm-6 col-md-7 col-lg-8 col-xl-8 text-center">
                                            <h4>Lista Orden de Trabajo</h4>
                                        </div>                                    
                                        <div title="Ir a Registrar Orden" class="col-2 col-sm-2 col-md-1 col-lg-1 col-xl-1 text-center">
                                            <a th:href="@{/ordenDeTrabajo/registrar}">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-card-checklist" viewBox="0 0 16 16">
                                                    <path d="M14.5 3a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5zm-13-1A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2z"/>
                                                    <path d="M7 5.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m-1.496-.854a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0l-.5-.5a.5.5 0 1 1 .708-.708l.146.147 1.146-1.147a.5.5 0 0 1 .708 0M7 9.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m-1.496-.854a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0l-.5-.5a.5.5 0 0 1 .708-.708l.146.147 1.146-1.147a.5.5 0 0 1 .708 0"/>
                                                </svg><h6 id="icono">Nuevo</h6> </a>
                                        </div>
                                        <div title="Ir a Proveedor" class="col-2 col-sm-2 col-md-2 col-lg-1 col-xl-1 text-center">
                                            <a th:href="@{/proveedor/listar}">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-person-check" viewBox="0 0 16 16">
                                                    <path d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7m1.679-4.493-1.335 2.226a.75.75 0 0 1-1.174.144l-.774-.773a.5.5 0 0 1 .708-.708l.547.548 1.17-1.951a.5.5 0 1 1 .858.514M11 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0M8 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4"/>
                                                    <path d="M8.256 14a4.5 4.5 0 0 1-.229-1.004H3c.001-.246.154-.986.832-1.664C4.484 10.68 5.711 10 8 10q.39 0 .74.025c.226-.341.496-.65.804-.918Q8.844 9.002 8 9c-5 0-6 3-6 4s1 1 1 1z"/>
                                                </svg><h6 id="icono">Proveedor</h6> </a>
                                        </div>
                                    </div>
                                </div>
                                <div class="container mb-2">  
                                    <form id="form" th:action="@{/ordenDeTrabajo/listarFiltro}" method="POST">
                                        <div class="row">
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 pb-3">
                                                <label for="idCamion" class="form-floting text-secondary">Camión</label>
                                                <select class="form-control text-secondary border-secondary" id="idCamion" name="idCamion">
                                                    <option th:if="${camion != null}" th:value="${camion.id}"
                                                            th:text="${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}" selected></option>
                                                    <option th:value=null>TODOS</option>
                                                    <option th:each="camion : ${camiones}"
                                                            th:value="${camion.id}"
                                                            th:text="${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}"/>
                                                    <option value="">TODOS</option>
                                                </select>
                                            </div>
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 pb-3">
                                                <label for="idAcoplado" class="form-floting text-secondary">Acoplado</label>
                                                <select class="form-control text-secondary border-secondary" id="idAcoplado" name="idAcoplado">
                                                    <option th:if="${acoplado != null}" th:value="${acoplado.id}"
                                                            th:text="${acoplado.dominio}+' - '+${acoplado.marca}+' '+${acoplado.modelo}" selected></option>
                                                    <option th:value=null>TODOS</option>
                                                    <option th:each="acoplado : ${acoplados}"
                                                            th:value="${acoplado.id}"
                                                            th:text="${acoplado.dominio}+' - '+${acoplado.marca}+' '+${acoplado.modelo}"/>
                                                </select>
                                            </div>
                                            <div class="col-5 col-sm-5 col-md-5 col-lg-2 col-xl-2 pb-3">
                                                <label for="lugar" class="form-floting text-secondary">Lugar</label>
                                                <select class="form-control text-secondary border-secondary" id="lugar" name="lugar">
                                                    <option th:if="${lugar == 'CAMILO'}" selected th:value="CAMILO">CAMILO ALDAO</option>
                                                    <option th:if="${lugar == 'NOGOYA'}" selected th:value="NOGOYA">NOGOYA</option>
                                                    <option th:if="${lugar == 'EXTERNO'}" selected th:value="EXTERNO">PROVEEDOR EXTERNO</option>
                                                    <option th:if="${lugar == 'TODOS'}" selected th:value="TODOS">TODOS</option>
                                                    <option th:value="CAMILO">CAMILO ALDAO</option>
                                                    <option th:value="NOGOYA">NOGOYA</option>
                                                    <option th:value="EXTERNO">PROVEEDOR EXTERNO</option>
                                                    <option th:value="TODOS">TODOS</option>
                                                </select>
                                            </div>
                                            <div class="col-5 col-sm-5 col-md-5 col-lg-3 col-xl-3 pb-3">
                                                <label for="estado" class="form-floting text-secondary">Estado</label>
                                                <select class="form-control text-secondary border-secondary" id="estado" name="estado">
                                                    <option th:if="${estado == 'ABIERTO'}" selected th:value="ABIERTO">ABIERTO - EN PROCESO</option>
                                                    <option th:if="${estado == 'CERRADO'}" selected th:value="CERRADO">CERRADO</option>
                                                    <option th:if="${estado == 'TODOS'}" selected th:value="TODOS">TODOS</option>
                                                    <option th:value="ABIERTO">ABIERTO - EN PROCESO</option>
                                                    <option th:value="CERRADO">CERRADO</option>
                                                    <option th:value="TODOS">TODOS</option>
                                                </select>
                                            </div>
                                            <div class="col-2 col-sm-2 col-md-2 col-lg-1 col-xl-1 text-center">
                                                <label for="ver" class="form-floting">Ver</label> 
                                                <button id="ver"  class="btn btn-primary" type="submit">
                                                    <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="24" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                    </svg>
                                                </button>
                                            </div>
                                        </div>
                                    </form>
                                    <div th:if="${exito != null}" class="alert bg-secondary alert-secondary alert-dismissible fade show mb-2 p-4 text-center" role="alert">
                                        <h6 id="white" th:text="${exito}" class="mb-0 d-inline"></h6>
                                        <button id="white" type="button" class="close" data-dismiss="alert" aria-label="Close">
                                            <span aria-hidden="true">&times;</span>
                                        </button>
                                    </div>
                                    <div th:if="${error != null}" class="alert bg-secondary alert-secondary alert-dismissible fade show mb-2 p-4 text-center" role="alert">                        
                                        <h6 id="white" th:text="${error}"></h6>   
                                        <button id="white" type="button" class="close" data-dismiss="alert" aria-label="Close">
                                            <span aria-hidden="true">&times;</span>
                                        </button>
                                    </div>
                                    <div th:if="${!ordenes.isEmpty()}">                                                             
                                        <div class="table-responsive border border-secondary rounded">
                                            <table class="table border bg-light table-hover table-sm mb-0" id="dimgray">
                                                <thead>
                                                    <tr>
                                                        <th class="text-center">N° OT</th>
                                                        <th class="text-center">Fecha Alta</th>
                                                        <th class="text-center">Lugar</th>
                                                        <th class="text-center">Camión</th>
                                                        <th class="text-center">Acoplado</th>
                                                        <th class="text-center">Estado</th>
                                                        <th class="text-center">Fecha Cierre</th>
                                                        <th class="text-center">Ver</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <tr th:each="orden : ${ordenes}">
                                                        <td class="text-center" th:text="${orden.idOrden}"></td>
                                                        <td class="text-center" th:text="${#dates.format(orden.fechaAlta, 'dd-MM-yyyy')}"></td>
                                                        <td class="text-center" th:text="${orden.lugar}"></td>
                                                        <td th:if="${orden.camion != null}" class="text-center" th:text="${orden.camion.dominio}"></td>
                                                        <td th:if="${orden.camion == null}" class="text-center">-</td>
                                                        <td th:if="${orden.acoplado != null}" class="text-center" th:text="${orden.acoplado.dominio}"></td>
                                                        <td th:if="${orden.acoplado == null}" class="text-center">-</td>
                                                        <td class="text-center" th:text="${orden.estado}"></td>
                                                        <td th:if="${orden.fechaCierre != null}" class="text-center" th:text="${#dates.format(orden.fechaCierre, 'dd-MM-yyyy')}"></td>
                                                        <td th:if="${orden.fechaCierre == null}" class="text-center">-</td>
                                                        <td class="text-center">
                                                            <a th:href="@{/ordenDeTrabajo/modificar(id=${orden.id})}">
                                                                <i id="dimgray" class="fa fa-eye" style="margin-left:10px; cursor:pointer;"></i>
                                                            </a>
                                                        </td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                        <br>
                                            <div class="text-center mb-2">
                                                <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Nuevo" th:href="@{/ordenDeTrabajo/registrar}">Nuevo</a>
                                            </div>
                                            <div class="text-center mb-2">
                                                <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/mantenimiento/listarAdmin}">Volver</a>
                                            </div>
                                    </div>
                                    <div th:if="${ordenes.isEmpty()}"> 
                                        <br>
                                            <div class="card border-secondary p-4 mb-2 text-center" id="color-card">
                                                <h6 id="azul">No existe Orden de Trabajo para mostrar</h6>
                                                <h6 id="azul">Por favor, seleccione Filtro</h6>
                                            </div>
                                            <br>
                                                <div class="text-center mb-2">
                                                    <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Nuevo" th:href="@{/ordenDeTrabajo/registrar}">Nuevo</a>
                                                </div>
                                                <div class="text-center mb-2">
                                                    <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/mantenimiento/listarAdmin}">Volver</a>
                                                </div>
                                                </div>
                                                </div>
                                                <div id="spinner" class="modal" style="display: none;"> 
                                                    <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                                        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                                            <span class="sr-only">Cargando...</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <!-- Modal para mostrar historial -->
                                                <div class="modal fade" id="modalHistorial" tabindex="-1" role="dialog" aria-labelledby="modalHistorialLabel" aria-hidden="true">
                                                    <div class="modal-dialog modal-xl modal-dialog-scrollable" role="document">
                                                        <div class="modal-content">
                                                            <div class="modal-header position-relative modal-header-darkblue">
                                                                <h4 class="modal-title mx-auto">Detalle de Camión</h4>
                                                                <button type="button" class="close text-white" style="position: absolute; right: 15px;" data-dismiss="modal" aria-label="Cerrar">
                                                                    <span aria-hidden="true">&times;</span>
                                                                </button>
                                                            </div>
                                                            <div class="modal-body" id="historialContenido">
                                                                <!-- Aquí se cargará el fragmento HTML con el historial -->
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>                                                                              
                                                <script>
                                                    document.addEventListener("DOMContentLoaded", function () {
                                                        const volverBtn = document.getElementById("ver");
                                                        volverBtn.addEventListener("click", function (e) {
                                                            // Mostrar spinner
                                                            document.getElementById("spinner").style.display = "block";
                                                        });
                                                    });
                                                </script>
                                                <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                </body>
                                                </html>

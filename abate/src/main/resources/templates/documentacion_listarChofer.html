<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Documentacion Listar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css"> 
                        </head>
                        <body>
                            <section>
                                    <div class="card-header mb-2" style="height: 70px;">
                                        <div class="row">
                                            <div class="col-2">   
                                                <a title="Volver" th:href="@{/index}" type="button">
                                                    <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                        <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                    </svg> 
                                                </a>   
                                            </div>
                                            <div  class="col-8 text-center">
                                                <h4>Mi Documentación</h4>
                                            </div>
                                        </div>
                                    </div>
                                <div class="container mb-2">  
                                    <div th:if="${!documentacion.isEmpty()}">
                                        <div th:each="docu : ${documentacion}">
                                            <div class="card border-secondary p-3 mb-1" id="color-card">
                                                <h6 th:text="${docu.tipoDocumentacion.nombre}"></h6>
                                                <div class="row">
                                                    <div class="col-9 col-md-9">
                                                        <p class="mb-1" id="dimgray" th:text="'Vigencia Desde ' + ${#dates.format(docu.fechaAlta, 'dd-MM-yyyy')}"></p>
                                                        <p class="mb-1" id="dimgray" th:text="'Vencimiento ' + ${#dates.format(docu.fechaVencimiento, 'dd-MM-yyyy')}"></p>
                                                        <div class="mb-2">
                                                        <span th:switch="${docu.estado}"><strong>
                                                                <span th:case="'VIGENTE'" th:text="'Estado ✅ VIGENTE '"></span>
                                                                <span th:case="'PRÓXIMO A VENCER'" th:text="'Estado 🟡 PRÓXIMO A VENCER '"></span>
                                                                <span th:case="'VENCIDO'" th:text="'Estado ❌ VENCIDO '"></span>
                                                                <span class="text-primary" th:text="${docu.diasVigencia}+' días'"></span>
                                                            </strong></span> </div>
                                                        <p th:if="${docu.observacion != ''}" id="dimgray" th:text="'Observación '+${docu.observacion}"></p> 
                                                    </div>
                                                    <div class="col-3 col-md-3">
                                                    <div class="text-center">
                                                        <a th:href="@{/imagen/documentacionChofer/__${docu.id}__}" >
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-card-image" viewBox="0 0 16 16">
                                                        <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"/>
                                                        <path d="M1.5 2A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2zm13 1a.5.5 0 0 1 .5.5v6l-3.775-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12v.54L1 12.5v-9a.5.5 0 0 1 .5-.5z"/>
                                                        </svg><p id="icono2">Imagen</p>
                                                        </a>
                                                    </div>
                                                    <div th:if="${flag == true}" class="text-center" title="Ir a Modificar Documentación">
                                                        <a th:href= "@{/documentacion/modificarChofer/__${docu.id}__}">
                                                            <svg id="modificar" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                                                                <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                                                            </svg><p id="modificar">Modificar</p>
                                                        </a>
                                                    </div>
                                                    </div>
                                                </div> 
                                            </div>
                                        </div>
                                        <br>
                                            <div th:if="${flag == true}" class="text-center mb-2">
                                            <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Nuevo" th:href="@{/documentacion/registrarChofer/__${aplica}__}">Nuevo</a>
                                            </div>
                                            <div class="text-center mb-2">
                                                <a class="btn btn-primary bg-primary btn-lg w-50" type="button" th:href="@{/index}">Volver</a>
                                            </div>
                                    </div>    
                                    <div th:if="${documentacion.isEmpty()}">
                                        <br>
                                            <div class="card border-secondary p-4 mb-4 text-center" id="color-card">
                                                <h6 id="azul">No existe Documentación para mostrar</h6>
                                            </div>
                                            <div th:if="${flag == true}" class="text-center mb-2">
                                            <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Nuevo" th:href="@{/documentacion/registrarChofer/__${aplica}__}">Nuevo</a>
                                            </div>
                                            <div class="text-center mb-2">
                                                <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/index}">Volver</a>
                                            </div>
                                    </div>
                                </div>
                            </section>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

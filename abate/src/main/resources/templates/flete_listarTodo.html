<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Flete Listar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css"> 
                        <style>
                            /* Clase para el color rojo suave */
                            .bg-soft-red {
                                background-color: #fdecea; /* Fondo rojo suave */
                                color: #a94442;           /* Texto rojo oscuro */
                                border: 1px solid #f5c6cb; /* Borde rojo claro */
                            }
                            .bg-whitesmoke {
                                background-color: whitesmoke; /* Fondo gris claro */
                                color: black;                /* Texto negro */
                                border: 1px solid #ddd;      /* Borde gris */
                               
                            }
                        </style>
                        </head>

                        <body>
                            <section>
                                <div class="container">

                                    <div class="card-header" style="height: 70px;">
                                        <div class="row">
                                            <div class="col-2">   
                                                <a title="Volver" th:href="@{/index}"  type="button">
                                                    <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                        <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                    </svg> 
                                                </a>   
                                            </div>
                                            <div  class="col-7">
                                                <h4>Lista de Viajes</h4>
                                            </div>
                                            <div class="col-3 text-center" th:if="${flag == true}">
                                                <form title="Exportar a Excel" th:action="@{/flete/exportarAdminTodos}" method="POST">
                                                    <input hidden th:value="${desde}" name="desde"> 
                                                        <input hidden th:value="${hasta}" name="hasta">     
                                                            <button class="btn btn-light" type="submit">
                                                                <h6 id="icono">Exportar</h6> 
                                                            </button>
                                                            </form>
                                                            </div>
                                                            </div>
                                                            </div>

                                                            <div class="card-header pb-0" id="bgWhite">
                                                                <form th:action="@{/flete/listarXfechaAdmin}" method="POST">
                                                                    <div class="row">
                                                                        <div class="col-6 col-md-2 col-lg-2 col-xl-2">
                                                                            <label for="desde" class="form-label">Desde</label>
                                                                            <input type="date" class="form-control" id="desde" th:value="${desde}" name="desde" required>
                                                                        </div>
                                                                        <div class="col-6 col-md-2 col-lg-2 col-xl-2 mb-1">
                                                                            <label for="hasta" class="form-label">Hasta</label>
                                                                            <input type="date" class="form-control" id="hasta" th:value="${hasta}" name="hasta" required>                                                                                          
                                                                        </div> 
                                                                        <div class="col-10 col-md-3 col-lg-3 col-xl-3 mb-1">
                                                                            <label for="chofer" class="form-floting">Chofer</label>  
                                                                            <select class="form-control" id="chofer" name="idChofer">
                                                                                <option th:value="${idChofer}" >Todos los Choferes</option>
                                                                                <option th:each="chofer : ${choferes}"
                                                                                        th:value="${chofer.id}"
                                                                                        th:text="${chofer.nombre}"/>
                                                                            </select>
                                                                        </div>
                                                                        <div class="col-10 col-md-4 col-lg-4 col-xl-4">
                                                                            <label for="chofer" class="form-floting">Cliente</label>  
                                                                            <select class="form-control" id="cliente" name="idCliente">
                                                                                <option th:value="${idCliente}" >Todos los Clientes</option>
                                                                                <option th:each="cliente : ${clientes}"
                                                                                        th:value="${cliente.id}"
                                                                                        th:text="${cliente.nombre}"/>
                                                                            </select>
                                                                        </div>
                                                                        <div class="col-1">
                                                                            <label for="chofer" class="form-floting">Ver</label>
                                                                            <button id="ver"title="Buscar" class="btn btn-primary" type="submit">
                                                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="16" height="22" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                                                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                                                </svg>
                                                                            </button>
                                                                        </div>
                                                                    </div>
                                                                </form>   
                                                            </div>
                                                            <div th:if="${!fletes.isEmpty()}">
                                                            <div class="card-body p-2">
                                                                <h6>
                                                                    <span id='dimgray' th:text="'Cantidad de Viajes '+${cantidad}"></span>
                                                                    <span id='dimgray' th:text="' / Neto $'+${#numbers.formatDecimal(neto, 0, 'POINT', 2, 'COMMA')}"></span>
                                                                    <span id='dimgray' th:text="' / Ganancia Choferes $'+${#numbers.formatDecimal(ganancia, 0, 'POINT', 2, 'COMMA')}"></span>
                                                                </h6>
                                                            </div>
                                                                <div th:each="flete : ${fletes}">                               
                                                                    <div class="card border-secondary p-3 mb-1" th:classappend="${flete.estado != null && flete.estado == 'PENDIENTE'} ? 'bg-soft-red' : 'bg-whitesmoke'">
                                                                  
                                                                        <div class="row">
                                                                            <div class="col-9 col-md-9">
                                                                                <h6 th:text="${flete.estado}" th:if="${flete.estado != 'ACEPTADO'}"></h6>
                                                                                 <h6 th:text="'Fecha ' + ${#dates.format(flete.fechaFlete, 'dd-MM-yyyy')}+' - ID'+${flete.idFlete}"></h6>
                                                                                <h6 th:if="${flete.estado == 'ACEPTADO'}" class="mb-0" id="dimgray" th:text="${flete.producto.nombre}+ ' ' +${#numbers.formatDecimal(flete.kgFlete, 0, 'POINT', 2, 'COMMA')}+ ' KG'"></h6>
                                                                            </div>
                                                                            <div class="col-3 col-md-3 text-center">
                                                                                <a th:href="@{/flete/mostrarFiltrado/__${flete.id}__}" >
                                                                                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-truck" viewBox="0 0 16 16">
                                                                                        <path d="M0 3.5A1.5 1.5 0 0 1 1.5 2h9A1.5 1.5 0 0 1 12 3.5V5h1.02a1.5 1.5 0 0 1 1.17.563l1.481 1.85a1.5 1.5 0 0 1 .329.938V10.5a1.5 1.5 0 0 1-1.5 1.5H14a2 2 0 1 1-4 0H5a2 2 0 1 1-3.998-.085A1.5 1.5 0 0 1 0 10.5zm1.294 7.456A2 2 0 0 1 4.732 11h5.536a2 2 0 0 1 .732-.732V3.5a.5.5 0 0 0-.5-.5h-9a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .294.456M12 10a2 2 0 0 1 1.732 1h.768a.5.5 0 0 0 .5-.5V8.35a.5.5 0 0 0-.11-.312l-1.48-1.85A.5.5 0 0 0 13.02 6H12zm-9 1a1 1 0 1 0 0 2 1 1 0 0 0 0-2m9 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2"/>
                                                                                    </svg>
                                                                                    <p id="icono2">Ver</p>
                                                                                </a>
                                                                            </div>
                                                                        </div> 
                                                                        <div>
                                                                            <p class="mb-0" id="dimgray" th:text="'Origen '+${flete.origenFlete}"></p>
                                                                            <p class="mb-1" id="dimgray" th:text="'Destino '+${flete.destinoFlete}"></p>
                                                                            <h6 id="azul" th:text="'Cliente '+${flete.cliente.nombre}"></h6>
                                                                            <h6 class="mb-0" id="dimgray" th:text="'Chofer '+${flete.chofer.nombre}"></h6>
                                                                        </div>
                                                                  
                                                                </div>
                                                                </div>
                                                                <br>
                                                                        <div class="text-center mb-2">
                                                                            <a class="btn btn-primary bg-primary btn-lg w-50" type="button" th:href="@{/index}">Volver</a>
                                                                        </div>
                                                                    
                                                            </div>
                                    <br>
                                                            <div th:if="${fletes.isEmpty()}">
                                                                <div class="card border-secondary p-4 mb-4 text-center" id="color-card">
                                                                    <h6 id="azul">No existen Viajes para la fecha seleccionada</h6>
                                                                </div>
                                                                        <div class="text-center mb-2">
                                                                            <a class="btn btn-primary bg-primary btn-lg w-50" type="button" th:href="@{/index}">Volver</a>
                                                                        </div>
                                                            </div>
                                                            </div>
                                                            </section>
                                                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                            </body>
                                                            </html>

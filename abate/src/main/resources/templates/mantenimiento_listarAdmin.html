<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Mantenimiento Admin</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">   
                        </head>
                        <body>                       
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/index}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-8 col-sm-8 col-md-8 col-lg-8 col-xl-8 text-center">
                                        <h4>Mantenimiento</h4>
                                    </div>
                                    <!--
                                    <div title="Ir a Registrar Orden de Trabajo" class="col-2 col-sm-2 col-md-1 col-lg-1 col-xl-1 text-center">
                                        <a th:href="@{/ordenDeTrabajo/listar}">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-card-checklist" viewBox="0 0 16 16">
                                                <path d="M14.5 3a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5zm-13-1A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2z"/>
                                                <path d="M7 5.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m-1.496-.854a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0l-.5-.5a.5.5 0 1 1 .708-.708l.146.147 1.146-1.147a.5.5 0 0 1 .708 0M7 9.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m-1.496-.854a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0l-.5-.5a.5.5 0 0 1 .708-.708l.146.147 1.146-1.147a.5.5 0 0 1 .708 0"/>
                                            </svg><h6 id="icono">OT</h6> </a>
                                    </div> 
                                    -->
                                    <div title="Ir a Registrar Tipo" class="col-2 col-sm-2 col-md-1 col-lg-1 col-xl-1 text-center">
                                        <a th:href="@{/tipoMantenimiento/listar}">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-justify" viewBox="0 0 16 16">
                                                <path fill-rule="evenodd" d="M2 12.5a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5"/>
                                            </svg>
                                            <h6 id="icono">Tipo</h6> </a>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2">  
                                <div th:if="${exito != null}" class="alert bg-secondary alert-secondary alert-dismissible fade show mb-2 p-4 text-center" role="alert">                        
                                    <h6 id="white" th:text="${exito}"></h6>  
                                    <button id="white" type="button" class="close" data-dismiss="alert" aria-label="Close">
                                            <span aria-hidden="true">&times;</span>
                                        </button>
                                </div>
                                <div class="row mb-2">
                                    <div class="col-sm-12 col-md-12 col-lg-12 col-xl-12 mb-2">
                                        <div class="card border-secondary p-5 mb-1" id="color-card">
                                            <div class="row mb-5">
                                                <div  class="col-6 text-center">
                                                    <a id="camiones" th:href="@{/mantenimiento/listarAdminCamiones}">

                                                        <h6 id="dimgray">Camiones</h6>
                                                    </a>
                                                </div>
                                                <div  class="col-6 text-center">
                                                    <a id="acoplados" th:href= "@{/mantenimiento/listarAdminAcoplados}">
                                                        <svg width="50" height="50" viewBox="27 10 50 52" xmlns="http://www.w3.org/2000/svg"><path clip-rule="evenodd" d="m26 54c0 1.1.9 2 2 2h3.5c-.3.6-.5 1.3-.5 2 0 2.2 1.8 4 4 4 1.5 0 2.8-.8 3.5-2h3.1c.7 1.2 2 2 3.5 2s2.8-.8 3.5-2h3.1c.7 1.2 2 2 3.5 2 2.2 0 4-1.8 4-4 0-.7-.2-1.4-.5-2h18.3c.6 0 1-.5 1-1v-16c0-.6-.4-1-1-1h-2c-.2 0-.6.2-1 .5s-.8.5-1 .5h-42c-.2 0-.6-.2-1-.5s-.8-.5-1-.5h-2c-.6 0-1 .4-1 1zm25.5 2c-.3.6-.5 1.3-.5 2h-2c0-.7-.2-1.4-.5-2zm1.5 2c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm23-18v14h-48v-14h1c.2 0 .6.2 1 .5s.8.5 1 .5h42c.2 0 .6-.2 1-.5s.8-.5 1-.5zm-34.5 16c-.3.6-.5 1.3-.5 2h-2c0-.7-.2-1.4-.5-2zm3.5 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-12 2c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm1-6c-.6 0-1-.5-1-1v-7c0-.5.4-1 1-1s1 .5 1 1v7c0 .5-.4 1-1 1zm6 0c-.6 0-1-.5-1-1v-7c0-.5.4-1 1-1s1 .5 1 1v7c0 .5-.4 1-1 1zm5-1c0 .5.4 1 1 1s1-.5 1-1v-7c0-.5-.4-1-1-1s-1 .5-1 1zm7 1c-.6 0-1-.5-1-1v-7c0-.5.4-1 1-1s1 .5 1 1v7c0 .5-.4 1-1 1zm5-1c0 .5.4 1 1 1s1-.5 1-1v-7c0-.5-.4-1-1-1s-1 .5-1 1zm7 1c-.6 0-1-.5-1-1v-7c0-.5.4-1 1-1s1 .5 1 1v7c0 .5-.4 1-1 1zm5-1c0 .5.4 1 1 1s1-.5 1-1v-7c0-.5-.4-1-1-1s-1 .5-1 1z" fill-rule="evenodd" fill="#000000" style="fill: rgb(0, 0, 139);"></path></svg>
                                                        <h6 id="dimgray">Acoplados</h6>
                                                    </a>
                                                </div>
                                            </div>
                                            <div class="row">
                                                <div class="col-4"></div>
                                                <div  class="col-4 text-center">
                                                    <a id="proximos" th:href= "@{/mantenimiento/listarAdminVencimiento}" >
                                                        <svg width="50" height="50" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 -70 512 612" style="enable-background:new 0 0 512 512;" xml:space="preserve"><g><g><path d="M505.403,406.394L295.389,58.102c-8.274-13.721-23.367-22.245-39.39-22.245c-16.023,0-31.116,8.524-39.391,22.246 L6.595,406.394c-8.551,14.182-8.804,31.95-0.661,46.37c8.145,14.42,23.491,23.378,40.051,23.378h420.028 c16.56,0,31.907-8.958,40.052-23.379C514.208,438.342,513.955,420.574,505.403,406.394z M477.039,436.372 c-2.242,3.969-6.467,6.436-11.026,6.436H45.985c-4.559,0-8.784-2.466-11.025-6.435c-2.242-3.97-2.172-8.862,0.181-12.765 L245.156,75.316c2.278-3.777,6.433-6.124,10.844-6.124c4.41,0,8.565,2.347,10.843,6.124l210.013,348.292 C479.211,427.512,479.281,432.403,477.039,436.372z" fill="#000000" style="fill: rgb(220, 53, 69);"></path></g></g><g><g><path d="M256.154,173.005c-12.68,0-22.576,6.804-22.576,18.866c0,36.802,4.329,89.686,4.329,126.489 c0.001,9.587,8.352,13.607,18.248,13.607c7.422,0,17.937-4.02,17.937-13.607c0-36.802,4.329-89.686,4.329-126.489 C278.421,179.81,268.216,173.005,256.154,173.005z" fill="#000000" style="fill: rgb(220, 53, 69);"></path></g></g><g><g><path d="M256.465,353.306c-13.607,0-23.814,10.824-23.814,23.814c0,12.68,10.206,23.814,23.814,23.814 c12.68,0,23.505-11.134,23.505-23.814C279.97,364.13,269.144,353.306,256.465,353.306z" fill="#000000" style="fill: rgb(220, 53, 69);"></path></g></g></svg>
                                                        <h6 class="text-danger">Próximo a Vencer</h6>
                                                    </a>
                                                </div>
                                                <div class="col-2"></div>                                                
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="text-center mb-2">
                                    <a class="btn btn-primary bg-primary btn-lg w-50" type="button" th:href="@{/index}">Volver</a>
                                </div>
                            </div>
                            <div id="spinner" class="modal" style="display: none;">
                                <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                    <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                        <span class="sr-only">Cargando...</span>
                                    </div>
                                </div>
                            </div>
                            <script>
                                document.addEventListener("DOMContentLoaded", function () {
                                    const volverBtn = document.getElementById("camiones");
                                    volverBtn.addEventListener("click", function (e) {
                                        // Mostrar spinner
                                        document.getElementById("spinner").style.display = "block";
                                    });
                                });
                                document.addEventListener("DOMContentLoaded", function () {
                                    const volverBtn = document.getElementById("acoplados");
                                    volverBtn.addEventListener("click", function (e) {
                                        // Mostrar spinner
                                        document.getElementById("spinner").style.display = "block";
                                    });
                                });
                                document.addEventListener("DOMContentLoaded", function () {
                                    const volverBtn = document.getElementById("proximos");
                                    volverBtn.addEventListener("click", function (e) {
                                        // Mostrar spinner
                                        document.getElementById("spinner").style.display = "block";
                                    });
                                });

                            </script>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

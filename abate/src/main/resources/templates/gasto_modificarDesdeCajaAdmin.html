<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Gasto Modificar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        <style>
                            #myButton {
                                display: none; 
                            }
                            table {
                                width: 100%;
                                border-collapse: collapse;
                            }
                            th, td {
                                border: 1px solid black;
                                padding: 8px;
                            }
                            th {
                                text-align: center;
                                background-color: #f2f2f2;
                            }
                            td {
                                text-align: center;
                            }
                            button {
                                cursor: pointer;
                            }
                            .total-row {
                                font-weight: bold;

                            }
                            .btn-eliminar {
                                background: none;
                                border: none;
                                font-size: 16px;
                                cursor: pointer;
                            }
                        </style>
                        <script>
                            document.addEventListener('DOMContentLoaded', function () {
                                const option1 = document.querySelector('input[name="options"][value="option1"]');
                                const option2 = document.querySelector('input[name="options"][value="option2"]');
                                const myButton = document.getElementById('myButton');

                                // Ocultar botón si option1 está seleccionado al cargar la página
                                if (option1.checked) {
                                    myButton.style.display = 'none';
                                }

                                // Añadir eventos para detectar cambios en los inputs de radio
                                option1.addEventListener('change', function () {
                                    if (option1.checked) {
                                        myButton.style.display = 'none'; // Ocultar el botón si Opción 1 está seleccionada
                                    }
                                });

                                option2.addEventListener('change', function () {
                                    if (option2.checked) {
                                        myButton.style.display = 'block'; // Mostrar el botón si Opción 2 está seleccionada
                                    }
                                });
                            });
                            function agregarDetalle() {
                                var concepto = document.getElementById("concepto").value;
                                var cantidad = document.getElementById("cantidad").value;
                                var precio = document.getElementById("precio").value;

                                if (concepto === "") {
                                    alert("Por favor, ingrese concepto");
                                    return;
                                }
                                if (cantidad === "" || cantidad <= 0) {
                                    alert("Por favor, ingrese cantidad");
                                    return;
                                }
                                if (precio === "" || precio <= 0) {
                                    alert("Por favor, ingrese precio");
                                    return;
                                }

                                var total = cantidad * precio;
                                var table = document.getElementById("tabla-detalles").getElementsByTagName('tbody')[0];

                                console.log("Valor recibido:", total);
                                console.log("Tipo de valor:", typeof valor);

                                var newRow = table.insertRow();
                                newRow.innerHTML = `
            <td><input type="hidden" name="conceptos[]" value="${concepto}">${concepto}</td>
            <td><input type="hidden" name="cantidades[]" value="${cantidad}">${cantidad}</td>
            <td><input type="hidden" name="precios[]" value="${precio}">$${parseInt(precio).toLocaleString("es-AR")}</td>
            <td class="total-col"><input type="hidden" name="totales[]" value="${total}">$${parseInt(total).toLocaleString("es-AR")}</td>
            <td><button type="button" class="btn-eliminar" onclick="eliminarFila(this)">❌</button></td>
        `;
                                actualizarTotal();

                                document.getElementById("concepto").value = "";
                                document.getElementById("cantidad").value = "";
                                document.getElementById("precio").value = "";
                            }

                            function eliminarFila(btn) {
                                var row = btn.parentNode.parentNode;
                                row.parentNode.removeChild(row);
                                actualizarTotal();
                            }


                            function actualizarTotal() {
                                let totalGeneral = 0;

                                document.querySelectorAll(".total-col").forEach(td => {
                                    let valorTexto = td.textContent.trim(); // Obtener el texto de la celda
                                    let valorNumerico = parseInt(valorTexto.replace(/[^0-9]/g, ""), 10); // Extraer solo los números
                                    totalGeneral += isNaN(valorNumerico) ? 0 : valorNumerico; // Evitar NaN
                                });

                                let totalElement = document.getElementById("totalGeneral");
                                if (totalElement) {
                                    totalElement.textContent = `$${totalGeneral.toLocaleString("es-AR")}`;
                                } else {
                                    console.error("Error: No se encontró el elemento con id 'totalGeneral'");
                                }
                            }
                            function validarFormulario(event) {
                                const productosSeleccionados = document.getElementById("item");
                                if (productosSeleccionados.children.length === 0) {
                                    alert("Debes ingresar al menos un ítem de gasto");
                                    return false;
                                }

                                return true;
                            }
                        </script>
                        </head>
                        <body>                       
                            <div class="card-header mb-2">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/caja/mostrarAdmin/__${gasto.chofer.id}__}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-7 col-sm-7 col-md-7 col-lg-8 col-xl-8 text-center">
                                        <h4>Modificar Gasto</h4>
                                    </div>
                                    <div title="Ir a Eliminar Gasto" class="col-3 col-sm-3 col-md-3 col-lg-2 col-xl-2 text-center">
                                        <a th:href="@{/gasto/eliminarDesdeCaja/__${gasto.id}__}">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                                                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                                                <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                                            </svg> <h6 id="icono">Eliminar</h6> </a>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2">   
                                <div class="card border-secondary p-2" id="color-card">
                                    <form id="form" th:action="@{/gasto/modificaDesdeCajaAdmin}" method="POST">  
                                        <input hidden th:value="${gasto.id}" name="idGasto">  
                                            <div class="row">        
                                                <div class="row col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2" th:if="${gasto.estado == 'ACEPTADO'}">
                                                    <div class="col-10 col-sm-10 col-md-10 col-lg-10 col-xl-10">
                                                        <div class="form-check">
                                                            <input class="form-check-input" type="radio"  name="options" value="option1" checked >
                                                                <label class="form-check-label" for="option1">
                                                                    <h6 id="darkgray">CONFIRMADO</h6>
                                                                </label>
                                                        </div>
                                                        <div class="form-check">
                                                            <input class="form-check-input" type="radio" name="options" value="option2">
                                                                <label class="form-check-label" for="option2">
                                                                    <h6 id="dimgray">PENDIENTE</h6>
                                                                </label>
                                                        </div>
                                                    </div>
                                                    <div title="Ir a Retornar a Pendiente" class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2">
                                                        <a id="myButton" type="button" th:href="@{/gasto/volverPendiente/__${gasto.id}__}">
                                                            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-check-square-fill" viewBox="0 0 16 16">
                                                                <path d="M2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2zm10.03 4.97a.75.75 0 0 1 .011 1.05l-3.992 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.75.75 0 0 1 1.08-.022z"/>
                                                            </svg>
                                                        </a>
                                                    </div>
                                                </div> 
                                            </div>
                                            <div class="row">
                                                <div class="col-5 col-sm-5 col-md-5 col-lg-5 col-xl-5">
                                                    <label for="fecha" class="form-label text-secondary">Fecha*</label>
                                                    <input type="date" class="form-control" id="fecha" th:value="${gasto.fecha}" name="fecha" required>
                                                </div>
                                                <div class="col-7 col-sm-7 col-md-7 col-lg-5 col-xl-5 mb-2">
                                                    <label for="idCamion" class="form-floting text-secondary">Camión*</label>
                                                    <select class="form-control" id="idCamion" name="idCamion" required>
                                                        <option selected th:text="${gasto.camion.dominio}+' - '+${gasto.camion.marca}+' '+${gasto.camion.modelo}" th:value="${gasto.camion.id}"></option>
                                                        <option th:each="camion : ${camiones}"
                                                                th:value="${camion.id}"
                                                                th:text="${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}"/>
                                                    </select>
                                                </div>
                                            </div>
                                            <div class="row mb-2">
                                                <div class="col-md-10">
                                                    <label for="concepto" class="form-label text-secondary">Concepto*</label>
                                                    <input type="text" class="form-control" id="concepto" placeholder="Ingrese Concepto" name="concepto" minlength="1" maxlength="40" size="40">
                                                </div>
                                            </div>
                                            <div class="row mb-3"> 
                                                <div class="col-5">
                                                    <label for="cantidad" class="form-label text-secondary">Cantidad*</label>
                                                    <input type="number" step="1" class="form-control" id="cantidad" placeholder="Ingrese Cantidad" name="cantidad">
                                                </div>
                                                <div class="col-5">
                                                    <label for="precio" class="form-label text-secondary">Precio Unitario*</label>
                                                    <input type="number" step="1" class="form-control" id="precio" placeholder="Ingrese Precio" name="precio">
                                                </div>
                                                <div class="col-1">  
                                                    <div class="form-floating">
                                                        <label class="form-label text-white"></label><br><br>
                                                                <button type="button" class="btn btn-outline-primary border-primary p-1" onclick="agregarDetalle()" title="Agregar Detalle">
                                                                    <svg id="white" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-plus-square-fill" viewBox="0 0 16 16">
                                                                        <path d="M2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2zm6.5 4.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3a.5.5 0 0 1 1 0"/>
                                                                    </svg>
                                                                </button>
                                                                </div>
                                                                </div>                  
                                                                </div>
                                                                <div class="table-responsive">
                                                                    <div class="table mb-5 text-center">
                                                                        <table class="table table-borderless table-sm" id="tabla-detalles">
                                                                            <thead>
                                                                                <tr id="darkblue">
                                                                                    <td>Concepto</td>
                                                                                    <td>Cantidad</td>
                                                                                    <td>Precio</td>
                                                                                    <td>SubTotal</td>
                                                                                    <td>Acción</td>
                                                                                </tr>
                                                                            </thead>
                                                                            <tbody id="item" style="color: dimgray">
                                                                                <tr th:each="detalle : ${gasto.detalles}">
                                                                                    <td><input type="hidden" name="conceptos[]" th:value="${detalle.concepto}" th:text="${detalle.concepto}"></td>
                                                                                    <td><input type="hidden" name="cantidades[]" th:value="${detalle.cantidad}" th:text="${detalle.cantidad}"></td>
                                                                                    <td><input type="hidden" name="precios[]" th:value="${detalle.precio}" th:text="'$'+${#numbers.formatDecimal(detalle.precio, 0, 'POINT', 0, 'POINT')}"></td>
                                                                                    <td class="total-col"><input type="hidden" name="totales[]" th:value="${detalle.cantidad * detalle.precio}" th:text="'$'+${#numbers.formatDecimal(detalle.cantidad * detalle.precio, 0, 'POINT', 0, 'POINT')}"></td>
                                                                                    <td><button type="button" class="btn-eliminar" title="Quitar Item" onclick="eliminarFila(this)">❌</button></td>
                                                                                </tr>
                                                                            </tbody>
                                                                            <tfoot>
                                                                                <tr>
                                                                                    <th id="dimgray">TOTAL</th>
                                                                                    <td></td>
                                                                                    <td></td>
                                                                                    <th id="totalGeneral" style="color : dimgray" th:text="'$'+${#numbers.formatDecimal(gasto.importe, 0, 'POINT', 0, 'POINT')}"></th>
                                                                                    <td></td>
                                                                                </tr>
                                                                            </tfoot>
                                                                        </table>
                                                                    </div>
                                                                </div>
                                                                <div class="text-center mb-2">
                                                                    <button type="submit" class="btn btn-secondary bg-secondary border-light w-50" onclick="return validarFormulario()" title="Modificar Gasto">Modificar</button>
                                                                </div>
                                                                <div class="text-center">
                                                                    <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href="@{/caja/mostrarAdmin/__${gasto.chofer.id}__}" title="Cancelar">Cancelar</a>
                                                                </div>
                                                                </form>
                                                                </div>    
                                                                </div>
                                                                <script>
                                                                    document.getElementById('cantidad').addEventListener('keydown', function (event) {
                                                                        if (event.key === '.' || event.key === ',') {
                                                                            event.preventDefault();
                                                                        }
                                                                    });

                                                                    document.getElementById('cantidad').addEventListener('input', function () {
                                                                        this.value = this.value.replace(/[^0-9]/g, ''); // Elimina cualquier carácter no numérico
                                                                    });
                                                                    document.getElementById('precio').addEventListener('keydown', function (event) {
                                                                        if (event.key === '.' || event.key === ',') {
                                                                            event.preventDefault();
                                                                        }
                                                                    });
                                                                    document.getElementById('precio').addEventListener('input', function () {
                                                                        this.value = this.value.replace(/[^0-9]/g, ''); // Elimina cualquier carácter no numérico
                                                                    });
                                                                    const conceptoInput = document.getElementById('concepto');
                                                                    const maxLength = 40;

                                                                    conceptoInput.addEventListener('input', function () {
                                                                        if (conceptoInput.value.length > maxLength) {
                                                                            conceptoInput.value = conceptoInput.value.slice(0, maxLength);
                                                                        }
                                                                    });
                                                                </script>
                                                                <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                                <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                                </body>
                                                                </html>

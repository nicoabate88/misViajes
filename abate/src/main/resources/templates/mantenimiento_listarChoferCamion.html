<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Mantenimiento Listar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css"> 
                        </head>
                        <body>
                            <section>
                                <div class="card-header mb-2" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">   
                                            <a title="Volver" th:href="@{/mantenimiento/listarChofer}" type="button">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                </svg> 
                                            </a>   
                                        </div>
                                        <div  class="col-8 text-center">
                                            <h4>Mantenimiento de Camión</h4>
                                        </div>
                                    </div>
                                </div>
                                <div class="container mb-2">  
                                    <div class="card border-secondary p-2 mb-2" id="color-card">
                                        <div class="row">
                                            <div class="col-12 col-sm-12 col-md-12 col-lg-6 col-xl-6 pb-3">
                                                <label for="idCamion" class="form-floting text-secondary">Camión*</label>
                                                <select class="form-control text-secondary" id="idCamion" name="idCamion" onchange="enviarDatos()">
                                                    <option selected th:text="${camion.dominio}+' '+${camion.marca}+' '+${camion.modelo}" th:value="${camion.id}"></option>
                                                    <option th:each="camion : ${camiones}"
                                                            th:value="${camion.id}"
                                                            th:text="${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}"/>
                                                </select>
                                            </div>            
                                        </div>
                                    </div>
                                    <div th:if="${mantenimientos.size >= 1}">
                                        <div th:each="mantenimiento : ${mantenimientos}">
                                            <div class="card border-secondary p-3 mb-1" id="color-card">
                                                <h6><strong th:text="${mantenimiento.tipoMantenimiento.nombre}"></strong></h6>
                                                <div class="row">
                                                    <div class="col-9 col-sm-9 col-md-9 col-xl-9 col-lg-9">
                                                        <p class="mb-1" id="dimgray" th:text="'Fecha ' + ${#dates.format(mantenimiento.fecha, 'dd-MM-yyyy')}"></p>
                                                        <h6 class="mb-2" id="dimgray" th:text="'Km Mantenimiento: ' +${#numbers.formatDecimal(mantenimiento.km, 0, 'POINT', 0, 'POINT')}"></h6>
                                                        <h6><strong class="mb-2" id="dimgray" th:text="'KM Actual Camión ' +${#numbers.formatDecimal(mantenimiento.kmActual, 0, 'POINT', 0, 'POINT')}"></strong></h6>
                                                        <div th:if="${mantenimiento.kmProximo != 0}" class="mb-2">
                                                            <span class="mb-2 text-dark" th:switch="${mantenimiento.estado}"><strong>
                                                                    <span >Estado</span>
                                                                    <span th:case="${T(abate.abate.entidades.Mantenimiento.Estado).VIGENTE}">✅ VIGENTE</span>
                                                                    <span th:case="${T(abate.abate.entidades.Mantenimiento.Estado).PROXIMO_A_VENCER}">🟡 PRÓXIMO A VENCER</span>
                                                                    <span th:case="${T(abate.abate.entidades.Mantenimiento.Estado).VENCIDO}">❌ VENCIDO</span>
                                                                    <span class="text-primary" th:text="' '+${#numbers.formatDecimal(mantenimiento.kmVigencia, 0, 'POINT', 0, 'POINT')}+' Km'"></span>
                                                                </strong></span>
                                                        </div>
                                                        <h6 th:if="${mantenimiento.kmProximo != 0}" class="mb-2 text-dark" th:text="'🔧 Próximo Mantenimiento '+${#numbers.formatDecimal(mantenimiento.kmProximo, 0, 'POINT', 0, 'POINT')}+' KM'"></h6>
                                                    </div>
                                                    <div th:if="${flag == true}" class="text-center col-3 col-sm-3 col-md-3 col-xl-3 col-lg-3" title="Ir a Modificar Documentación">
                                                        <a th:href= "@{/mantenimiento/modificar/__${mantenimiento.id}__}">
                                                            <svg id="modificar" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                                                                <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                                                            </svg><p id="modificar">Modificar</p>
                                                        </a>
                                                    </div>
                                                </div>  
                                                <p th:if="${mantenimiento.observacion != ''}" class="mb-0" id="dimgray" th:text="'Observación '+${mantenimiento.observacion}"></p> 
                                            </div>
                                        </div>
                                        <br>
                                            <div class="text-center mb-2">
                                                <a type="button" title="Ver Historial" th:href="@{/mantenimiento/listarHistorialChoferCamion/__${camion.id}__}" th:text="' 🛠 Ver Historial de Mantenimiento'"></a>                        
                                            </div>
                                            <br>
                                                <div th:if="${flag == true}" class="text-center mb-2">
                                                    <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Nuevo" th:href="@{/mantenimiento/registrarMasivoChofer}">Nuevo</a>
                                                </div>
                                                <div class="text-center mb-2">
                                                    <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/mantenimiento/listarChofer}">Volver</a>
                                                </div>
                                                </div>
                                                <div th:if="${mantenimientos.size < 1}">                       
                                                    <div class="card border-secondary p-4 mb-2 text-center" id="color-card">
                                                        <h6 id="azul">No existe Mantenimiento de Camión para mostrar</h6>
                                                    </div>
                                                    <br>
                                                        <div th:if="${flag == true}" class="text-center mb-2">
                                                            <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Nuevo" th:href="@{/mantenimiento/registrarMasivoChofer}">Nuevo</a>
                                                        </div>
                                                        <div class="text-center mb-2">
                                                            <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/mantenimiento/listarChofer}">Volver</a>
                                                        </div>
                                                </div>
                                                </div>
                                                </section>
                                                <script>
                                                    function enviarDatos() {
                                                        let idCamion = document.getElementById("idCamion").value;

                                                        window.location.href = `/mantenimiento/listarChoferCamion?idCamion=${idCamion}`;

                                                    }
                                                </script>
                                                <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                </body>
                                                </html>

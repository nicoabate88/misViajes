<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    
    <head>
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>

            body{
                background-color:#f4f6f9;
            }

            .card-financiera{
                border:none;
                border-radius:15px;
                overflow:hidden;
            }

            .card-header-financiero{
                background:linear-gradient(135deg,#1e3c72,#2a5298);
                color:white;
                padding:20px;
            }

            .titulo-financiero{
                font-weight:700;
                margin-bottom:5px;
            }

            .subtitulo-financiero{
                opacity:0.85;
                margin-bottom:0;
            }

            .card-resumen{
                border:none;
                border-radius:15px;
            }

            .limite{
                font-size:1.5rem;
                font-weight:700;
                color:#007bff;
            }

            .saldo-positivo{
                font-size:1.5rem;
                font-weight:700;
                color:#198754;
            }

            .saldo-liberar{
                font-size:1.5rem;
                font-weight:700;
                color: #f1c40f;
            }

            .saldo-negativo{
                font-size:1.5rem;
                font-weight:700;
                color:#dc3545;
            }

            .tabla-financiera tbody tr:hover{
                background-color:#f8f9fa;
            }

            .badge-operacion{
                padding:8px 10px;
                border-radius:8px;
                font-size:0.85rem;
            }

            .btn-financiero{
                border-radius:10px;
                padding:10px 20px;
                font-weight:600;
            }

            .fila-cheque-pendiente {
                background-color: #fff3cd !important;
            }

            .fila-cheque-pendiente td {
                border-top: 1px solid #ffeeba;
            }

        </style>

    </head>
    <body>
    <div th:fragment="resultados">
        <div class="table-responsive">
            <div class="row mb-4">
                
                <div class="col-md-3 mb-3">

                    <div class="card shadow-sm card-resumen h-100">

                        <div class="card-body">

                            <div class="text-muted small mb-2">
                                Banco
                            </div>

                            <div class="font-weight-bold"
                                 th:text="${cuenta.banco}">
                            </div>

                        </div>

                    </div>

                </div>
                
                <div class="col-md-4 mb-3">

                    <div class="card shadow-sm card-resumen h-100">

                        <div class="card-body">

                            <div class="text-muted small mb-2">
                                Titular
                            </div>

                            <div class="font-weight-bold"
                                 th:text="${titular.nombre}">
                            </div>

                        </div>

                    </div>

                </div>
                    
                <!-- TOTAL MOVIMIENTOS -->

                <div class="col-md-2 mb-3">

                    <div class="card shadow-sm card-resumen h-100">

                        <div class="card-body">

                            <div class="text-muted small mb-2">
                                Total Cheques
                            </div>

                            <div class="saldo-positivo"
                                 th:text="${#lists.size(movimientos)}">
                                0
                            </div>

                        </div>

                    </div>

                </div>

                <!-- LIMITE -->

                <div class="col-md-3 mb-3">

                    <div class="card shadow-sm card-resumen h-100">

                        <div class="card-body">

                            <div class="text-muted small mb-2">
                                Importe Total
                            </div>

                            <div class="limite"
                                 th:text="'$'+${#numbers.formatDecimal(totalPendiente,1,'POINT',2,'COMMA')}">
                            </div>

                        </div>

                    </div>

                </div>
                
                </div>
                
                
            </div>
            <table class="table table-hover align-middle">
                <thead>
                    <tr>

                        <th>
                            Fecha
                        </th>

                        <th>
                            Cheque
                        </th>

                        <th>
                            Acreditación
                        </th>

                        <th>
                            Importe
                        </th>

                        <th>
                            Descripción
                        </th>

                    </tr>
                </thead>
                <tbody>

                    <tr th:each="m : ${movimientos}">

                        <!-- FECHA -->

                        <td th:text="${#dates.format(m.fecha,'dd/MM/yyyy HH:mm')}">
                        </td>

                        <!-- CHEQUE -->

                        <td>

                            <span th:if="${m.cheque != null}"
                                  th:text="${m.cheque.numeroCheque}">
                            </span>

                            <span th:if="${m.cheque == null}"
                                  class="text-muted">

                                -

                            </span>

                        </td>

                        <!-- FECHA ACREDITACION -->

                        <td>

                            <span th:if="${m.cheque != null}" th:text="${#dates.format(m.cheque.fechaAcreditacion,'dd/MM/yyyy')}">
                            </span>

                            <span th:if="${m.cheque == null}"
                                  class="text-muted">

                                -

                            </span>
                        </td>

                        <!-- IMPORTE -->

                        <td class="font-weight-bold">

                            <span class="text-danger"
                                  th:if="${m.tipoMovimiento.name() == 'VENTA_CHEQUE'}"
                                  th:text="'-$'+${#numbers.formatDecimal(m.importe,1,'POINT',2,'COMMA')}">
                            </span>

                            <span class="text-success"
                                  th:if="${m.tipoMovimiento.name() != 'VENTA_CHEQUE'}"
                                  th:text="'+$'+${#numbers.formatDecimal(m.importe,1,'POINT',2,'COMMA')}">
                            </span>

                        </td>

                        <!-- DESCRIPCION -->

                        <td th:text="${m.descripcion}">
                        </td>

                    </tr>

                    <!-- SIN DATOS -->

                    <tr th:if="${#lists.isEmpty(movimientos)}">

                        <td colspan="7"
                            class="text-center text-muted py-5">

                            No existen movimientos registrados.

                        </td>

                    </tr>

                </tbody>
            </table>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>

<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Tipo Documentacion Registrar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        </head>
                        <body>
                                <div class="card-header mb-2" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">   
                                            <a title="Volver" th:href="@{/tipoDocumentacion/listar}" type="button">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                </svg> 
                                            </a>   
                                        </div>
                                        <div  class="col-8 text-center">
                                            <h4>Registrar Tipo de Documentación</h4>
                                        </div>
                                    </div>
                                </div>
                            <div class="container mb-2"> 
                                <div class="card border-secondary p-2" id="color-card">
                                    <form id="formulario" th:action="@{/tipoDocumentacion/registro}" method="POST">
                                        <div class="row">
                                        <div class="col-6 col-sm-6 col-md-6 col-lg-6 col-xl-6 mb-2">
                                            <label for="nombre" class="form-label text-secondary">Tipo de Documentación*</label>                                
                                            <input type="text" class="form-control" id="nombre" placeholder="Ingrese Nombre" name="nombre" th:value="${nombre}" required maxlength="75" size="75">     
                                        </div>    
                                        </div>
                                        <div class="mb-5">
                                            <label>Aplica a*</label>
                                            <div th:each="valor : ${aplicaA}">
                                                <input type="checkbox" name="aplicaA" th:value="${valor}" th:id="${valor}"/>
                                                <label th:for="${valor}" th:text="${valor}"></label>
                                            </div>
                                        </div>
                                        <div th:if="${error != null}" class="card bg-secondary mb-4 p-3 border border-secondary rounded text-center">                        
                                            <h6 id="white" th:text="${error}"></h6>                                                                             
                                        </div>
                                        <div class="text-center mb-2">
                                            <button class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Registrar Tipo de Documentación">Registrar</button>
                                        </div>
                                        <div class="text-center">
                                            <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href="@{/tipoDocumentacion/listar}" title="Cancelar">Cancelar</a>
                                        </div> 
                                    </form>
                                </div>
                            </div>
                            <script>
                                document.getElementById("formulario").addEventListener("submit", function (event) {
                                    let checkboxes = document.querySelectorAll("input[name='aplicaA']:checked");

                                    if (checkboxes.length === 0) {
                                        alert("Debe seleccionar al menos un valor en 'Aplica a'.");
                                        event.preventDefault(); // Evita que el formulario se envíe
                                    }
                                });
                            </script>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

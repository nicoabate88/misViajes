<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Combustible Modificar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        <script>
                            window.onload = function () {
                                var fechaActual = new Date();
                                var dia = String(fechaActual.getDate()).padStart(2, '0');
                                var mes = String(fechaActual.getMonth() + 1).padStart(2, '0');
                                var anio = fechaActual.getFullYear();
                                var fechaFormateada = anio + '-' + mes + '-' + dia;

                                document.getElementById('fecha').max = fechaFormateada;
                            };
                        </script>
                        </head>
                        <body>

                            <div class="container">
                                <div class="card-header mb-2" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">   
                                            <a title="Volver" th:href="@{/combustible/listarChofer/__${carga.chofer.id}__}" type="button">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                </svg> 
                                            </a>   
                                        </div>
                                        <div  class="col-7">
                                            <h4>Modificar Carga Diesel</h4>
                                        </div>
                                        <div title="Ir a Eliminar Diesel" class="col-3 text-center">
                                            <a th:if="${flag == true}" th:href="@{/combustible/eliminar/__${carga.id}__}">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                                                    <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                                                    <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                                                </svg><h6 id="icono">Eliminar</h6> </a>
                                        </div>
                                    </div>
                                </div>
                                <div class="card border-secondary p-2" id="color-card">
                                    <form id="form" th:action="@{/combustible/modifica/__${carga.id}__}" method="POST">

                                        <input hidden th:value="${carga.id}" name="id">
                                            <input type="date" id="fechaAnterior" hidden th:value="${fechaAnterior}"> 
                                                <input hidden id="kmAnterior" th:value="${carga.kmAnterior}">
                                                <div class="row">
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                        <label for="chofer" class="form-floting text-secondary">Camión</label>
                                                        <input type="text" class="form-control" id="chofer" th:value="${carga.camion.dominio}+' - '+${carga.camion.marca}+' '+${carga.camion.modelo}" disabled readonly>
                                                    </div>
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                        <label for="anterior" class="form-floting text-secondary">KM Carga Anterior</label>
                                                        <input type="text" class="form-control" id="anterior" th:value="${#numbers.formatDecimal(carga.kmAnterior, 0, 'POINT', 1, 'COMMA')}" disabled readonly>
                                                    </div>
                                                    <div class="d-none d-sm-block col-lg-4 col-xl-4">
                                                    </div>
                                                </div>
                                                <div class="row">
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                        <label for="fecha" class="form-label text-secondary">Fecha*</label>
                                                        <input type="date" class="form-control" id="fecha" th:value="${carga.fechaCarga}" name="fecha" required>
                                                    </div>
                                                    <div class="col-6 col-sm-6 col-md-6">
                                                    </div>
                                                </div>
                                                <div class="row">
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                        <label for="km" class="form-label text-secondary">KM Carga Actual*</label>
                                                        <div class="input-group">
                                                            <span class="input-group-text">KM</span>
                                                            <input type="number" class="form-control" id="km" th:value="${carga.kmCarga}" name="km" required oninput="calcularTotalKm(); calcularConsumo()">
                                                        </div>    
                                                    </div>
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4">
                                                        <label for="kmTotal" class="form-label text-secondary">Total KM</label>
                                                        <div class="input-group">
                                                            <span class="input-group-text">km</span>
                                                            <input type="number" step="0.01" class="form-control" id="kmTotal" th:value="${carga.kmRecorrido}" readonly>
                                                        </div>
                                                    </div>
                                                    <div class="d-none d-sm-block col-lg-4 col-xl-4">
                                                    </div>
                                                </div>
                                                <div class="row">
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                        <label for="litros" class="form-label text-secondary">Litros*</label>
                                                        <div class="input-group">
                                                            <span class="input-group-text">Lts</span>
                                                            <input type="number" class="form-control" id="litros" th:value="${carga.litro}" name="litro" required oninput="calcularConsumo()">
                                                        </div>    
                                                    </div>
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4">
                                                        <label for="consumo" class="form-label text-secondary">Consumo</label>
                                                        <div class="input-group">
                                                            <span class="input-group-text">Lts</span>
                                                            <input type="number" step="0.01" class="form-control" id="consumo" th:value="${carga.consumo}" readonly>
                                                        </div>
                                                    </div>
                                                    <div class="d-none d-sm-block col-lg-4 col-xl-4">
                                                    </div>
                                                </div>
                                                <div class="row">
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-5">
                                                        <label for="completo" class="form-floting text-secondary">Tanque Completo*</label>
                                                        <select class="form-control" id="cereal" name="completo" required>
                                                            <option selected th:text="${carga.completo}" th:value="${carga.completo}">Seleccione</option>
                                                            <option value="SI">SI</option>
                                                            <option value="NO">NO</option>
                                                        </select>
                                                    </div>
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-6 col-xl-6">
                                                    </div>
                                                </div>
                                                <div th:if="${carga.azul != null}" class="row">
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-5">
                                                        <label for="azul1" class="form-label text-primary">Urea</label>
                                                        <div class="input-group">
                                                            <span class="input-group-text bg-primary">Lts</span>
                                                            <input type="number" class="form-control" id="azul" th:value="${carga.azul.litro}" name="azul">
                                                        </div>    
                                                    </div>                                                   
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-6 col-xl-6">
                                                    </div>
                                                </div>
                                                <div th:if="${carga.azul == null}">
                                                    <div th:if="${carga.camion.azul == 'HABILITADO'}" class="row">
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-5">
                                                        <label for="azul2" class="form-label text-primary">Urea</label>
                                                        <div class="input-group">
                                                            <span class="input-group-text bg-primary">Lts</span>
                                                            <input type="number" class="form-control" id="azul2" placeholder="Ingrese Litros" name="azul">
                                                        </div>    
                                                    </div>
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-6 col-xl-6">
                                                    </div>
                                                    </div>
                                                </div>

                                                <div class="text-center mb-2">
                                                    <button class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Modificar Disel">Modificar</button>
                                                </div>
                                                <div class="text-center">
                                                    <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href="@{/combustible/listarChofer/__${carga.chofer.id}__}" title="Cancelar">Cancelar</a>
                                                </div> 
                                                </form>
                                                </div>
                                                </div>
                                                <script>
                                                    document.getElementById('form').addEventListener('submit', function (event) {
                                                        var fechaAnterior = new Date(document.getElementById('fechaAnterior').value);
                                                        var fechaActual = new Date(document.getElementById('fecha').value);
                                                        const kmAnterior = parseInt(document.getElementById('kmAnterior').value);
                                                        const kmActual = parseInt(document.getElementById('km').value);
                                                        const litros = parseInt(document.getElementById('litros').value);

                                                        if (fechaActual < fechaAnterior) {
                                                            alert('Fecha Seleccionada debe ser mayor a ' + formatearFecha(fechaAnterior));
                                                            event.preventDefault();
                                                            return;
                                                        }

                                                        if (kmActual <= kmAnterior) {
                                                            alert('KM Carga Actual debe ser mayor que KM Carga Anterior: ' + kmAnterior);
                                                            event.preventDefault();
                                                            return;
                                                        }

                                                        
                                                        if (litros <= 0) {
                                                            alert('Litros debe ser mayor que 0');
                                                            event.preventDefault();
                                                            return;
                                                        }                                                                         

                                                        function formatearFecha(fecha) {
                                                            var dia = String(fecha.getDate()).padStart(2, '0');
                                                            var mes = String(fecha.getMonth() + 1).padStart(2, '0'); // Los meses empiezan desde 0
                                                            var anio = fecha.getFullYear();
                                                            return dia + '-' + mes + '-' + anio;
                                                        }

                                                    });
                                                    function calcularTotalKm() {
                                                        const kmInicial = parseFloat(document.getElementById('kmAnterior').value) || 0;
                                                        const kmFinal = parseFloat(document.getElementById('km').value) || 0;
                                                        const kmTotal = kmFinal - kmInicial;

                                                        document.getElementById('kmTotal').value = kmTotal >= 0 ? kmTotal.toFixed(1) : '';
                                                    }

                                                    function calcularConsumo() {
                                                        const litros = parseFloat(document.getElementById('litros').value) || 0;
                                                        const kmTotal = parseFloat(document.getElementById('kmTotal').value) || 0;

                                                        if (litros > 0 && kmTotal > 0) {

                                                            const consumoPromedio = (100 * litros) / kmTotal;

                                                            document.getElementById('consumo').value = consumoPromedio.toFixed(2);
                                                        } else {

                                                            document.getElementById('consumo').value = '';
                                                        }
                                                    }
                                                </script>
                                                <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                </body>
                                                </html>

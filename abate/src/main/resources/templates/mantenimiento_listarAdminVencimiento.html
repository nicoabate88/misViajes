<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Mantenimiento a Vencer</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
                        <link rel="stylesheet" href="/css/medidas_container.css">   
                            <style>
                                .link-historial {
                                    color: darkgrey;
                                    background: none;
                                    border: none;
                                    padding: 0;
                                    cursor: pointer;
                                }
                                .modal-header-darkblue {
                                    background-color: darkblue;
                                    color: white;
                                }
                                /* Estilo para pantallas md */
                                @media (max-width: 991.98px) {
                                    .table {
                                        font-size: 13px;
                                    }
                                    .text-dark {
                                        font-size: 13px;
                                    }
                                }
                                /* Estilo para pantallas sm */
                                @media (max-width: 767.98px) {
                                    .table {
                                        font-size: 10px;
                                    }
                                    .text-dark {
                                        font-size: 13px;
                                    }
                                }
                                .text-green {
                                    color: green;
                                    font-size: 1.2em;
                                }

                                .text-yellow {
                                    color: orange;
                                    font-size: 1.2em;
                                }

                                .text-red {
                                    color: red;
                                    font-size: 1.2em;
                                }
                            </style>
                            </head>
                            <body>                        
                                <div class="card-header mb-4" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">   
                                            <a title="Volver" th:href="@{/mantenimiento/listarAdmin}" type="button">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                </svg> 
                                            </a>   
                                        </div>
                                        <div  class="col-7 col-sm-7 col-md-8 col-lg-8 col-xl-8 text-center">
                                            <h4>Mantenimiento Próximo a Vencer</h4>
                                        </div>
                                        <div title="Exportar a Excel" class="col-3 col-sm-3 col-md-2 col-lg-2 col-xl-2 text-center" th:if="${flag == true}">
                                            <form th:action="@{/mantenimiento/exportarVencimiento}" method="POST">      
                                                <input hidden th:value="${km}" name="km">   
                                                    <button id="exportar" class="btn btn-light" type="submit">
                                                        <h6 id="icono">Exportar</h6> 
                                                    </button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                                <div class="container mb-2">  
                                    <form th:action="@{/mantenimiento/listarAdminVencimientoFiltro}" method="POST">
                                        <div class="row">
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 pb-3">
                                                <label for="km" class="form-floting text-secondary">Cantidad de KM</label>
                                                <input type="number" step="1" class="form-control border-secondary" id="km" name="km" th:value="${km}">
                                            </div>
                                            <div class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1 text-center">
                                                <label for="ver" class="form-floting">Ver</label> 
                                                <button id="ver"  class="btn btn-primary" type="submit">
                                                    <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="24" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                    </svg>
                                                </button>
                                            </div>
                                        </div>
                                    </form>
                                    <div th:if="${mantenimientos.size >= 1}">
                                        <div class="mb-4" th:each="entry : ${mantenimientos}">
                                            <h6 class="text-dark p-1 text-center"><strong th:text="${entry.key}"></strong></h6> 
                                            <div class="table-responsive border border-secondary rounded">
                                                <table class="table border bg-light table-hover table-sm mb-0" id="dimgray">
                                                    <thead>
                                                        <tr>
                                                            <th class="text-center">Dominio</th>
                                                            <th class="text-center">Fecha</th>
                                                            <th class="text-center">Km Mantenimiento</th>
                                                            <th class="text-center">Km Próximo</th>
                                                            <th class="text-center">Km Actual</th>
                                                            <th class="text-center">Km Vigencia</th>
                                                            <th class="text-center">Estado</th>
                                                            <th class="text-center">Observación</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        <tr th:each="mantenimiento : ${entry.value}">
                                                            <td class="text-center" th:if="${mantenimiento.camion != null}">
                                                                <span th:text="${mantenimiento.camion.dominio}"></span>
                                                            </td>
                                                            <td class="text-center" th:if="${mantenimiento.acoplado != null}">
                                                                <span th:text="${mantenimiento.acoplado.dominio}"></span>
                                                            </td>
                                                            <td class="text-center" th:text="${#dates.format(mantenimiento.fecha, 'dd-MM-yyyy')}"></td>
                                                            <td class="text-center" th:text="${#numbers.formatDecimal(mantenimiento.km, 0, 'POINT', 0, 'POINT')}"></td>
                                                            <td class="text-center" th:text="${#numbers.formatDecimal(mantenimiento.kmProximo, 0, 'POINT', 0, 'POINT')}"></td>
                                                            <td class="text-center"><strong th:text="${#numbers.formatDecimal(mantenimiento.kmActual, 0, 'POINT', 0, 'POINT')}"></strong></td>
                                                            <td class="text-center text-primary"><strong th:text="${#numbers.formatDecimal(mantenimiento.kmVigencia, 0, 'POINT', 0, 'POINT')}"></strong></td>
                                                            <td class="text-center">
                                                                <span th:switch="${mantenimiento.estado}">
                                                                    <span th:case="${T(abate.abate.entidades.Mantenimiento.Estado).VIGENTE}">✅ VIGENTE</span>
                                                                    <span th:case="${T(abate.abate.entidades.Mantenimiento.Estado).PROXIMO_A_VENCER}">🟡 PRÓXIMO A VENCER</span>
                                                                    <span th:case="${T(abate.abate.entidades.Mantenimiento.Estado).VENCIDO}">❌ VENCIDO</span>
                                                                </span>
                                                            </td>
                                                            <td class="text-center"><span th:text="${#strings.length(mantenimiento.observacion) > 20 ? #strings.substring(mantenimiento.observacion, 0, 20) + '...' : mantenimiento.observacion}"></span>
                                                                <a href="#" th:if="${#strings.length(mantenimiento.observacion) > 20}" 
                                                                   th:attr="data-observacion=${mantenimiento.observacion}" 
                                                                   class="text-primary ver-mas">Ver</a>
                                                            </td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                        <div class="text-center mb-2">
                                            <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/mantenimiento/listarAdmin}">Volver</a>
                                        </div>
                                    </div>
                                    <div th:if="${mantenimientos.size < 1}">
                                        <br>
                                            <div class="card border-secondary p-4 mb-2 text-center" id="color-card">
                                                <h6 id="azul" th:text="'No existen Mantenimientos a vencer dentro de '+${km}+' Km'"></h6>
                                            </div>
                                            <br>
                                                <div class="text-center mb-2">
                                                    <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/mantenimiento/listarAdmin}">Volver</a>
                                                </div>
                                                </div>
                                                </div>
                                                <div id="spinner" class="modal" style="display: none;">
                                                    <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                                        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                                            <span class="sr-only">Cargando...</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <!-- Modal para mostrar historial -->
                                                <div class="modal fade" id="modalHistorial" tabindex="-1" role="dialog" aria-labelledby="modalHistorialLabel" aria-hidden="true">
                                                    <div class="modal-dialog modal-xl modal-dialog-scrollable" role="document">
                                                        <div class="modal-content">
                                                            <div class="modal-header position-relative modal-header-darkblue">
                                                                <h4 class="modal-title mx-auto">Detalle</h4>
                                                                <button type="button" class="close text-white" style="position: absolute; right: 15px;" data-dismiss="modal" aria-label="Cerrar">
                                                                    <span aria-hidden="true">&times;</span>
                                                                </button>
                                                            </div>
                                                            <div class="modal-body" id="historialContenido">
                                                                <!-- Aquí se cargará el fragmento HTML con el historial -->
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <script>

                                                    document.addEventListener("DOMContentLoaded", function () {
                                                        document.querySelectorAll(".ver-mas").forEach(function (link) {
                                                            link.addEventListener("click", function (event) {
                                                                event.preventDefault();

                                                                let observacionCompleta = this.getAttribute("data-observacion");

                                                                let observacionBox = document.getElementById("observacion-box");
                                                                if (!observacionBox) {
                                                                    observacionBox = document.createElement("div");
                                                                    observacionBox.id = "observacion-box";
                                                                    observacionBox.style.position = "fixed";
                                                                    observacionBox.style.top = "50%";
                                                                    observacionBox.style.left = "50%";
                                                                    observacionBox.style.transform = "translate(-50%, -50%)";
                                                                    observacionBox.style.background = "#fff";
                                                                    observacionBox.style.padding = "20px";
                                                                    observacionBox.style.boxShadow = "0px 0px 10px rgba(0,0,0,0.3)";
                                                                    observacionBox.style.borderRadius = "10px";
                                                                    observacionBox.style.zIndex = "1000";
                                                                    observacionBox.style.maxWidth = "400px";
                                                                    observacionBox.style.textAlign = "center";
                                                                    document.body.appendChild(observacionBox);
                                                                }

                                                                observacionBox.innerHTML = `
                <p>${observacionCompleta}</p>
                <button onclick="document.getElementById('observacion-box').remove()" class="btn btn-danger btn-sm">Cerrar</button>
            `;
                                                            });
                                                        });
                                                    });

                                                    document.addEventListener("DOMContentLoaded", function () {
                                                        const volverBtn = document.getElementById("ver");
                                                        volverBtn.addEventListener("click", function (e) {
                                                            // Mostrar spinner
                                                            document.getElementById("spinner").style.display = "block";
                                                        });
                                                    });

                                                    function verHistorial(button) {
                                                        const camionId = button.getAttribute('data-id');

                                                        fetch(`/camion/detalle/${camionId}`)
                                                                .then(response => {
                                                                    if (!response.ok) {
                                                                        throw new Error("Error al obtener detalle");
                                                                    }
                                                                    return response.text();
                                                                })
                                                                .then(html => {
                                                                    document.getElementById("historialContenido").innerHTML = html;
                                                                    const modal = new bootstrap.Modal(document.getElementById('modalHistorial'));
                                                                    modal.show();
                                                                })
                                                                .catch(error => {
                                                                    console.error("Error:", error);
                                                                    alert("No se pudo cargar el detalle del camión.");
                                                                });
                                                    }


                                                    document.addEventListener("DOMContentLoaded", function () {
                                                        document.querySelectorAll(".link-historial-alt").forEach(function (btn) {
                                                            btn.addEventListener("click", function () {
                                                                const id = this.getAttribute("data-id");

                                                                fetch("/camion/detalle/" + id)
                                                                        .then(response => response.text())
                                                                        .then(html => {
                                                                            document.getElementById("modalHistorialAltContent").innerHTML = html;
                                                                            new bootstrap.Modal(document.getElementById("modalHistorialAlt")).show();
                                                                        })
                                                                        .catch(error => console.error("Error al cargar detalle", error));
                                                            });
                                                        });
                                                    });

                                                    $(document).ready(function () {
                                                        $('#filtroForm').on('submit', function () {
                                                            $('#loadingModal').modal('show');
                                                        });
                                                    });
                                                    $(document).ready(function () {
                                                        $('#exportaForm').on('submit', function () {
                                                            $('#loadingModal').modal('show');
                                                        });
                                                    });

                                                    function verHistorialA(button) {
                                                        const acopladoId = button.getAttribute('data-idA');

                                                        fetch(`/acoplado/detalle/${acopladoId}`)
                                                                .then(response => {
                                                                    if (!response.ok) {
                                                                        throw new Error("Error al obtener detalle");
                                                                    }
                                                                    return response.text();
                                                                })
                                                                .then(html => {
                                                                    document.getElementById("historialContenido").innerHTML = html;
                                                                    const modal = new bootstrap.Modal(document.getElementById('modalHistorial'));
                                                                    modal.show();
                                                                })
                                                                .catch(error => {
                                                                    console.error("Error:", error);
                                                                    alert("No se pudo cargar el detalle del acoplado.");
                                                                });
                                                    }


                                                    document.addEventListener("DOMContentLoaded", function () {
                                                        document.querySelectorAll(".link-historial-alt").forEach(function (btn) {
                                                            btn.addEventListener("click", function () {
                                                                const id = this.getAttribute("data-id");

                                                                fetch("/acoplado/detalle/" + id)
                                                                        .then(response => response.text())
                                                                        .then(html => {
                                                                            document.getElementById("modalHistorialAltContent").innerHTML = html;
                                                                            new bootstrap.Modal(document.getElementById("modalHistorialAlt")).show();
                                                                        })
                                                                        .catch(error => console.error("Error al cargar detalle", error));
                                                            });
                                                        });
                                                    });
                                                </script>     
                                                <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                </body>
                                                </html>

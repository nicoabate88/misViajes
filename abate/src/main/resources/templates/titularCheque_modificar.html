<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Titular Cheque Modificar</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body{
            background-color:#f4f6f9;
        }

        .card-financiera{
            border:none;
            border-radius:15px;
            overflow:hidden;
        }

        .card-header-financiero{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            color:white;
            padding:20px;
        }

        .titulo-financiero{
            font-weight:700;
            margin-bottom:5px;
        }

        .subtitulo-financiero{
            opacity:0.85;
            margin-bottom:0;
        }

        .label-financiero{
            font-weight:600;
            color:#495057;
        }

        .form-control{
            border-radius:10px;
        }

        .custom-select{
            border-radius:10px;
        }

        .btn-financiero{
            border-radius:10px;
            padding:10px 20px;
            font-weight:600;
        }

        .saldo-input{
            font-size:1.2rem;
            font-weight:700;
            color:#198754;
            background-color:#f8f9fa;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <!-- TITULO -->

    <div class="mb-4">

        <h2 class="font-weight-bold mb-1">
            Modificar Titular de Cheque
        </h2>

        <p class="text-muted mb-0">
            Actualice la información del Titular
        </p>

    </div>

    <!-- MENSAJES -->

    <div th:if="${exito}"
         class="alert alert-success alert-dismissible fade show"
         role="alert">

        <span th:text="${exito}"></span>

        <button type="button"
                class="close"
                data-dismiss="alert">

            <span>&times;</span>

        </button>

    </div>

    <div th:if="${error}"
         class="alert alert-danger alert-dismissible fade show"
         role="alert">

        <span th:text="${error}"></span>

        <button type="button"
                class="close"
                data-dismiss="alert">

            <span>&times;</span>

        </button>

    </div>

    <!-- CARD -->

    <div class="card shadow-sm card-financiera">

        <!-- HEADER -->

        <div class="card-header-financiero">

            <h4 class="titulo-financiero">
                Datos del Titular
            </h4>

        </div>

        <!-- BODY -->

        <div class="card-body p-4">

            <form action="/titularCheque/actualizar-titular" method="POST">

                <!-- ID -->

                <input type="hidden" name="id" th:value="${titular.id}">

                <div class="row">

                    <!-- BANCO -->

                    <div class="col-md-6 mb-4">

                        <label class="label-financiero">
                            Nombre
                        </label>

                        <input type="text"
                               name="nombre"
                               class="form-control"
                               th:value="${titular.nombre}"
                               required>

                    </div>

                    <!-- ESTADO -->

                    <div class="col-md-6 mb-4">

                        <label class="label-financiero">
                            Estado
                        </label>

                        <select name="estado"
                                class="custom-select"
                                required>

                            <option th:each="e : ${estados}"
                                    th:value="${e}"
                                    th:text="${e}"
                                    th:selected="${e == titular.estado}">
                            </option>

                        </select>

                    </div>

                </div>

                <!-- BOTONES -->

                <div class="text-right mt-4">

                    <a href="/titularCheque/listar"
                       class="btn btn-outline-secondary btn-financiero mr-2">

                        Volver

                    </a>

                    <button type="submit"
                            class="btn btn-primary btn-financiero shadow-sm">

                        <i class="bi bi-save mr-1"></i>

                        Actualizar Titular

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

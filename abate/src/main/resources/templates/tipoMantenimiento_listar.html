<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Tipo Mantenimiento Listar</title>
        <meta charset="UTF-8">

                                                    <h6 id="icono">Nuevo</h6> </a>
                                        </div>
                                    </div>
                                </div>
                                <div class="container mb-2"> 
                                <div th:if="${exito != null}" class="card bg-secondary mb-4 p-3 border border-secondary rounded text-center">                        
                                    <h6 id="white" th:text="${exito}"></h6>                                                                             
                                </div>
                                <div th:if="${!tipos.isEmpty()}">
                                    <div th:each="tipo : ${tipos}">
                                        <div class="card border-secondary p-3 mb-1" id="color-card">
                                            <h6 class='mb-2' th:text="${tipo.nombre}"></h6>
                                            <div class="row">
                                                <div class="col-9">
                                                    <div>
                                                    <span class="text-dark">APLICA A:</span>
                                                    <span th:each="entidad : ${tipo.aplicaA}">
                                                        <span id="darkgray" th:text="${entidad}+' '"></span>
                                                    </span>
                                                    </div>
                                                </div>
                                                <div title="Ir a Modificar Tipo Mantenimiento" class="col-3 text-center">
                                                    <a th:href= "@{/tipoMantenimiento/modificar/__${tipo.id}__}">
                                                        <svg id="modificar" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                                                            <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                                                        </svg>     <p id="modificar">Modificar</p>
                                                    </a>
                                                </div>
                                            </div>   
                                        </div>    
                                    </div>
                                    <br>
                                    <div class="text-center mb-2">
                                                <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Ir a Registrar Tipo Mantenimiento" th:href="@{/tipoMantenimiento/registrar}">Nuevo</a>
                                            </div>    
                                    <div class="text-center mb-2">
                                                <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/index}">Volver</a>
                                            </div>
                                </div>    
                                <div th:if="${tipos.isEmpty()}">
                                    <br>
                                        <div class="card border-secondary p-4 mb-2 text-center" id="color-card">
                                            <h6 id="azul">No existen Tipos de Mantenimiento registrados</h6>
                                        </div>
                                        <br>
                                            <div class="text-center mb-2">
                                                <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Ir a Registrar Tipo Mantenimiento" th:href="@{/tipoMantenimiento/registrar}">Nuevo</a>
                                            </div>
                                            <div class="text-center mb-2">
                                                <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/index}">Volver</a>
                                            </div>
                                            </div>
                                            </div>

<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Proveedor Modificar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        </head>
                        <body>
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/proveedor/listar}"  type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-7 col-sm-7 col-md-7 col-lg-8 col-xl-8 text-center">
                                        <h4>Modificar Proveedor</h4>
                                    </div>
                                    <div title="Ir a Eliminar Proveedor" class="col-3 col-sm-3 col-md-3 col-lg-2 col-xl-2 text-center">
                                        <a th:href="@{/proveedor/eliminar/__${proveedor.id}__}">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                                                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                                                <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                                            </svg> <h6 id="icono">Eliminar</h6> </a>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2"> 
                                <div class="card border-secondary p-2" id="color-card">
                                    <form id="form" th:action="@{/proveedor/modifica/__${proveedor.id}__}" method="POST">
                                        <input hidden th:value="${proveedor.id}" name="id">
                                            <div class="row">
                                                <div class="col-12 col-sm-12 col-md-12 col-lg-5 col-xl-5 mb-2">
                                                    <label for="validationDefault01" class="form-label text-secondary">Apellido y Nombre*</label>
                                                    <input type="text" class="form-control" id="validationDefault01" th:value="${proveedor.nombre}" name="nombre" required>
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-5 col-xl-5 mb-2">
                                                    <label for="cuit" class="form-label text-secondary">CUIT*</label>
                                                    <input type="number" class="form-control" id="cuit" min="10000000000" max="99999999999" oninput="checkLength(this)" th:value="${proveedor.cuit}" name="cuit" required>
                                                        <span id="error-message" style="color: red; display: none;">El CUIT debe tener 11 dígitos.</span>     
                                                </div>
                                                <div class="d-block d-md-none col-6">
                                                </div>
                                            </div>
                                            <div class="row">
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-5 col-xl-5 mb-5">
                                                    <label for="estado" class="form-floting text-secondary">Habilitar Proveedor*</label>
                                                    <select class="form-control" id="estado" name="estado" required>
                                                        <option selected th:text="${proveedor.estado}" th:value="${proveedor.estado}"></option>
                                                        <option value="HABILITADO">HABILITADO</option>
                                                        <option value="INHABILITADO">INHABILITADO</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div class="container">
                                                <div th:if="${error != null}" class="card-body mb-5 text-center border border-secondary rounded" id="mensaje">                        
                                                    <h6 id="white" th:text="${error}"></h6>                                                                             
                                                </div>
                                            </div>
                                            <div class="text-center mb-2">
                                                <button class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Modificar Proveedor">Modificar</button>
                                            </div>
                                            <div class="text-center">
                                                <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href="@{/proveedor/listar}" title="Cancelar">Cancelar</a>
                                            </div> 
                                    </form>
                                </div>
                            </div>
                            <div id="spinner" class="modal" style="display: none;">
                                <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                    <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                        <span class="sr-only">Cargando...</span>
                                    </div>
                                </div>
                            </div>
                            <script>
                                function checkLength(input) {
                                    const errorMessage = document.getElementById("error-message");
                                    const value = input.value;

                                    if (value.length > 11) {
                                        input.value = value.slice(0, 11); // Limitar a 11 dígitos
                                        errorMessage.style.display = "block";
                                    } else if (value.length < 11 && value.length > 0) {
                                        errorMessage.style.display = "block";
                                    } else {
                                        errorMessage.style.display = "none"; // Ocultar error si cumple
                                    }
                                }
                            </script>   
                            <script>
                                document.getElementById("form").addEventListener("submit", function () {
                                    document.getElementById("spinner").style.display = "block";
                                });
                            </script>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

                        <style>
                            .tabla-scroll {
                                max-height: 170px;       /* altura total de unas dos filas */
                                min-height: 170px;       /* fuerza que tenga esa altura aunque esté vacía */
                                overflow-y: auto;        /* agrega scroll vertical si se pasa */
                                border: 1px solid #dee2e6; /* mismo tono de borde bootstrap */
                                border-radius: 0.25rem;
                            }

                            .tabla-scroll table {
                                margin-bottom: 0;
                            }

                            .tabla-scroll thead th {
                                top: 0;
                                background-color: #f8f9fa;
                                z-index: 1;
                            }

                            .tabla-scroll tbody:empty::before {
                                content: "";
                                display: block;
                                height: 170px; 
                            }
                            .btn-eliminar {
                                background: none;
                                border: none;
                                color: red;          /* podés ajustar el color si querés */
                                font-size: 18px;     /* tamaño del ícono */
                                cursor: pointer;
                            }

                            .btn-eliminar:hover {
                                transform: scale(1.2);  /* efecto sutil al pasar el mouse */
                            }
                        </style>
                        <script>
                            window.onload = function () {
                                var fechaActual = new Date();
                                var dia = String(fechaActual.getDate()).padStart(2, '0');
                                var mes = String(fechaActual.getMonth() + 1).padStart(2, '0');
                                var anio = fechaActual.getFullYear();
                                var fechaFormateada = anio + '-' + mes + '-' + dia;

                                document.getElementById('fecha').max = fechaFormateada;
                            };
                            document.addEventListener('DOMContentLoaded', function () {
                                const inputFecha = document.getElementById('fecha');
                                const hoy = new Date();
                                const dia = String(hoy.getDate()).padStart(2, '0');
                                const mes = String(hoy.getMonth() + 1).padStart(2, '0');
                                const anio = hoy.getFullYear();
                                inputFecha.value = `${anio}-${mes}-${dia}`;
                            });
                        </script>
                        </head>

                            <div class="container mb-2">  
                                <form id="formulario" th:action="@{/mantenimiento/registroMasivo}" method="POST">

                                                <div class="col-6 col-sm-6 col-md-5 col-lg-4 col-xl-4 mb-2">

                                                </div>

                                                    <label for="idAcoplado" class="form-floting text-secondary">Acoplado*</label>

                                                                                    </div>
                                                                                </div>
                                                                                </form>

                                                                                    <input hidden id="kmVigenciaC" th:value=${kmVigenciaCamion}>

                                                                                            <input hidden id="kmAlarmaC" th:value=${kmAlarmaCamion}>

                                                                                                    <input hidden id="kmVigenciaA" th:value=${kmVigenciaAcoplado}>
                                                                                                        <input hidden id="kmProximoA" th:value=${kmProximoAcoplado}>
                                                                                                            <input hidden id="kmAlarmaA" th:value=${kmAlarmaAcoplado}>

                                                                                                                        </div>

                                                                                                                    function enviarRegistroCamion() {

                                                                                                                        let idCamion = document.getElementById("idCamion").value;
                                                                                                                        let idAcoplado = document.getElementById("idAcoplado").value;
                                                                                                                        let idOrg = document.getElementById("idOrg").value;

                                                                                                                        window.location.href = `/mantenimiento/registrarMasivo1?idOrg=${idOrg}&idCamion=${idCamion}&idAcoplado=${idAcoplado}`;

                                                                                                                    }

                                                                                                                    function calcularKmCamion() {
                                                                                                                        const kmInicial = parseInt(document.getElementById('kmInicialCamion').value) || 0;
                                                                                                                        const kmProximo = kmInicial + 10000;
                                                                                                                        const kmAlarma = kmInicial + 9000;
                                                                                                                        const kmVigencia = kmProximo - kmInicial;

                                                                                                                        document.getElementById('kmProximoCamion').value = kmProximo >= 0 ? kmProximo : '';
                                                                                                                        document.getElementById('kmAlarmaCamion').value = kmAlarma >= 0 ? kmAlarma : '';
                                                                                                                        document.getElementById('kmVigenciaCamion').value = kmVigencia >= 0 ? kmVigencia : '';
                                                                                                                    }

                                                                                                                    function calcularKmAlarmaCamion() {
                                                                                                                        const kmInicial = parseInt(document.getElementById('kmInicialCamion').value) || 0;
                                                                                                                        const kmVigencia = parseInt(document.getElementById('kmVigenciaCamion').value) || 0;
                                                                                                                        const kmProximo = kmInicial + kmVigencia;
                                                                                                                        const kmAlarma = kmProximo - 1000;

                                                                                                                        document.getElementById('kmAlarmaCamion').value = kmAlarma >= 0 ? kmAlarma : '';
                                                                                                                        document.getElementById('kmProximoCamion').value = kmProximo >= 0 ? kmProximo : '';
                                                                                                                    }
                                                                                                                    function calcularKmAcoplado() {
                                                                                                                        const kmInicial = parseInt(document.getElementById('kmInicialAcoplado').value) || 0;
                                                                                                                        const kmProximo = kmInicial + 10000;
                                                                                                                        const kmAlarma = kmInicial + 9000;
                                                                                                                        const kmVigencia = kmProximo - kmInicial;

                                                                                                                        document.getElementById('kmProximoAcoplado').value = kmProximo >= 0 ? kmProximo : '';
                                                                                                                        document.getElementById('kmAlarmaAcoplado').value = kmAlarma >= 0 ? kmAlarma : '';
                                                                                                                        document.getElementById('kmVigenciaAcoplado').value = kmVigencia >= 0 ? kmVigencia : '';
                                                                                                                    }

                                                                                                                    function calcularKmAlarmaAcoplado() {
                                                                                                                        const kmInicial = parseInt(document.getElementById('kmInicialAcoplado').value) || 0;
                                                                                                                        const kmVigencia = parseInt(document.getElementById('kmVigenciaAcoplado').value) || 0;
                                                                                                                        const kmProximo = kmInicial + kmVigencia;
                                                                                                                        const kmAlarma = kmProximo - 1000;

                                                                                                                        document.getElementById('kmAlarmaAcoplado').value = kmAlarma >= 0 ? kmAlarma : '';
                                                                                                                        document.getElementById('kmProximoAcoplado').value = kmProximo >= 0 ? kmProximo : '';
                                                                                                                    }
                                                                                                                </script>
                                                                                                                <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                                                                                <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                                                                                <script>
                                                                                                                    let mantenimientosCamion = [];
                                                                                                                    let mantenimientosAcoplado = [];

                                                                                                                    // --- CAMIÓN ---
                                                                                                                    $('#addMantenimientoCamion').click(function () {

                                                                                                                        $('#idCamion').prop('disabled', true);

                                                                                                                        if ($('#idCamionHidden').length === 0) {
                                                                                                                            $('<input>').attr({
                                                                                                                                type: 'hidden',
                                                                                                                                id: 'idCamionHidden',
                                                                                                                                name: 'idCamion',
                                                                                                                                value: $('#idCamion').val()
                                                                                                                            }).appendTo('form');
                                                                                                                        } else {
                                                                                                                            $('#idCamionHidden').val($('#idCamion').val());
                                                                                                                        }

                                                                                                                        const tipo = $('#tipo').val();
                                                                                                                        const tipoTexto = $('#tipo option:selected').text();
                                                                                                                        const km = $('#kmInicialCamion').val();
                                                                                                                        const kmProximo = $('#kmProximoCamion').val();
                                                                                                                        const kmVigencia = $('#kmVigenciaCamion').val();
                                                                                                                        const kmAlarma = $('#kmAlarmaCamion').val();

                                                                                                                        if (!tipo || !km || !kmProximo || !kmVigencia || !kmAlarma) {
                                                                                                                            alert("Debe completar todos los campos antes de agregar.");
                                                                                                                            return;
                                                                                                                        }

                                                                                                                        // 🔹 Validar si el tipo ya fue agregado para CAMIÓN
                                                                                                                        const existe = mantenimientosCamion.some(m => m.tipoMantenimiento === tipo);
                                                                                                                        if (existe) {
                                                                                                                            alert("Ya se ha agregado este tipo de mantenimiento para el camión.");
                                                                                                                            return;
                                                                                                                        }

                                                                                                                        const mantenimiento = {
                                                                                                                            tipoMantenimiento: tipo,
                                                                                                                            aplicaA: "CAMION",
                                                                                                                            km: km,
                                                                                                                            kmVigencia: kmVigencia,
                                                                                                                            kmProximo: kmProximo,
                                                                                                                            kmAlarma: kmAlarma,
                                                                                                                            estado: tipoTexto
                                                                                                                        };

                                                                                                                        mantenimientosCamion.push(mantenimiento);

                                                                                                                        // Agregar fila visualmente
                                                                                                                        const fila = `
                                            <tr class="text-center text-secondary">
                                                <td>${tipoTexto}</td>
                                                <td>${km}</td>
                                                <td>${kmVigencia}</td>
                                                <td>${kmProximo}</td>
                                                <td>${kmAlarma}</td>
                                                <td><button type="button" class="btn-eliminar eliminarFilaCamion">❌</button></td>
                                            </tr>`;
                                                                                                                        $('#tablaMantenimientosCamion tbody').append(fila);

                                                                                                                        document.getElementById("tipo").value = "";
                                                                                                                        document.getElementById("kmInicialCamion").value = parseInt(document.getElementById('kmC').value) || 0;
                                                                                                                        document.getElementById("kmVigenciaCamion").value = parseInt(document.getElementById('kmVigenciaC').value) || 0;
                                                                                                                        document.getElementById("kmProximoCamion").value = parseInt(document.getElementById('kmProximoC').value) || 0;
                                                                                                                        document.getElementById("kmAlarmaCamion").value = parseInt(document.getElementById('kmAlarmaC').value) || 0;

                                                                                                                    });

                                                                                                                    // Eliminar fila de camión
                                                                                                                    $(document).on('click', '.eliminarFilaCamion', function () {
                                                                                                                        const index = $(this).closest('tr').index();
                                                                                                                        mantenimientosCamion.splice(index, 1);
                                                                                                                        $(this).closest('tr').remove();
                                                                                                                    });

                                                                                                                    // --- ACOPLADO ---
                                                                                                                    $('#addMantenimientoAcoplado').click(function () {

                                                                                                                        $('#idAcoplado').prop('disabled', true);

                                                                                                                        if ($('#idAcopladoHidden').length === 0) {
                                                                                                                            $('<input>').attr({
                                                                                                                                type: 'hidden',
                                                                                                                                id: 'idAcopladoHidden',
                                                                                                                                name: 'idAcoplado',
                                                                                                                                value: $('#idAcoplado').val()
                                                                                                                            }).appendTo('form');
                                                                                                                        } else {
                                                                                                                            $('#idAcopladoHidden').val($('#idAcoplado').val());
                                                                                                                        }

                                                                                                                        const tipo = $('#tipoA').val();
                                                                                                                        const tipoTexto = $('#tipoA option:selected').text();
                                                                                                                        const km = $('#kmInicialAcoplado').val();
                                                                                                                        const kmVigencia = $('#kmVigenciaAcoplado').val();
                                                                                                                        const kmProximo = $('#kmProximoAcoplado').val();
                                                                                                                        const kmAlarma = $('#kmAlarmaAcoplado').val();

                                                                                                                        if (!tipo || !km || !kmProximo || !kmVigencia || !kmAlarma) {
                                                                                                                            alert("Debe completar todos los campos antes de agregar.");
                                                                                                                            return;
                                                                                                                        }

                                                                                                                        // 🔹 Validar si el tipo ya fue agregado para ACOPLADO
                                                                                                                        const existe = mantenimientosAcoplado.some(m => m.tipoMantenimiento === tipo);
                                                                                                                        if (existe) {
                                                                                                                            alert("Ya se ha agregado este tipo de mantenimiento para el acoplado.");
                                                                                                                            return;
                                                                                                                        }

                                                                                                                        const mantenimiento = {
                                                                                                                            tipoMantenimiento: tipo,
                                                                                                                            aplicaA: "ACOPLADO",
                                                                                                                            km: km,
                                                                                                                            kmVigencia: kmVigencia,
                                                                                                                            kmProximo: kmProximo,
                                                                                                                            kmAlarma: kmAlarma,
                                                                                                                            estado: tipoTexto
                                                                                                                        };

                                                                                                                        mantenimientosAcoplado.push(mantenimiento);

                                                                                                                        const fila = `
                                            <tr class="text-center text-secondary">
                                                <td>${tipoTexto}</td>
                                                <td>${km}</td>
                                                <td>${kmVigencia}</td>
                                                <td>${kmProximo}</td>
                                                <td>${kmAlarma}</td>
                                                <td><button type="button" class="btn-eliminar eliminarFilaAcoplado">❌</button></td>
                                            </tr>`;
                                                                                                                        $('#tablaMantenimientosAcoplado tbody').append(fila);

                                                                                                                        document.getElementById("tipoA").value = "";
                                                                                                                        document.getElementById("kmInicialAcoplado").value = parseInt(document.getElementById('kmA').value) || 0;
                                                                                                                        document.getElementById("kmVigenciaAcoplado").value = parseInt(document.getElementById('kmVigenciaA').value) || 0;
                                                                                                                        document.getElementById("kmProximoAcoplado").value = parseInt(document.getElementById('kmProximoA').value) || 0;
                                                                                                                        document.getElementById("kmAlarmaAcoplado").value = parseInt(document.getElementById('kmAlarmaA').value) || 0;
                                                                                                                    });

                                                                                                                    // Eliminar fila de acoplado
                                                                                                                    $(document).on('click', '.eliminarFilaAcoplado', function () {
                                                                                                                        const index = $(this).closest('tr').index();
                                                                                                                        mantenimientosAcoplado.splice(index, 1);
                                                                                                                        $(this).closest('tr').remove();
                                                                                                                    });

                                                                                                                    // --- ENVIAR FORMULARIO ---
                                                                                                                    $('#formulario').submit(function (event) {
                                                                                                                        // 🔹 Validar que haya al menos un mantenimiento cargado
                                                                                                                        if (mantenimientosCamion.length === 0 && mantenimientosAcoplado.length === 0) {
                                                                                                                            alert("Debe agregar al menos un tipo de mantenimiento para camión o acoplado antes de enviar el formulario.");
                                                                                                                            event.preventDefault(); // Evita que se envíe
                                                                                                                            return;
                                                                                                                        }

                                                                                                                        document.getElementById("spinner").style.display = "block";

                                                                                                                        // 🔹 Crear inputs ocultos con los JSON para enviar al backend
                                                                                                                        $('<input>').attr({
                                                                                                                            type: 'hidden',
                                                                                                                            name: 'mantenimientosCamionJson',
                                                                                                                            value: JSON.stringify(mantenimientosCamion)
                                                                                                                        }).appendTo('#formulario');

                                                                                                                        $('<input>').attr({
                                                                                                                            type: 'hidden',
                                                                                                                            name: 'mantenimientosAcopladoJson',
                                                                                                                            value: JSON.stringify(mantenimientosAcoplado)
                                                                                                                        }).appendTo('#formulario');
                                                                                                                    });

                                                                                                                </script>
                                                                                                                </body>
                                                                                                                </html>

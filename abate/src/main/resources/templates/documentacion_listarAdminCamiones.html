<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Camiones Documentacion</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
                        <link rel="stylesheet" href="/css/medidas_container.css">   
                            <style>

                                /* Estilo para pantallas md */
                                @media (max-width: 991.98px) {
                                    .table {
                                        font-size: 13px;
                                    }
                                    .text-dark {
                                        font-size: 13px;
                                    }
                                    
                                }
                                /* Estilo para pantallas sm */
                                @media (max-width: 767.98px) {
                                    .table {
                                        font-size: 10px;
                                    }
                                    .text-dark {
                                        font-size: 13px;
                                    }
                                }
                                .text-green {
                                    color: green;
                                    font-size: 1.2em;
                                }

                                .text-yellow {
                                    color: orange;
                                    font-size: 1.2em;
                                }

                                .text-red {
                                    color: red;
                                    font-size: 1.2em;
                                }
                            </style>
                            </head>
                            <body>                        
                                    <div class="card-header mb-4" style="height: 70px;">
                                        <div class="row">
                                            <div class="col-2">   
                                                <a title="Volver" th:href="@{/documentacion/listarAdmin}" type="button">
                                                    <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                        <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                    </svg> 
                                                </a>   
                                            </div>
                                            <div  class="col-8 text-center">
                                                <h4>Documentación de Camiones</h4>
                                            </div>
                                            <div title="Ir a Registrar Documentación" class="col-2 text-center">
                                            <a th:href="@{/documentacion/registrar/__${aplica}__}">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 60 60"><path d="M11,50v-.952a4.013,4.013,0,0,1,.877-2.494L14.562,43.2A2,2,0,0,0,15,41.947V31.5A1.5,1.5,0,0,0,13.5,30a1.486,1.486,0,0,0-.9.3h0a1.486,1.486,0,0,0-.6,1.2V37a1,1,0,0,1-2,0V31.5a3.5,3.5,0,0,1,1-2.419V21.762L3.928,30.25A4,4,0,0,0,3,32.811V54h8Z" fill="#000000" style="fill: rgb(255, 255, 255);"></path><path d="M17,31.5V41.945a4,4,0,0,1-.877,2.5L13.438,47.8A2.007,2.007,0,0,0,13,49.054V50H47v-.949a1.99,1.99,0,0,0-.438-1.247l-2.685-3.356a4,4,0,0,1-.877-2.5V31.5A3.5,3.5,0,0,1,46.5,28a3.464,3.464,0,0,1,.5.04V9H42a2,2,0,0,1-2-2V2H14a1,1,0,0,0-1,1V28.04a3.464,3.464,0,0,1,.5-.04A3.5,3.5,0,0,1,17,31.5ZM30,43H20a1,1,0,0,1,0-2H30a1,1,0,0,1,0,2Zm10-5H20a1,1,0,0,1,0-2H40a1,1,0,0,1,0,2Zm0-5H20a1,1,0,0,1,0-2H40a1,1,0,0,1,0,2ZM18,11H42a1,1,0,0,1,0,2H18a1,1,0,0,1,0-2Zm0,5H42a1,1,0,0,1,0,2H18a1,1,0,0,1,0-2Zm0,5H42a1,1,0,0,1,0,2H18a1,1,0,0,1,0-2Zm0,5H42a1,1,0,0,1,0,2H18a1,1,0,0,1,0-2Z" fill="#000000" style="fill: rgb(255, 255, 255);"></path><polygon points="42 3.414 42 7 45.586 7 42 3.414" fill="#000000" style="fill: rgb(255, 255, 255);"></polygon><path d="M45,31.5V41.947a2,2,0,0,0,.438,1.249l2.686,3.358a4.014,4.014,0,0,1,.876,2.5V54h8V32.811a4,4,0,0,0-.928-2.561L49,21.762v7.319A3.5,3.5,0,0,1,50,31.5V37a1,1,0,0,1-2,0V31.5a1.486,1.486,0,0,0-.6-1.2h0a1.486,1.486,0,0,0-.9-.3A1.5,1.5,0,0,0,45,31.5Z" fill="#000000" style="fill: rgb(255, 255, 255);"></path><path d="M3,58h8a1,1,0,1,0,0-2H3a1,1,0,0,0,0,2Z" fill="#000000" style="fill: rgb(255, 255, 255);"></path><path d="M49,56a1,1,0,0,0,0,2h8a1,1,0,0,0,0-2Z" fill="#000000" style="fill: rgb(255, 255, 255);"></path></svg>
                                                  <h6 id="icono">Nuevo</h6> </a>
                                        </div>
                                        </div>
                                    </div>
                                <div class="container mb-2">  
                                    <form th:action="@{/documentacion/listarAdminCamionesFiltro}" method="POST">
                                        <div class="row">
                                            <div class="col-10 col-sm-10 col-md-10 col-lg-5 col-xl-5 pb-3">
                                                <label for="idCamion" class="form-floting text-secondary">Camión</label>
                                                <select class="form-control text-secondary border-secondary" id="idCamion" name="idCamion">
                                                    <option th:if="${camion == null}" selected value="">Todos</option>
                                                    <option th:if="${camion != null}" selected th:value="${camion.id}"
                                                            th:text="${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}"/>
                                                    <option th:if="${camion != null}" value="">Todos</option>
                                                    <option th:each="camion : ${camiones}"
                                                            th:value="${camion.id}"
                                                            th:text="${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}"/>
                                                </select>
                                            </div>
                                            <div class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1 text-center">
                                                <label for="ver" class="form-floting">Ver</label> 
                                                <button id="ver"  class="btn btn-primary" type="submit">
                                                    <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="24" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                    </svg>
                                                </button>
                                            </div>
                                        </div>
                                    </form>
                                    <div th:if="${documentacion.size >= 1}">
                                        <div class="mb-4" th:each="entry : ${documentacion}">
                                            <h6 class="text-dark p-1 text-center" th:text="${entry.key}"></h6> 
                                            <div class="table-responsive border border-secondary rounded">
                                            <table class="table border bg-light table-hover table-sm mb-0" id="dimgray">
                                                <thead>
                                                    <tr>
                                                        <th class="text-center">Dominio</th>
                                                        <th class="text-center">Fecha Alta</th>
                                                        <th class="text-center">Vencimiento</th>
                                                        <th class="text-center">Vigencia</th>
                                                        <th class="text-center">Estado</th>
                                                        <th class="text-center">Observación</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <tr th:each="documento : ${entry.value}">
                                                        <td class="text-center"><b><a id="dimgray" th:href="@{/documentacion/listarAdminCamion(id=${documento.id}, idCamion=${idCamion})}" th:text="${documento.camion.dominio}"></a></b></td>
                                                        <td class="text-center" th:text="${#dates.format(documento.fechaAlta, 'dd-MM-yyyy')}"></td>
                                                        <td class="text-center" th:text="${#dates.format(documento.fechaVencimiento, 'dd-MM-yyyy')}"></td>
                                                        <td class="text-center" th:text="${documento.diasVigencia}+' días'"></td>
                                                        <td class="text-center">
                                                            <span th:switch="${documento.estado}">
                                                                <span th:case="'VIGENTE'">✅ VIGENTE</span>
                                                                <span th:case="'PRÓXIMO A VENCER'">🟡 PRÓXIMO A VENCER</span>
                                                                <span th:case="'VENCIDO'">❌ VENCIDO</span>
                                                            </span> 
                                                        </td>
                                                        <td class="text-center" th:text="${documento.observacion}"></td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                            </div>
                                        </div>
                                        <div class="text-center mb-2">
                                            <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Volver" th:href="@{/documentacion/registrar/__${aplica}__}">Nuevo</a>
                                        </div>
                                        <div class="text-center mb-2">
                                            <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/documentacion/listarAdmin}">Volver</a>
                                        </div>
                                    </div>
                                    <div th:if="${documentacion.size < 1}">
                                        <br>
                                            <div class="card border-secondary p-4 mb-2 text-center" id="color-card">
                                                <h6 id="azul">No existen Documentaciones de Camiones para mostrar</h6>
                                            </div>
                                            <br>
                                                <div class="text-center mb-2">
                                                    <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" title="Volver" th:href="@{/documentacion/registrar/__${aplica}__}">Nuevo</a>
                                                </div>
                                                <div class="text-center mb-2">
                                                    <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/documentacion/listarAdmin}">Volver</a>
                                                </div>
                                                </div>
                                                </div>
                                                <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                </body>
                                                </html>

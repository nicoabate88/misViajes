<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Documentacion Mostrar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        </head>
                        <body>                          
                                <div class="card-header mb-2" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">   
                                            <a title="Volver" th:href="@{/documentacion/listarAdmin}" type="button">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                </svg> 
                                            </a>   
                                        </div>
                                        <div  class="col-8 text-center">
                                            <h4>Detalle de Documentación</h4>
                                        </div>
                                    </div>
                                </div>
                            <div class="container mb-2">  
                                <div class="card border-secondary p-3 mb-2" id="color-card">
                                    <h6 th:text="${documentacion.tipoDocumentacion.nombre}"></h6>
                                    <div class="row">
                                        <div class="col-9">
                                            <h6 class="text-dark" th:if="${documentacion.camion != null}" th:text="${documentacion.aplicaA}+': '+${documentacion.camion.dominio}+' '+${documentacion.camion.marca}+' '+${documentacion.camion.modelo}"></h6>
                                            <h6 class="text-dark" th:if="${documentacion.acoplado != null}" th:text="${documentacion.aplicaA}+': '+${documentacion.acoplado.dominio}+' '+${documentacion.acoplado.marca}+' '+${documentacion.acoplado.modelo}"></h6>
                                            <h6 class="text-dark" th:if="${documentacion.chofer != null}" th:text="${documentacion.aplicaA}+': '+${documentacion.chofer.nombre}"></h6>
                                            <p class="mb-1" id="dimgray" th:text="'Vigencia Desde ' + ${#dates.format(documentacion.fechaAlta, 'dd-MM-yyyy')}+' - Vencimiento ' + ${#dates.format(documentacion.fechaVencimiento, 'dd-MM-yyyy')}"></p>
                                                            <span th:switch="${documentacion.estado}">
                                                                <span th:case="'VIGENTE'" id="dimgray" th:text="'Estado ✅ VIGENTE - '+${documentacion.diasVigencia}+' días'"></span>
                                                                <span th:case="'PRÓXIMO A VENCER'" id="dimgray" th:text="'Estado 🟡 PRÓXIMO A VENCER - '+${documentacion.diasVigencia}+' días'"></span>
                                                                <span th:case="'VENCIDO'" id="dimmgray" th:text="'Estado ❌ VENCIDO - '+${documentacion.diasVigencia}+' días'"></span>
                                                            </span> 
                                            <p th:if="${documentacion.observacion != ''}" id="dimgray" th:text="'Observación '+${documentacion.observacion}"></p>                            
                                        </div>
                                        <div th:if="${documentacion.imagen != null}" class="col-3 text-center pb-0">
                                            <a th:href="@{/imagen/verDocumentacion/__${documentacion.id}__}">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-card-image" viewBox="0 0 16 16">
                                                    <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"/>
                                                    <path d="M1.5 2A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2zm13 1a.5.5 0 0 1 .5.5v6l-3.775-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12v.54L1 12.5v-9a.5.5 0 0 1 .5-.5z"/>
                                                </svg>    <p id="icono2">Imagen</p>
                                            </a>  
                                        </div>
                                    </div>  
                                </div>
                                <div th:if="${exito != null}" class="card bg-secondary mb-4 p-3 text-center border border-secondary rounded">                        
                                    <h6 id="white" th:text="${exito}"></h6>                                                                             
                                </div>
                                <div th:if="${documentacion.imagen == null}" class="text-center mb-4" title="Ir a Cargar Imagen">
                                    <a th:href="@{/imagen/verDocumentacion/__${documentacion.id}__}">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-card-image" viewBox="0 0 16 16">
                                            <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"/>
                                            <path d="M1.5 2A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2zm13 1a.5.5 0 0 1 .5.5v6l-3.775-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12v.54L1 12.5v-9a.5.5 0 0 1 .5-.5z"/>
                                        </svg>    <p id="icono2">Cargar Imagen</p>
                                    </a>
                                </div>
                                <div class="text-center mb-2">
                                    <a class="btn btn-primary bg-primary btn-lg w-50" type="button" th:href="@{/documentacion/listarAdmin}">Finalizar</a>
                                </div>
                            </div>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

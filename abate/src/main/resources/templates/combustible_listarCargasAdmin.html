<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Entrega Listar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">   
                        <style>
                            /* Clase para el color rojo suave */
                            .bg-soft-red {
                                background-color: #fdecea; /* Fondo rojo suave */
                                color: #a94442;           /* Texto rojo oscuro */
                                border: 1px solid #f5c6cb; /* Borde rojo claro */
                            }
                            .bg-whitesmoke {
                                background-color: whitesmoke; /* Fondo gris claro */
                                color: black;                /* Texto negro */
                                border: 1px solid #ddd;      /* Borde gris */
                            }
                        </style>
                        </head>
                        <body>   
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/index}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-6 col-sm-6 col-md-7 col-lg-8 col-xl-8 text-center" th:if="${flag == true}">
                                        <h4>Cargas de Combustible</h4>
                                    </div>
                                    <div  class="col-8 text-center" th:if="${flag != true}">
                                        <h4>Cargas de Combustible</h4>
                                    </div>
                                    <div class="col-2 col-sm-2 col-md-1 col-lg-1 col-xl-1 text-center" th:if="${flag == true}">
                                        <form>
                                            <input id="desde" hidden th:value="${desde}" name="desde">
                                                <input id="hasta" hidden th:value="${hasta}" name="hasta">
                                                    <input id="idCamion" hidden th:value="${idCamion}" name="idCamion">
                                                        <input id="idChofer" hidden th:value="${idChofer}" name="idChofer">                                                     
                                                            <button id="exportButton" onclick="startExport(event)" class="btn btn-light" type="button">
                                                                <h6 id="icono">Excel</h6>
                                                            </button>
                                                            </form>
                                                            </div>
                                                            <div class="col-2 col-sm-2 col-md-2 col-lg-1 col-xl-1 text-center" th:if="${flag == true}">
                                                                <a title="Ir a Imprimir Mantenimiento" target="_blank" th:href="@{/combustible/imprimirAdmin(desde=${desde}, hasta=${hasta}, idChofer=${idChofer}, idCamion=${idCamion})}">

                                                                    <svg id="imprimirExporta" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-printer" viewBox="0 0 16 16">
                                                                        <path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1"/>
                                                                        <path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1h1a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1V3a2 2 0 0 0-2-2zM4 3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2H4zm1 5a2 2 0 0 0-2 2v1H2a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v-1a2 2 0 0 0-2-2zm7 2v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1"/>
                                                                    </svg><p id="imprimirExporta">Imprimir</p>
                                                                </a>
                                                            </div>
                                                            </div>
                                                            </div>
                                                            <div class="container mb-2"> 
                                                                <div id="loadingModalExport" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); color: white; text-align: center; z-index: 1000;">
                                                                    <div style="margin-top: 20%; font-size: 20px;">
                                                                        <div class="spinner" style="margin-bottom: 20px;">
                                                                            <svg viewBox="0 0 50 50" style="width: 50px; height: 50px;">
                                                                                <circle cx="25" cy="25" r="20" fill="none" stroke-width="5" stroke="#fff" stroke-dasharray="31.4 31.4" stroke-linecap="round">
                                                                                    <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite" />
                                                                                </circle>
                                                                            </svg>
                                                                        </div>
                                                                        Exportando... Por favor, espere.
                                                                    </div>
                                                                </div> 
                                                                <div class="card-header pb-0" id="bgWhite">
                                                                    <form th:action="@{/combustible/listarAdminFiltro}" method="POST">
                                                                        <div class="row">    
                                                                            <div class="col-6 col-sm-6 col-md-3 col-lg-2 col-xl-2 mb-2">
                                                                                <label for="desde" class="form-label">Desde</label>
                                                                                <input type="date" class="form-control border-secondary" id="desde" th:value="${desde}" name="desde" required>
                                                                            </div>
                                                                            <div class="col-6 col-sm-6 col-md-3 col-lg-2 col-xl-2 mb-2">
                                                                                <label for="hasta" class="form-label">Hasta</label>
                                                                                <input type="date" class="form-control border-secondary" id="hasta" th:value="${hasta}" name="hasta" required>                                                                                              
                                                                            </div>
                                                                            <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                                                <label for="camion" class="form-floting">Camión</label>  
                                                                                <select class="form-control border-secondary" id="camion" name="idCamion">
                                                                                    <option th:if="${camion != null}" th:value="${camion.id}"
                                                                                            th:text="${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}" selected></option>
                                                                                    <option th:value=null>Todos</option>
                                                                                    <option th:each="camion : ${camiones}"
                                                                                            th:value="${camion.id}"
                                                                                            th:text="${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}"/>
                                                                                </select>
                                                                            </div>
                                                                            <div class="col-4 col-sm-4 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                                                <label for="chofer" class="form-floting">Chofer</label>  
                                                                                <select class="form-control border-secondary" id="chofer" name="idChofer">
                                                                                    <option th:if="${chofer != null}" th:value="${chofer.id}"
                                                                                            th:text="${chofer.nombre}" selected></option>
                                                                                    <option th:value=null>Todos</option>
                                                                                    <option th:each="chofer : ${choferes}"
                                                                                            th:value="${chofer.id}"
                                                                                            th:text="${chofer.nombre}"/>
                                                                                </select>
                                                                            </div>
                                                                            <div title="Buscar" class="col-2 col-sm-2 col-md-1 col-lg-1 col-xl-1 mb-2 text-center">
                                                                                <label for="ver" class="form-label">Ver</label>
                                                                                <button id="ver" class="btn btn-primary" type="submit">
                                                                                    <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="24" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                                                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                                                    </svg>
                                                                                </button>
                                                                            </div>
                                                                        </div>                                                               
                                                                    </form>   
                                                                </div>   
                                                                <div th:if="${exito != null}" class="alert bg-secondary alert-secondary alert-dismissible fade show mb-2 p-3 text-center" role="alert">
                                                                    <h6 id="white" th:text="${exito}" class="mb-0 d-inline"></h6>
                                                                    <button id="white" type="button" class="close" data-dismiss="alert" aria-label="Close">
                                                                        <span aria-hidden="true">&times;</span>
                                                                    </button>
                                                                </div>
                                                                <div th:if="${!cargas.isEmpty()}">
                                                                    <div class="card-body p-2">          
                                                                        <div class="row">
                                                                            <div class="col-10 col-sm-10 col-md-10 col-lg-11 col-xl-11 p-3">
                                                                        <h6><strong>
                                                                                <span id="dimgray" th:text="'Total Cargas '+${#numbers.formatDecimal(cantidad, 0, 'POINT', 0, 'COMMA')}"></span>
                                                                                <span id="dimgray" th:text="' - Total Litros '+${#numbers.formatDecimal(litros, 0, 'POINT', 0, 'COMMA')}"></span>
                                                                                <span id="dimgray" th:if="${km != null}" th:text="' -  '+${km}+' KM '"></span>
                                                                                <span id="dimgray" th:if="${redondeado != null}" th:text="' - Consumo '+${redondeado}+'  L / 100 Km'"></span>
                                                                                <span id="dimgray" th:if="${azul != 0.0}" th:text="' - Urea '+${azul}+' Lts '"></span>
                                                                            </strong></h6>
                                                                            </div>                                            
                                                                                <div title="Ir a Registrar Mantenimiento" class="col-2 col-sm-2 col-md-2 col-lg-1 col-xl-1 text-center">
                                                                                <a th:href="@{/combustible/registrarAdmin(idOrg=${idOrg}, desde=${desde}, hasta=${hasta}, idCamion=${idCamion}, idChofer=${idChofer})}">
                                                                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-fuel-pump-diesel" viewBox="0 0 16 16">
                                                                                        <path d="M3.5 2a.5.5 0 0 0-.5.5v5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5v-5a.5.5 0 0 0-.5-.5zM4 14V9h1.796q.75 0 1.237.293t.725.85Q8 10.7 8 11.487q0 .792-.242 1.355a1.8 1.8 0 0 1-.732.861Q6.54 14 5.796 14zm1.666-4.194h-.692v3.385h.692q.343 0 .595-.103a1 1 0 0 0 .412-.315q.162-.213.241-.528.084-.314.083-.74 0-.565-.144-.94a1.1 1.1 0 0 0-.436-.569q-.293-.19-.75-.19Z"/>
                                                                                        <path d="M3 0a2 2 0 0 0-2 2v13H.5a.5.5 0 0 0 0 1h11a.5.5 0 0 0 0-1H11v-4a1 1 0 0 1 1 1v.5a1.5 1.5 0 0 0 3 0V8h.5a.5.5 0 0 0 .5-.5V4.324c0-.616 0-1.426-.294-2.081a1.97 1.97 0 0 0-.794-.907Q14.345.999 13.5 1a.5.5 0 0 0 0 1c.436 0 .716.086.9.195a.97.97 0 0 1 .394.458c.147.328.19.746.201 1.222H13.5a.5.5 0 0 0-.5.5V7.5a.5.5 0 0 0 .5.5h.5v4.5a.5.5 0 0 1-1 0V12a2 2 0 0 0-2-2V2a2 2 0 0 0-2-2zm7 2v13H2V2a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1"/>
                                                                                    </svg><p>Nuevo</p></a>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                    <div th:each="carga : ${cargas}">
                                                                        <div class="card border-secondary p-3 mb-1" th:classappend="${carga.estado != null && carga.estado == 'PENDIENTE'} ? 'bg-soft-red' : 'bg-whitesmoke'">

                                                                            <h6 th:text="'Fecha ' + ${#dates.format(carga.fechaCarga, 'dd-MM-yyyy')}"></h6>
                                                                            <h6>
                                                                                <span class="text-dark" th:text="'Camión '+${carga.camion.dominio}+' '+${carga.camion.marca}+' '+${carga.camion.modelo}"></span>
                                                                                <span class="text-dark" th:if="${carga.acoplado != null}" th:text="'- Acoplado '+${carga.acoplado.dominio}+' '+${carga.acoplado.marca}+' '+${carga.acoplado.modelo}"></span>
                                                                            </h6>
                                                                            <div class="row">
                                                                                <div class="col-9">
                                                                                    <p class="mb-1" id="dimgray" th:text="'KM Carga '+${#numbers.formatDecimal(carga.kmCarga, 0, 'POINT', 1, 'COMMA')}"></p>
                                                                                    <h6 class="mb-2" id="dimgray" th:text="'Km Recorrido: ' + ${#numbers.formatDecimal(carga.kmRecorrido, 1, 'POINT', 1, 'COMMA')}"></h6>
                                                                                    <p class="mb-1 text-dark" th:text="${carga.litro} + ' L - Tanque Lleno: ' + ${carga.completo}"></p>
                                                                                    <h6 class="mb-1" th:text="'Consumo: ' + ${carga.consumo} + ' L / 100 Km'"></h6>
                                                                                    <span id="dimgray" th:if="${carga.azul != null}" th:text="'Urea '+${carga.azul.litro}+' Lts '"></span>
                                                                                    <p class="mb-0" id="dimgray" th:if="${carga.chofer != null}" th:text="'Chofer '+${carga.chofer.nombre}"></p>
                                                                                    <p class='mb-0' th:if="${carga.estado == 'ACEPTADO'}" id="darkgray" th:text="'Confirmó '+${carga.usuario.nombre}"></p>
                                                                                </div>
                                                                                <div class="col-3 text-center">
                                                                                    <a th:href="@{/imagen/verCombustibleAdmin(idCarga=${carga.id}, desde=${desde}, hasta=${hasta}, idCamion=${idCamion}, idChofer=${idChofer})}">
                                                                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-card-image" viewBox="0 0 16 16">
                                                                                            <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"/>
                                                                                            <path d="M1.5 2A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2zm13 1a.5.5 0 0 1 .5.5v6l-3.775-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12v.54L1 12.5v-9a.5.5 0 0 1 .5-.5z"/>
                                                                                        </svg>    <p id="icono2">Imagen</p>
                                                                                    </a>
                                                                                    <div title="Ir a Modificar Carga">
                                                                                        <a th:href="@{/combustible/modificarAdmin(idCarga=${carga.id}, desde=${desde}, hasta=${hasta}, idCamion=${idCamion}, idChofer=${idChofer})}">
                                                                                            <svg id="modificar" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                                                                                                <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                                                                                            </svg>     <p id="modificar">Modificar</p>
                                                                                        </a>
                                                                                    </div>
                                                                                    <div th:if="${carga.estado == 'PENDIENTE'}" class="pb-0">
                                                                                        <a title="Confirmar Carga" id="myButton" type="button" th:href="@{/combustible/aceptar(idCarga=${carga.id}, desde=${desde}, hasta=${hasta}, idCamion=${idCamion}, idChofer=${idChofer})}">
                                                                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-check-square-fill" viewBox="0 0 16 16">
                                                                                                <path d="M2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2zm10.03 4.97a.75.75 0 0 1 .011 1.05l-3.992 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.75.75 0 0 1 1.08-.022z"/>
                                                                                            </svg> <p id="icono2">Confirmar</p>
                                                                                        </a>
                                                                                    </div>    
                                                                                </div>
                                                                            </div> 
                                                                        </div>
                                                                    </div>
                                                                    <br>
                                                                        <div class="text-center mb-2">
                                                                            <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/index}">Volver</a>
                                                                        </div>
                                                                </div>
                                                                <div th:if="${cargas.isEmpty()}">
                                                                    <br>
                                                                        <div class="card border-secondary p-4 mb-4 text-center" id="color-card">
                                                                            <h6 id="azul">No existen Cargas de Combustible para los filtros seleccionados</h6>
                                                                        </div>
                                                                        <div class="text-center mb-2">
                                                                            <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/index}">Volver</a>
                                                                        </div>
                                                                </div>
                                                                <div id="spinner" class="modal" style="display: none;">
                                                                    <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                                                        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                                                            <span class="sr-only">Cargando...</span>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            <script>
                                                                document.addEventListener("DOMContentLoaded", function () {
                                                                    const volverBtn = document.getElementById("ver");
                                                                    volverBtn.addEventListener("click", function (e) {
                                                                        // Mostrar spinner
                                                                        document.getElementById("spinner").style.display = "block";
                                                                    });
                                                                });
                                                                document.addEventListener("DOMContentLoaded", function () {
                                                                    const volverBtn = document.getElementById("myButton");
                                                                    volverBtn.addEventListener("click", function (e) {
                                                                        // Mostrar spinner
                                                                        document.getElementById("spinner").style.display = "block";
                                                                    });
                                                                });
                                                            </script>
                                                            <script>
                                                                function startExport(event) {
                                                                    event.preventDefault();

                                                                    const modal = document.getElementById('loadingModalExport');
                                                                    modal.style.display = 'block';

                                                                    const desde = document.getElementById('desde').value;
                                                                    const hasta = document.getElementById('hasta').value;
                                                                    const idCamion = document.getElementById('idCamion').value;
                                                                    const idChofer = document.getElementById('idChofer').value;

                                                                    const url = `/combustible/exportaCamion?desde=${desde}&hasta=${hasta}&idCamion=${idCamion}&idChofer=${idChofer}`;

                                                                    fetch(url, {method: 'POST'})
                                                                            .then(response => {
                                                                                const contentDisposition = response.headers.get('Content-Disposition');
                                                                                let fileName = 'exportacion.xlsx';

                                                                                if (contentDisposition) {
                                                                                    const match = contentDisposition.match(/filename="?([^"]+)"?/);
                                                                                    if (match && match[1]) {
                                                                                        fileName = match[1];
                                                                                    }
                                                                                }

                                                                                return response.blob().then(blob => ({blob, fileName}));
                                                                            })
                                                                            .then(({ blob, fileName }) => {
                                                                                const downloadUrl = window.URL.createObjectURL(blob);
                                                                                const a = document.createElement('a');
                                                                                a.href = downloadUrl;
                                                                                a.download = fileName;
                                                                                document.body.appendChild(a);
                                                                                a.click();
                                                                                a.remove();
                                                                            })
                                                                            .catch(error => {
                                                                                console.error('Error:', error);
                                                                                alert('Error durante la exportación.');
                                                                            })
                                                                            .finally(() => {
                                                                                modal.style.display = 'none';
                                                                            });
                                                                }

                                                            </script>
                                                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                            </body>
                                                            </html>

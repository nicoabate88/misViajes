<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Camion Estadistica</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">   
                        <style>
                            .fila-alta {
                                height: 50px;
                            }

                            /* Estilo para pantallas md */
                            @media (max-width: 991.98px) {
                                .table {
                                    font-size: 13px;
                                }
                                .fila-alta {
                                    height: 35px;
                                }

                            }
                            /* Estilo para pantallas sm */
                            @media (max-width: 767.98px) {
                                .table {
                                    font-size: 10px;
                                }
                                .fila-alta {
                                    height: 35px;
                                }

                            }

                            .total-general {
                                font-weight: bold;
                                background-color: #d9d9d9;
                            }
                            .no-border {
                                border: none;
                                background: none;
                                padding: 0;
                                cursor: pointer;
                            }

                            #dimgray td {
                                padding: 6px 1px 1px 1px !important;  /* Reduce el espacio interno */
                                line-height: 1 !important; /* Ajusta la altura mínima */
                                vertical-align: middle;
                                text-align: center;
                            }
                        </style>
                        </head>
                        <body>                         
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/index}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-7 col-sm-7 col-md-8 col-lg-8 col-xl-8 text-center">
                                        <h4>Estadísticas de Camiones</h4>
                                    </div>
                                    <div title="Exportar a Excel" class="col-3 col-sm-3 col-md-2 col-lg-2 col-xl-2 text-center" th:if="${flag == true}">
                                        <form th:action="@{/camion/exportarEstadisticaCamiones}" method="POST">
                                            <input hidden th:value="${desde}" name="desde"> 
                                                <input hidden th:value="${hasta}" name="hasta"> 
                                                    <button class="btn btn-light" type="submit">
                                                        <h6 id="icono">Exportar</h6> 
                                                    </button>
                                                    </form>
                                                    </div>
                                                    </div>
                                                    </div>
                                                    <div class="container mb-2"> 
                                                        <div class="card-header" id="bgWhite">
                                                            <form class="row g-3" th:action="@{/camion/mostrarEstadisticaCamionesFiltro}" method="POST">

                                                                <div class="row">    
                                                                    <div class="col-5">
                                                                        <label for="desde" class="form-label">Desde</label>
                                                                        <input type="date" class="form-control border-secondary" id="desde" th:value="${desde}" name="desde" required>
                                                                    </div>
                                                                    <div class="col-5">
                                                                        <label for="hasta" class="form-label">Hasta</label>
                                                                        <input type="date" class="form-control border-secondary" id="hasta" th:value="${hasta}" name="hasta" required>                                                                                              
                                                                    </div>
                                                                    <div class="col-2 text-center">
                                                                        <label for="ver" class="form-label">Ver</label>
                                                                        <button id="ver" class="btn btn-primary" type="submit">
                                                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="24" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                                                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                                            </svg>
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            </form>   
                                                        </div>
                                                        <div th:if="${estadistica.size > 1}">
                                                            <div class="table-responsive border border-secondary rounded">
                                                                <table class="table table-md bg-light table-hover mb-0" id="dimgray">
                                                                    <thead>
                                                                        <tr>
                                                                            <th class="text-center">Camión</th>
                                                                            <th class="text-center">Viajes</th>
                                                                            <th class="text-center">KM</th>
                                                                            <th class="text-center">Diesel</th>
                                                                            <th class="text-center">Consumo</th>
                                                                            <th class="text-center">Gastos</th>
                                                                            <th class="text-center">Neto</th>
                                                                            <th class="text-center">Neto/Km</th>
                                                                        </tr>
                                                                    </thead>
                                                                    <tbody>
                                                                        <tr th:each="entry : ${estadistica}" class="fila-alta" th:classappend="${entry.key.dominio == 'TOTAL' ? 'total-general' : ''}">
                                                                            <td class="ext-center"><b><a id="dimgray" th:href="@{/camion/mostrarEstadistica/__${entry.key.id}__}" th:text="${entry.key.dominio}"></a></b></td>
                                                                            <td class="text-center" th:text="${#numbers.formatDecimal(entry.value.flete, 0, 'POINT', 0, 'POINT')}" th:style="${entry.value.flete}"></td>
                                                                            <td class="text-center" th:text="${#numbers.formatDecimal(entry.value.kmRecorrido, 0, 'POINT', 0, 'POINT')}"></td>
                                                                            <td class="text-center" th:text="${#numbers.formatDecimal(entry.value.litro, 0, 'POINT', 0, 'POINT')}"></td>
                                                                            <td class="text-center" th:text="${#numbers.formatDecimal(entry.value.consumo, 1, 'POINT', 1, 'COMMA')}"></td>
                                                                            <td class="text-center" th:text="'$'+${#numbers.formatDecimal(entry.value.gasto, 0, 'POINT', 0, 'COMMA')}"></td>
                                                                            <td class="text-center" th:text="'$'+${#numbers.formatDecimal(entry.value.neto, 0, 'POINT', 0, 'COMMA')}"></td>
                                                                            <td class="text-center" th:text="'$'+${#numbers.formatDecimal(entry.value.rentabilidad, 0, 'POINT', 0, 'COMMA')}"></td>
                                                                        </tr>
                                                                    </tbody>
                                                                </table>
                                                            </div>
                                                            <br>
                                                                <div class="text-center mb-2">
                                                                    <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/index}">Volver</a>
                                                                </div>
                                                        </div>
                                                        <div th:if="${estadistica.size <= 1}">
                                                            <div class="card border-secondary p-4 mb-4 text-center" id="color-card">
                                                                <h6 id="azul">No existen Estadísticas de Camiones para la fecha seleccionada</h6>
                                                            </div>
                                                            <div class="text-center mb-2">
                                                                <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/index}">Volver</a>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                    </body>
                                                    </html>

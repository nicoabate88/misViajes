<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Mantenimiento Mostrar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        </head>
                        <body>                          
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/mantenimiento/listarChofer}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-8 text-center">
                                        <h4>Detalle de Mantenimiento</h4>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2">  
                                <div class="card border-secondary p-3 mb-2" id="color-card">
                                    <h6><strong th:text="${mantenimiento.tipoMantenimiento.nombre}"></strong></h6>
                                    <h6 class="mb-1" id="dimgray"><strong th:if="${mantenimiento.camion != null}" th:text="'- '+${mantenimiento.aplicaA}+' '+${mantenimiento.camion.dominio}+' - '+${mantenimiento.camion.marca}+' '+${mantenimiento.camion.modelo}"></strong></h6>
                                    <h6 class="mb-1" id="dimgray"><strong th:if="${mantenimiento.acoplado != null}" th:text="'- '+${mantenimiento.aplicaA}+' '+${mantenimiento.acoplado.dominio}+' - '+${mantenimiento.acoplado.marca}+' '+${mantenimiento.acoplado.modelo}"></strong></h6>
                                    <p class="mb-2" id="dimgray" th:text="'Fecha ' + ${#dates.format(mantenimiento.fecha, 'dd-MM-yyyy')}"></p>
                                    <h6 th:if="${mantenimiento.km != 0}" class="mb-2" id="dimgray" th:text="'Km Mantenimiento ' +${#numbers.formatDecimal(mantenimiento.km, 0, 'POINT', 0, 'POINT')}"></h6>
                                    <span class="mb-3" th:switch="${mantenimiento.estado}"><strong>
                                            <span id="dimgray">Estado</span>
                                            <span th:case="'VIGENTE'">✅ VIGENTE</span>
                                            <span th:case="'PRÓXIMO A VENCER'">🟡 PRÓXIMO A VENCER</span>
                                            <span th:case="'VENCIDO'">❌ VENCIDO</span>
                                            <span th:text="' '+${#numbers.formatDecimal(mantenimiento.kmVigencia, 0, 'POINT', 0, 'POINT')}+' Km'"></span>
                                        </strong></span>
                                    <h6 class="mb-2 text-dark" th:text="'🔧 Próximo Mantenimiento '+${#numbers.formatDecimal(mantenimiento.kmProximo, 0, 'POINT', 0, 'POINT')}+' Km'"></h6>
                                    <h6 class="mb-2 text-dark" th:text="'⏰ Alarma '+${#numbers.formatDecimal(mantenimiento.kmAlarma, 0, 'POINT', 0, 'POINT')}+' Km'"></h6>
                                    <p th:if="${mantenimiento.observacion != ''}" id="dimgray" th:text="'Observación '+${mantenimiento.observacion}"></p>                            
                                </div>
                                <div th:if="${exito != null}" class="card bg-secondary mb-4 p-3 border-secondary text-center border border-secondary rounded">                        
                                    <h6 id="white" th:text="${exito}"></h6>                                                                             
                                </div>
                                <div class="text-center mb-2">
                                    <a class="btn btn-primary bg-primary btn-lg w-50" type="button" th:href="@{/mantenimiento/listarChofer}">Finalizar</a>
                                </div>
                            </div>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

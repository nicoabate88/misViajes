<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Camion Registrar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        </head>
                        <body>
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href="@{/camion/listar}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-8 text-center">
                                        <h4>Registrar Camión</h4>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2"> 
                                <div class="card border-secondary p-2" id="color-card">
                                    <form id="form" th:action="@{/camion/registro}" th:object="${camion}" method="POST">
                                        <div class="row">
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                <label for="dominio" class="form-label text-secondary">Dominio de Camión*</label>                                
                                                <input type="text" class="form-control" id="dominio" placeholder="Ingrese Dominio" 
                                                       th:field="*{dominio}" required minlength="6" maxlength="7" size="7">     
                                            </div>
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                <label for="marca" class="form-label text-secondary">Marca de Camión*</label>
                                                <input type="text" class="form-control" id="marca" placeholder="Ingrese Marca" th:field="*{marca}" required
                                                       minlength="1" maxlength="30" size="30">
                                            </div>
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                <label for="modelo" class="form-label text-secondary">Modelo de Camión*</label>
                                                <input type="text" class="form-control" id="modelo" placeholder="Ingrese Modelo" th:field="*{modelo}" required
                                                       minlength="1" maxlength="30" size="30">
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                <label for="estado" class="form-floting text-secondary">Habilitar Camión*</label>
                                                <select class="form-control" id="estado" th:field="*{estado}" required>
                                                    <option selected="" value="HABILITADO">HABILITADO</option>
                                                    <option value="INHABILITADO">INHABILITADO</option>
                                                </select>
                                            </div>
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                <label for="azul1" class="form-floting text-secondary">Carga de Urea*</label>
                                                <select class="form-control" id="azul1" th:field="*{azul}" required>
                                                    <option selected value="">Seleccione Opción</option>
                                                    <option value="HABILITADO">HABILITADO</option>
                                                    <option value="INHABILITADO">INHABILITADO</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="row">    
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-3">
                                                <label>Neumático de Auxilio*</label>
                                                <input type="number" id="auxilio" class="form-control" placeholder="Ingrese Cantidad" th:field="*{cantidadAuxilio}" 
                                                       min="0" max="5" required>
                                            </div>
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-3">
                                                <label>Cantidad de Ejes*</label>
                                                <input type="number" id="cantidadEjes" placeholder="Ingrese Cantidad" class="form-control" min="1" max="5" required>
                                            </div>
                                        </div>    
                                        <div id="contenedorEjes"></div>
                                        <div class="container">
                                            <div th:if="${error != null}" class="card-body mb-5 text-center" id="mensaje">                        
                                                <h6 id="white" th:text="${error}"></h6>                                                                             
                                            </div>
                                        </div>
                                        <br>
                                            <div class="text-center mb-2">
                                                <button id="registra" class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Registrar Camión">Registrar</button>
                                            </div>
                                            <div class="text-center">
                                                <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href="@{/camion/listar}" title="Cancelar">Cancelar</a>
                                            </div> 
                                    </form>
                                </div>
                            </div>
                            <div id="spinner" class="modal" style="display: none;">
                                <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                    <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                        <span class="sr-only">Cargando...</span>
                                    </div>
                                </div>
                            </div>
                            <script>
                                document.getElementById('cantidadEjes').addEventListener('input', function () {
                                    const cantidad = parseInt(this.value);
                                    const contenedor = document.getElementById('contenedorEjes');
                                    contenedor.innerHTML = '';

                                    if (isNaN(cantidad) || cantidad < 1 || cantidad > 5) {
                                        return;
                                    }

                                    for (let i = 0; i < cantidad; i++) {
                                        const numero = i + 1;
                                        const nombrePorDefecto = `Eje ${numero}`;

                                        const ejeHTML = `
        <hr>
        <div class="container mb-2"> 
            <div class="row">
                <div class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1 text-center mb-2 mt-3">
                    <h6 class="mt-4">${numero}</h6>
                    <input type="hidden" name="ejes[${i}].numero" value="${numero}">
                </div>
                <div class="col-6 col-sm-6 col-md-7 col-lg-4 col-xl-4 mb-2">
                    <label>Nombre de Eje*</label>
                    <input type="text" class="form-control" name="ejes[${i}].nombre" value="${nombrePorDefecto}" required minlength="1" maxlength="20">
                </div>

                <div class="col-5 col-sm-5 col-md-4 col-lg-2 col-xl-2">
                    <label>Izable*</label>
                    <select class="form-control elevable" name="ejes[${i}].elevable">
                        <option value="false">No</option>
                        <option value="true">Sí</option>
                    </select>
                </div>
                
                <div class="col-4 col-sm-4 col-md-4 col-lg-2 col-xl-2 mb-2">
                    <label>% de Km*</label>
                    <input type="number" class="form-control porcentaje" name="ejes[${i}].porcentaje" value="100" min="1" max="100" required>
                </div>

                <div class="col-8 col-sm-8 col-md-8 col-lg-3 col-xl-3 mb-2">
                    <label>Cantidad de Neumáticos*</label>
                    <input type="number" class="form-control" name="ejes[${i}].cantidadNeumatico" min="1" max="4" placeholder="Ingrese Cantidad de Neumáticos Eje ${numero}" required>
                </div>
            </div>
        </div>
        `;
                                        contenedor.insertAdjacentHTML('beforeend', ejeHTML);
                                    }

                                    // Después de agregar los elementos, asignamos el evento de cambio a cada select
                                    const selectsElevables = contenedor.querySelectorAll('.elevable');
                                    selectsElevables.forEach((select, index) => {
                                        select.addEventListener('change', function () {
                                            const porcentajeInput = contenedor.querySelectorAll('.porcentaje')[index];
                                            if (this.value === "true") {
                                                porcentajeInput.value = 50;
                                            } else {
                                                porcentajeInput.value = 100;
                                            }
                                        });
                                    });
                                });

                            </script>
                            <script>
                                document.getElementById("form").addEventListener("submit", function () {
                                    document.getElementById("spinner").style.display = "block";
                                });
                            </script>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

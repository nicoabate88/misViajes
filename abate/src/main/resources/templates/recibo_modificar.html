<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Recibo Modificar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">   
                        <script>
                            window.onload = function () {
                                var fechaActual = new Date();
                                var dia = String(fechaActual.getDate()).padStart(2, '0');
                                var mes = String(fechaActual.getMonth() + 1).padStart(2, '0');
                                var anio = fechaActual.getFullYear();
                                var fechaFormateada = anio + '-' + mes + '-' + dia;

                                document.getElementById('fecha').max = fechaFormateada;
                            };
                        </script>
                        </head>
                        <body>
                            <section>
                                <div class="card-header mb-2" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">   
                                            <a title="Volver" th:href="@{/recibo/listar}" type="button">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                </svg> 
                                            </a>   
                                        </div>
                                        <div  class="col-7 col-sm-7 col-md-7 col-lg-8 col-xl-8 text-center">
                                            <h4>Modificar Recibo</h4>
                                        </div>
                                        <div title="Ir a Eliminar Recibo" class="col-3 col-sm-3 col-md-3 col-lg-2 col-xl-2 text-center">
                                            <a th:href="@{/recibo/eliminar/__${recibo.id}__}">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                                                    <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                                                    <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                                                </svg> <h6 id="icono">Eliminar</h6> </a>
                                        </div>
                                    </div>
                                </div>
                                <div class="container mb-2">   
                                    <div class="card border-secondary p-2" id="color-card"> 
                                        <form id="form" th:action="@{/recibo/modifica/__${recibo.id}__}" method="POST">

                                            <input hidden th:value="${recibo.id}" name="id">
                                                <div class="row">
                                                    <div class="col-12 col-sm-12 col-md-12 col-lg-8 col-xl-8 mb-2">
                                                        <label for="cliente" class="form-floting text-secondary">Cliente*</label>
                                                        <select class="form-control" id="cliente" name="idCliente">
                                                            <option selected th:text="${recibo.cliente.nombre}" th:value="${recibo.cliente.id}"></option>
                                                            <option th:each="cliente : ${clientes}"
                                                                    th:value="${cliente.id}"
                                                                    th:text="${cliente.nombre}"/>
                                                        </select>
                                                    </div>
                                                    <div class="d-none d-sm-block col-lg-4 col-xl-4">
                                                    </div>
                                                </div>
                                                <div class="row">
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                        <label for="fecha" class="form-label text-secondary">Fecha*</label>
                                                        <input type="date" class="form-control" id="fecha" th:value="${recibo.fecha}" name="fecha" required>
                                                    </div>   
                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-4 mb-2">
                                                        <label for="importe" class="form-label text-secondary">Importe*</label>
                                                        <div class="input-group">
                                                            <span class="input-group-text">$</span>
                                                            <input type="number" step="0.01" class="form-control" id="importe" th:value="${recibo.importe}" name="importe" required>
                                                        </div>    
                                                    </div>
                                                </div>
                                                <div class="row">
                                                    <div class="col-12 col-sm-12 col-md-12 col-lg-8 col-xl-8 mb-5">
                                                        <label for="observacion" class="form-label text-secondary">Observación*</label>
                                                        <input type="text" class="form-control" id="observacion" th:value="${recibo.observacion}" name="observacion" required minlength="1" maxlength="60" size="60">
                                                    </div>
                                                    <div class="d-none d-sm-block col-lg-4 col-xl-4">
                                                    </div>    
                                                </div>
                                                <div class="text-center mb-2">
                                                    <button class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Modificar Recibo">Modificar</button>
                                                </div>
                                                <div class="text-center">
                                                    <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href= "@{/recibo/listar}" title="Cancelar">Cancelar</a>
                                                </div>
                                        </form>
                                    </div>
                                </div>
                            </section>
                            <script>
                                const conceptoInput = document.getElementById('observacion');
                                const maxLength = 60;

                                conceptoInput.addEventListener('input', function () {
                                    if (conceptoInput.value.length > maxLength) {
                                        conceptoInput.value = conceptoInput.value.slice(0, maxLength);
                                    }
                                });
                            </script>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

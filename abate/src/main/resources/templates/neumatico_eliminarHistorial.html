<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Neumatico Modificar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        </head>
                        <body>
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2" th:if="${historial.camion != null}">   
                                        <a title="Volver" th:href="@{/neumatico/asignar1(aplicaA=${camion}, idEntidad=${historial.camion.id})}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div class="col-2" th:if="${historial.acoplado != null}">   
                                        <a title="Volver" th:href="@{/neumatico/asignar1(aplicaA=${acoplado}, idEntidad=${historial.acoplado.id})}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-7 col-sm-7 col-md-7 col-lg-8 col-xl-8 text-center">
                                        <h4>Eliminar Historial de Neumático</h4>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2"> 
                                <div class="card border-secondary p-3 mb-2" id="color-card">
                                    <h6 th:if="${historial.camion != null}" th:text="'Camión '+${historial.camion.dominio}+' '+${historial.camion.marca}+' '+${historial.camion.modelo}"></h6>
                                    <h6 th:if="${historial.acoplado != null}" th:text="'Acoplado '+${historial.acoplado.dominio}+' '+${historial.acoplado.marca}+' '+${historial.acoplado.modelo}"></h6>
                                    <h6 id="dimgray" th:text="'Eje: '+${historial.posicion.eje.nombre + (historial.posicion.eje.elevable ? ' - Izable' : '')}"></h6>
                                    <h6 id="dimgray" th:text="'Posición '+${historial.posicion.posicion}"></h6>
                                    <p id="dimgray" class="mb-2" th:text="'Fecha de Colocación '+${#dates.format(historial.fechaColocacion, 'dd-MM-yyyy')}+' / Km '+${#numbers.formatDecimal(historial.kmColocacion, 0, 'POINT', 0, 'POINT')}"></p>
                                    
                                </div>  
                                <div th:if="${error == null}" class="card bg-secondary mb-4 p-3 border-secondary text-center">
                                    <h6 id="white">¿Seguro desea ELIMINAR este Historial de Neumático?</h6>
                                    <p id="white">Si el Historial es eliminado, no podrá ser recuperado.</p>
                                </div>
                                <div th:if="${error != null}" class="card-body mb-5 text-center border border-secondary rounded" id="mensaje">                        
                                    <h6 id="white" th:text="${error}"></h6>                                                                             
                                </div>                                  
                                <div th:if="${historial.camion != null && error == null}" class="text-center mb-2">
                                    <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" th:href="@{/neumatico/eliminaHistorial(id=${historial.id}, aplicaA=${camion}, idEntidad=${historial.camion.id})}" title="Eliminar Historial">Eliminar</a>
                                </div> 
                                <div th:if="${historial.acoplado != null && error == null}" class="text-center mb-2">
                                    <a class="btn btn-secondary bg-secondary btn-lg w-50" type="button" th:href="@{/neumatico/eliminaHistorial(id=${historial.id}, aplicaA=${acoplado}, idEntidad=${historial.acoplado.id})}" title="Eliminar Historial">Eliminar</a>
                                </div> 
                                <div class="text-center" th:if="${historial.camion != null}">
                                    <a class="btn btn-primary bg-primary border-light btn-lg w-50" type="button" th:href="@{/neumatico/asignar1(aplicaA=${camion}, idEntidad=${historial.camion.id})}" title="Cancelar">Cancelar</a>
                                </div> 
                                <div class="text-center" th:if="${historial.acoplado != null}">
                                    <a class="btn btn-primary bg-primary border-light btn-lg w-50" type="button" th:href="@{/neumatico/asignar1(aplicaA=${acoplado}, idEntidad=${historial.acoplado.id})}" title="Cancelar">Cancelar</a>
                                </div>
                            </div>

                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

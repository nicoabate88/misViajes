<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Imagen Descarga Modificar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">       
                        </head>
                        <body>
                                <div class="card-header mb-2" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">   
                                            <a title="Volver" type="button" th:href="@{/flete/mostrarPendiente/__${flete.id}__}">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                </svg> 
                                            </a>   
                                        </div>
                                        <div  class="col-7 col-sm-7 col-md-7 col-lg-8 col-xl-8 text-center">
                                            <h4>Modificar Ticket de Descarga</h4>
                                        </div>
                                        <div  class="col-3 col-sm-3 col-md-3 col-lg-2 col-xl-2 text-center">
                                            <a th:href="@{/imagen/eliminarDescargaPendiente/__${id}__}">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                                                    <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                                                    <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                                                </svg> <h6 id="icono">Eliminar</h6> </a>
                                        </div>
                                    </div>
                                </div>
                                <div class="container mb-2">   
                                <div class="card border-secondary p-2" id="color-card">
                                    <form th:action="@{/imagen/modificaDescargaPendiente}" method="POST" enctype="multipart/form-data" onsubmit="mostrarCargando()">
                                        <input hidden th:value="${id}" name="id"> 
                                            <div class="col-12 mb-5">
                                                <label id="darkblue" for="file">Cargar Ticket Descarga</label>
                                                <input type="file" id="file" name="file" accept="image/*" required>
                                            </div>  
                                            <div class="container">
                                                <div th:if="${error != null}" class="card-body mb-5 text-center border border-secondary rounded" id="mensaje">                        
                                                    <h6 id="white" th:text="${error}"></h6>                                                                             
                                                </div>
                                            </div>
                                            <div class="text-center mb-2">
                                                <button class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Modificar Imagen">Modificar</button>
                                            </div>
                                            <div class="text-center">
                                                <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href="@{/flete/mostrarPendiente/__${flete.id}__}" title="Cancelar">Cancelar</a>
                                            </div>
                                    </form>
                                </div>

                            </div>
                            <div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; text-align: center; color: white;">
                                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
                                    <div class="spinner-border text-light" role="status">
                                        <span class="sr-only">Cargando...</span>
                                    </div>
                                    <p>Subiendo imagen, por favor espere...</p>
                                </div>
                            </div>
                            <script>
                                document.getElementById('file').onchange = function () {

                                    const file = this.files[0];
                                    const fileType = file.type;

                                    if (this.files[0].size > 5 * 1024 * 1024) { // 5MB in bytes
                                        alert("La imagen es demasiado grande. El tamaño máximo permitido es 5MB.");
                                        this.value = ''; // Clear the input
                                        return;
                                    }

                                    // Verifica el tipo de archivo (imágenes o PDF)
                                    const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'application/pdf'];
                                    if (!allowedTypes.includes(fileType)) {
                                        alert("El archivo debe ser de tipo jpeg, png, gif o pdf");
                                        this.value = ''; // Limpia el input
                                        return; // Detiene la ejecución del script
                                    }
                                };
                                function mostrarCargando() {
                                    document.getElementById("loading-overlay").style.display = "block"; // Muestra el overlay
                                    document.querySelector("button[type='submit']").disabled = true; // Deshabilita el botón de carga

                                }
                            </script>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

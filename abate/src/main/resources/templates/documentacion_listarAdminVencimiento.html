<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Documentacion a Vencer</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
                        <link rel="stylesheet" href="/css/medidas_container.css">   
                            <style>
                                .link-historial {
                                    color: darkgrey;
                                    background: none;
                                    border: none;
                                    padding: 0;
                                    cursor: pointer;
                                }
                                .modal-header-darkblue {
                                    background-color: darkblue;
                                    color: white;
                                }
                                /* Estilo para pantallas md */
                                @media (max-width: 991.98px) {
                                    .table {
                                        font-size: 13px;
                                    }
                                    .text-dark {
                                        font-size: 13px;
                                    }
                                }
                                /* Estilo para pantallas sm */
                                @media (max-width: 767.98px) {
                                    .table {
                                        font-size: 10px;
                                    }
                                    .text-dark {
                                        font-size: 13px;
                                    }
                                }
                                .text-green {
                                    color: green;
                                    font-size: 1.2em;
                                }

                                .text-yellow {
                                    color: orange;
                                    font-size: 1.2em;
                                }

                                .text-red {
                                    color: red;
                                    font-size: 1.2em;
                                }
                            </style>
                            </head>
                            <body>                        
                                <div class="card-header mb-4" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">   
                                            <a title="Volver" th:href="@{/documentacion/listarAdmin}" type="button">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                </svg> 
                                            </a>   
                                        </div>
                                        <div  class="col-8 text-center" th:if="${flag != true}">
                                            <h4>Documentación a Vencer</h4>
                                        </div>
                                        <div  class="col-6 col-sm-6 col-md-7 col-lg-8 col-xl-8 text-center" th:if="${flag == true}">
                                            <h4>Documentación a Vencer</h4>
                                        </div>
                                        <div class="col-2 col-sm-2 col-md-1 col-lg-1 col-xl-1 text-center" th:if="${flag == true}">
                                            <form>
                                                <button id="exportButton" onclick="startExport(event)" class="btn btn-light" type="button">
                                                    <input hidden id="dias" th:value="${dias}" name="dias">
                                                        <h6 id="icono">Excel</h6>
                                                </button>
                                            </form>
                                        </div>
                                        <div class="col-2 col-sm-2 col-md-2 col-lg-1 col-xl-1 text-center" th:if="${flag == true}">
                                            <a title="Ir a Imprimir Documentación" target="_blank" th:href="@{/documentacion/imprimirVencimiento/__${dias}__}">
                                                <svg id="imprimirExporta" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-printer" viewBox="0 0 16 16">
                                                    <path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1"/>
                                                    <path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1h1a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1V3a2 2 0 0 0-2-2zM4 3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2H4zm1 5a2 2 0 0 0-2 2v1H2a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v-1a2 2 0 0 0-2-2zm7 2v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1"/>
                                                </svg><p id="imprimirExporta">Imprimir</p>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                                <div class="container mb-2">  
                                    <div id="loadingModalExport" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); color: white; text-align: center; z-index: 1000;">
                                        <div style="margin-top: 20%; font-size: 20px;">
                                            <div class="spinner" style="margin-bottom: 20px;">
                                                <svg viewBox="0 0 50 50" style="width: 50px; height: 50px;">
                                                    <circle cx="25" cy="25" r="20" fill="none" stroke-width="5" stroke="#fff" stroke-dasharray="31.4 31.4" stroke-linecap="round">
                                                        <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite" />
                                                    </circle>
                                                </svg>
                                            </div>
                                            Exportando... Por favor, espere.
                                        </div>
                                    </div> 
                                    <form th:action="@{/documentacion/listarAdminVencimientoFiltro}" method="POST">
                                        <div class="row">
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-5 col-xl-5 pb-3">
                                                <label for="dias" class="form-floting text-secondary">Cantidad de Días</label>
                                                <input type="number" step="1" class="form-control border-secondary" id="dias" name="dias" th:value="${dias}">
                                            </div>
                                            <div class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1 text-center">
                                                <label for="ver" class="form-floting">Ver</label> 
                                                <button id="ver"  class="btn btn-primary" type="submit">
                                                    <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="24" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                    </svg>
                                                </button>
                                            </div>
                                        </div>
                                    </form>
                                    <div th:if="${documentacion.size >= 1}">
                                        <div class="mb-4" th:each="entry : ${documentacion}">
                                            <h6 class="text-dark p-1 text-center" th:text="${entry.key}"></h6> 
                                            <div class="table-responsive border border-secondary rounded">
                                                <table class="table border bg-light table-hover table-sm mb-0" id="dimgray">
                                                    <thead>
                                                        <tr>
                                                            <th class="text-center">Entidad</th>
                                                            <th class="text-center">Fecha Alta</th>
                                                            <th class="text-center">Vencimiento</th>
                                                            <th class="text-center">Vigencia</th>
                                                            <th class="text-center">Estado</th>
                                                            <th class="text-center">Observación</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        <tr th:each="documento : ${entry.value}">
                                                            <td class="text-center" th:if="${documento.camion != null}">
                                                                <span th:text="${documento.camion.dominio}"></span>

                                                            </td>
                                                            <td class="text-center" th:if="${documento.acoplado != null}">
                                                                <span th:text="${documento.acoplado.dominio}"></span>

                                                            </td>
                                                            <td class="text-center" th:if="${documento.chofer != null}">
                                                                <span th:text="${documento.chofer.nombre}"></span>

                                                            </td>
                                                            <td class="text-center" th:text="${#dates.format(documento.fechaAlta, 'dd-MM-yyyy')}"></td>
                                                            <td class="text-center" th:text="${#dates.format(documento.fechaVencimiento, 'dd-MM-yyyy')}"></td>
                                                            <th class="text-center text-primary" th:text="${documento.diasVigencia}+' días'"></th>
                                                            <td class="text-center">
                                                                <span th:switch="${documento.estado}">
                                                                    <span th:case="'VIGENTE'">✅ VIGENTE</span>
                                                                    <span th:case="'PRÓXIMO A VENCER'">🟡 PRÓXIMO A VENCER</span>
                                                                    <span th:case="'VENCIDO'">❌ VENCIDO</span>
                                                                </span> 
                                                            </td>
                                                            <td class="text-center" th:text="${documento.observacion}"></td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                        <div class="text-center mb-2">
                                            <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/documentacion/listarAdmin}">Volver</a>
                                        </div>
                                    </div>
                                    <div th:if="${documentacion.size < 1}">
                                        <br>
                                            <div class="card border-secondary p-4 mb-2 text-center" id="color-card">
                                                <h6 id="azul" th:text="'No existe Documentación a vencer en los próximos '+${dias}+' días'"></h6>
                                            </div>
                                            <br>
                                                <div class="text-center mb-2">
                                                    <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/documentacion/listarAdmin}">Volver</a>
                                                </div>
                                                </div>
                                                </div>
                                                <div id="spinner" class="modal" style="display: none;">
                                                    <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                                        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                                            <span class="sr-only">Cargando...</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <!-- Modal para mostrar historial -->
                                                <div class="modal fade" id="modalHistorial" tabindex="-1" role="dialog" aria-labelledby="modalHistorialLabel" aria-hidden="true">
                                                    <div class="modal-dialog modal-xl modal-dialog-scrollable" role="document">
                                                        <div class="modal-content">
                                                            <div class="modal-header position-relative modal-header-darkblue">
                                                                <h4 class="modal-title mx-auto">Detalle</h4>
                                                                <button type="button" class="close text-white" style="position: absolute; right: 15px;" data-dismiss="modal" aria-label="Cerrar">
                                                                    <span aria-hidden="true">&times;</span>
                                                                </button>
                                                            </div>
                                                            <div class="modal-body" id="historialContenido">
                                                                <!-- Aquí se cargará el fragmento HTML con el historial -->
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <script>
                                                    document.addEventListener("DOMContentLoaded", function () {
                                                        const volverBtn = document.getElementById("ver");
                                                        volverBtn.addEventListener("click", function (e) {
                                                            // Mostrar spinner
                                                            document.getElementById("spinner").style.display = "block";
                                                        });
                                                    });

                                                    function verHistorial(button) {
                                                        const camionId = button.getAttribute('data-id');

                                                        fetch(`/camion/detalle/${camionId}`)
                                                                .then(response => {
                                                                    if (!response.ok) {
                                                                        throw new Error("Error al obtener detalle");
                                                                    }
                                                                    return response.text();
                                                                })
                                                                .then(html => {
                                                                    document.getElementById("historialContenido").innerHTML = html;
                                                                    const modal = new bootstrap.Modal(document.getElementById('modalHistorial'));
                                                                    modal.show();
                                                                })
                                                                .catch(error => {
                                                                    console.error("Error:", error);
                                                                    alert("No se pudo cargar el detalle del camión.");
                                                                });
                                                    }


                                                    document.addEventListener("DOMContentLoaded", function () {
                                                        document.querySelectorAll(".link-historial-alt").forEach(function (btn) {
                                                            btn.addEventListener("click", function () {
                                                                const id = this.getAttribute("data-id");

                                                                fetch("/camion/detalle/" + id)
                                                                        .then(response => response.text())
                                                                        .then(html => {
                                                                            document.getElementById("modalHistorialAltContent").innerHTML = html;
                                                                            new bootstrap.Modal(document.getElementById("modalHistorialAlt")).show();
                                                                        })
                                                                        .catch(error => console.error("Error al cargar detalle", error));
                                                            });
                                                        });
                                                    });

                                                    $(document).ready(function () {
                                                        $('#filtroForm').on('submit', function () {
                                                            $('#loadingModal').modal('show');
                                                        });
                                                    });
                                                    $(document).ready(function () {
                                                        $('#exportaForm').on('submit', function () {
                                                            $('#loadingModal').modal('show');
                                                        });
                                                    });

                                                    function verHistorialA(button) {
                                                        const acopladoId = button.getAttribute('data-idA');

                                                        fetch(`/acoplado/detalle/${acopladoId}`)
                                                                .then(response => {
                                                                    if (!response.ok) {
                                                                        throw new Error("Error al obtener detalle");
                                                                    }
                                                                    return response.text();
                                                                })
                                                                .then(html => {
                                                                    document.getElementById("historialContenido").innerHTML = html;
                                                                    const modal = new bootstrap.Modal(document.getElementById('modalHistorial'));
                                                                    modal.show();
                                                                })
                                                                .catch(error => {
                                                                    console.error("Error:", error);
                                                                    alert("No se pudo cargar el detalle del acoplado.");
                                                                });
                                                    }


                                                    document.addEventListener("DOMContentLoaded", function () {
                                                        document.querySelectorAll(".link-historial-alt").forEach(function (btn) {
                                                            btn.addEventListener("click", function () {
                                                                const id = this.getAttribute("data-id");

                                                                fetch("/acoplado/detalle/" + id)
                                                                        .then(response => response.text())
                                                                        .then(html => {
                                                                            document.getElementById("modalHistorialAltContent").innerHTML = html;
                                                                            new bootstrap.Modal(document.getElementById("modalHistorialAlt")).show();
                                                                        })
                                                                        .catch(error => console.error("Error al cargar detalle", error));
                                                            });
                                                        });
                                                    });

                                                    function verHistorialC(button) {
                                                        const choferId = button.getAttribute('data-idC');

                                                        fetch(`/chofer/detalle/${choferId}`)
                                                                .then(response => {
                                                                    if (!response.ok) {
                                                                        throw new Error("Error al obtener detalle");
                                                                    }
                                                                    return response.text();
                                                                })
                                                                .then(html => {
                                                                    document.getElementById("historialContenido").innerHTML = html;
                                                                    const modal = new bootstrap.Modal(document.getElementById('modalHistorial'));
                                                                    modal.show();
                                                                })
                                                                .catch(error => {
                                                                    console.error("Error:", error);
                                                                    alert("No se pudo cargar el detalle del chofer.");
                                                                });
                                                    }


                                                    document.addEventListener("DOMContentLoaded", function () {
                                                        document.querySelectorAll(".link-historial-alt").forEach(function (btn) {
                                                            btn.addEventListener("click", function () {
                                                                const id = this.getAttribute("data-idC");

                                                                fetch("/chofer/detalle/" + id)
                                                                        .then(response => response.text())
                                                                        .then(html => {
                                                                            document.getElementById("modalHistorialAltContent").innerHTML = html;
                                                                            new bootstrap.Modal(document.getElementById("modalHistorialAlt")).show();
                                                                        })
                                                                        .catch(error => console.error("Error al cargar detalle", error));
                                                            });
                                                        });
                                                    });

                                                </script>
                                                <script>
                                                    function startExport(event) {
                                                        event.preventDefault();

                                                        const modal = document.getElementById('loadingModalExport');
                                                        modal.style.display = 'block';

                                                        const dias = document.getElementById('dias').value;

                                                        const url = `/documentacion/exportaVencimiento?dias=${dias}`;

                                                        fetch(url, {method: 'POST'})
                                                                .then(response => {
                                                                    const contentDisposition = response.headers.get('Content-Disposition');
                                                                    let fileName = 'exportacion.xlsx';

                                                                    if (contentDisposition) {
                                                                        const match = contentDisposition.match(/filename="?([^"]+)"?/);
                                                                        if (match && match[1]) {
                                                                            fileName = match[1];
                                                                        }
                                                                    }

                                                                    return response.blob().then(blob => ({blob, fileName}));
                                                                })
                                                                .then(({ blob, fileName }) => {
                                                                    const downloadUrl = window.URL.createObjectURL(blob);
                                                                    const a = document.createElement('a');
                                                                    a.href = downloadUrl;
                                                                    a.download = fileName;
                                                                    document.body.appendChild(a);
                                                                    a.click();
                                                                    a.remove();
                                                                })
                                                                .catch(error => {
                                                                    console.error('Error:', error);
                                                                    alert('Error durante la exportación.');
                                                                })
                                                                .finally(() => {
                                                                    modal.style.display = 'none';
                                                                });
                                                    }
                                                </script>
                                                <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                </body>
                                                </html>

<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Cheque Vender</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">  

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>

        body{
            background-color:#f4f6f9;
        }

        .card-financiera{
            border:none;
            border-radius:15px;
            overflow:hidden;
        }

        .card-header-financiero{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            color:white;
            padding:20px;
        }

        .titulo-financiero{
            font-weight:700;
            margin-bottom:5px;
        }

        .subtitulo-financiero{
            opacity:0.85;
            margin-bottom:0;
        }

        .label-financiero{
            font-weight:600;
            color:#495057;
        }

        .custom-select{
            border-radius:10px;
            height:45px;
        }

        .btn-financiero{
            border-radius:10px;
            padding:10px 20px;
            font-weight:600;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <!-- TITULO -->

    <div class="mb-4">

        <h2 class="font-weight-bold mb-1">
            Venta de Cheques
        </h2>

    </div>

    <!-- CARD -->

    <div class="card shadow-sm card-financiera">

        <!-- HEADER -->

        <div class="card-header-financiero">

            <h4 class="titulo-financiero">
                Operación Financiera
            </h4>

            <p class="subtitulo-financiero">
                Selección de cuenta bancaria
            </p>

        </div>

        <!-- BODY -->

        <div class="card-body p-4">

            <form action="/cheque/venta"
                  method="POST">

                <div class="row justify-content-center">

                    <!-- CUENTA -->

                    <div class="col-md-8 mb-4">

                        <label class="label-financiero">
                            Cuenta Bancaria
                        </label>

                        <select name="idCuentaBancaria"
                                class="custom-select"
                                required>

                            <option value="">
                                Seleccione cuenta bancaria
                            </option>

                            <option th:each="c : ${cuentas}"
                                    th:value="${c.id}"
                                    th:text="${c.banco}+' - '+${c.numeroCuenta}+' | Saldo: $ '+${#numbers.formatDecimal(c.saldoDisponible,1,'POINT',2,'COMMA')}">
                            </option>

                        </select>

                    </div>

                </div>

                <!-- INFO -->

                <div class="alert alert-info border-0 mt-2">

                    Seleccione la cuenta bancaria sobre la cual se realizará
                    la operación de venta de cheques.

                </div>

                <!-- BOTONES -->

                <div class="text-right mt-4">

                    <a href="/cuentaBancaria/listar"
                       class="btn btn-outline-secondary btn-financiero mr-2">

                        Cancelar

                    </a>

                    <button type="submit"
                            class="btn btn-primary btn-financiero shadow-sm">

                        <i class="bi bi-arrow-right-circle mr-1"></i>

                        Continuar

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

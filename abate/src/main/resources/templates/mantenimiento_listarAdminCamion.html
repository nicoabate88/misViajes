<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Mantenimiento Listar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css"> 
                        </head>
                        <body>
                            <section>
                                <div class="card-header mb-3" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">    
                                            <form th:action="@{/mantenimiento/listarAdminCamionFiltro}" method="POST">
                                                <input hidden th:value="${idCamion}" name="idCamion">
                                                    <button id="volver1" type="submit" class="border-0 bg-transparent shadow-none" title="Volver">
                                                        <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                            <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                        </svg> 
                                                    </button>
                                            </form>
                                        </div>
                                        <div  class="col-8 text-center">
                                            <h4>Mantenimiento de Camión</h4>
                                        </div>
                                    </div>
                                </div>
                                <div class="container mb-2">  
                                    <div class="mb-2 p-2">
                                        <h6 th:text="${mantenimiento.camion.dominio}+' - '+${mantenimiento.camion.marca}+' '+${mantenimiento.camion.modelo}"></h6>  
                                    </div>
                                    <div class="card border-secondary p-3 mb-1" id="color-card">
                                        <h6><strong th:text="${mantenimiento.tipoMantenimiento.nombre}"></strong></h6>
                                        <div class="row">
                                            <div class="col-9 col-md-9">
                                                <p class="mb-1" id="dimgray" th:text="'Fecha ' + ${#dates.format(mantenimiento.fecha, 'dd-MM-yyyy')}"></p>
                                                <h6 class="mb-2" id="dimgray" th:text="'Km Mantenimiento: ' +${#numbers.formatDecimal(mantenimiento.km, 0, 'POINT', 0, 'POINT')}"></h6>
                                                <h6><strong class="mb-2" id="dimgray" th:text="'Km Actual ' +${#numbers.formatDecimal(mantenimiento.kmActual, 0, 'POINT', 0, 'POINT')}"></strong></h6>
                                                <div class="mb-3">
                                                    <span th:switch="${mantenimiento.estado}"><strong>
                                                            <span id="dimgray">Estado</span>
                                                            <span th:case="'VIGENTE'">✅ VIGENTE</span>
                                                            <span th:case="'PRÓXIMO A VENCER'">🟡 PRÓXIMO A VENCER</span>
                                                            <span th:case="'VENCIDO'">❌ VENCIDO</span>
                                                            <span th:text="' '+${#numbers.formatDecimal(mantenimiento.kmVigencia, 0, 'POINT', 0, 'POINT')}+' Km'"></span>
                                                        </strong></span>
                                                </div>
                                                <h6 class="mb-2 text-dark" th:text="'🔧 Próximo Mantenimiento '+${#numbers.formatDecimal(mantenimiento.kmProximo, 0, 'POINT', 0, 'POINT')}+' Km'"></h6>
                                                <h6 class="mb-2 text-dark" th:text="'🔔 Alarma '+${#numbers.formatDecimal(mantenimiento.kmAlarma, 0, 'POINT', 0, 'POINT')}+' Km'"></h6>
                                                <p class='mb-0' id="dimgray" th:text="'Observación '+${mantenimiento.observacion}"></p> 
                                                <p class='mb-0' id="darkgray" th:text="'Usuario '+${mantenimiento.usuario.nombre}"></p>
                                            </div>
                                            <div class="col-3 col-md-3 text-center">
                                                <div title="Ir a Modificar Documentación">
                                                    <a th:href= "@{/mantenimiento/modificar/__${mantenimiento.id}__}">
                                                        <svg id="modificar" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                                                            <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                                                        </svg>     <p id="modificar">Modificar</p>
                                                    </a>

                                                </div>
                                            </div> 
                                        </div>
                                    </div>  
                                    <br>
                                        <div class="text-center">
                                            <form th:action="@{/mantenimiento/listarAdminCamionFiltro}" method="POST">
                                                <input hidden th:value="${idCamion}" name="idCamion">
                                                    <button id="volver2" title="Volver" type="submit" class="btn btn-primary bg-primary btn-lg w-50">Volver</button>
                                            </form>
                                        </div>
                                </div>
                                <div id="spinner" class="modal" style="display: none;">
                                    <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                            <span class="sr-only">Cargando...</span>
                                        </div>
                                    </div>
                                </div>
                            </section>
                            <script>
                                document.addEventListener("DOMContentLoaded", function () {
                                    const volverBtn = document.getElementById("volver1");
                                    volverBtn.addEventListener("click", function (e) {
                                        // Mostrar spinner
                                        document.getElementById("spinner").style.display = "block";
                                    });
                                });
                                document.addEventListener("DOMContentLoaded", function () {
                                    const volverBtn = document.getElementById("volver2");
                                    volverBtn.addEventListener("click", function (e) {
                                        // Mostrar spinner
                                        document.getElementById("spinner").style.display = "block";
                                    });
                                });

                            </script>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

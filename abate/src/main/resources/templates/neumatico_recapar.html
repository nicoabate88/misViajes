<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Neumatico Recapar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        <script>
                            window.onload = function () {
                            var fechaActual = new Date();
                            var dia = String(fechaActual.getDate()).padStart(2, '0');
                            var mes = String(fechaActual.getMonth() + 1).padStart(2, '0');
                            var anio = fechaActual.getFullYear();
                            var fechaFormateada = anio + '-' + mes + '-' + dia;

                            document.getElementById('fecha').max = fechaFormateada;
                            };
                        </script>
                        </head>
                        <body>
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href= "@{/neumatico/listarRecapado}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-8 text-center">
                                        <h4>Registrar Recapado</h4>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2"> 
                                <div class="card border-secondary p-2" id="color-card">
                                    <form  id="formRecapado" th:action="@{/neumatico/recapa}" method="POST">
                                        <div class="row">
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                <label for="fecha" class="form-label text-secondary">Fecha*</label>
                                                <input type="date" class="form-control" id="fecha" th:value="${fecha}" name="fecha" required>
                                            </div>
                                            <div class="col-6 col-sm-6 col-md-6 col-lg-6 col-xl-6 mb-2">
                                                <label for="proveedor" class="form-label text-secondary">Proveedor*</label>
                                                <select class="form-control text-secondary" id="proveedor" name="idProveedor" required>
                                                    <option selected disabled value="">Seleccione Proveedor</option>
                                                    <option th:each="proveedor : ${proveedores}" th:value="${proveedor.id}" th:text="${proveedor.nombre}"/>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-12 col-sm-12 col-md-6 col-lg-6 col-xl-6 mb-2">
                                                <label for="idNeumatico" class="form-floting text-secondary">Neumático*</label>
                                                <select class="form-control text-secondary" id="idNeumatico" name="idNeumatico">
                                                    <option selected disabled value="">Seleccione Neumático</option>
                                                    <option th:each="neumatico : ${neumaticos}"
                                                            th:value="${neumatico.id}"
                                                            th:text="${neumatico.numero}+'. '+${neumatico.marca.marca}+' '+${neumatico.modelo}+' - '+${#numbers.formatDecimal(neumatico.km, 0, 'POINT', 0, 'POINT')}+' Km'"/>
                                                </select>
                                            </div>
                                            <div class="col-10 col-sm-10 col-md-4 col-lg-3 col-xl-3 mb-2">
                                                <label for="kmEstimado" class="form-label text-secondary">KM Estimado*</label>
                                                <div class="input-group">
                                                    <span class="input-group-text">KM</span>
                                                    <input type="number" step="1" class="form-control" id="kmEstimado" placeholder="Ingrese KM estimado" name="kmEstimado">
                                                </div>    
                                            </div> 
                                            <div class="col-1">  
                                                <div class="form-floating" >
                                                    <label class="form-label text-white"></label><br><br>
                                                            <button type="button" class="btn btn-outline-primary border-primary p-1" id="btnAgregarNeumatico" title="Agregar Recapado">
                                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-plus-square-fill" viewBox="0 0 16 16">
                                                                    <path d="M2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2zm6.5 4.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3a.5.5 0 0 1 1 0"/>
                                                                </svg>
                                                            </button>
                                                            </div>
                                                            </div> 
                                                            </div>
                                                            <div class="row">
                                                                <div class="mt-3 col-12 col-sm-12 col-md-12 col-lg-10 col-xl-10 mb-4">
                                                                    <div class="table-responsive tabla-scroll">
                                                                        <table class="table table-sm table-bordered mb-0" id="tablaRecapados">
                                                                            <thead class="thead-light">
                                                                                <tr class="text-center">
                                                                                    <th>Neumático</th>
                                                                                    <th>KM Estimado</th>
                                                                                    <th class="text-center" style="width: 50px;">Acción</th>
                                                                                </tr>
                                                                            </thead>
                                                                            <tbody></tbody>
                                                                        </table>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            <div class="row">
                                                                <div class="col-12 col-sm-12 col-md-12 col-lg-10 col-xl-10 mb-5">                            
                                                                    <label for="obs" class="form-label text-secondary">Observación</label>
                                                                    <textarea class="form-control text-secondary" id="obs" name="observacion" rows="2" placeholder="Ingrese Observación..." maxlength="150" size="150"></textarea>
                                                                </div> 
                                                            </div>
                                                            <br>
                                                                <div class="text-center mb-2">
                                                                    <button id="registrar" class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Aceptar">Aceptar</button>
                                                                </div>
                                                                <div class="text-center">
                                                                    <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href="@{/neumatico/listarRecapado}" title="Cancelar">Cancelar</a>
                                                                </div> 
                                                                </form>
                                                                </div>
                                                                </div>
                                                                <script>

                                                                    let recapados = [];

                                                                    document.getElementById("btnAgregarNeumatico").addEventListener("click", function () {

                                                                    const select = document.getElementById("idNeumatico");
                                                                    const kmEstimado = document.getElementById("kmEstimado").value;

                                                                    if (!select.value) {
                                                                    alert("Seleccione un neumático.");
                                                                    return;
                                                                    }

                                                                    if (!kmEstimado) {
                                                                    alert("Ingrese KM estimado.");
                                                                    return;
                                                                    }

                                                                    const id = select.value;
                                                                    const texto = select.options[select.selectedIndex].text;

                                                                    // Evitar duplicados
                                                                    if (recapados.some(r => r.id == id)) {
                                                                    alert("El neumático ya fue agregado.");
                                                                    return;
                                                                    }

                                                                    const recapado = {
                                                                    id: id,
                                                                    descripcion: texto,
                                                                    kmEstimado: kmEstimado
                                                                    };

                                                                    recapados.push(recapado);

                                                                    renderTabla();
                                                                    limpiarCampos();
                                                                    });

                                                                    function renderTabla() {

                                                                    const tbody = document.querySelector("#tablaRecapados tbody");
                                                                    tbody.innerHTML = "";

                                                                    recapados.forEach((r, index) => {

                                                                    const row = `
                                                                    <tr class="text-center text-secondary">
                                                                    <td>${r.descripcion}</td>
                                                                    <td>${r.kmEstimado}</td>
                                                                    <td><button type="button" class="btn-eliminar" onclick="eliminar(${index})">❌</button></td>
                                                                    </tr>
                                                                    `;

                                                                    tbody.innerHTML += row;
                                                                    });

                                                                    generarHiddenInputs();
                                                                    }

                                                                    function eliminar(index) {
                                                                    recapados.splice(index, 1);
                                                                    renderTabla();
                                                                    }

                                                                    function limpiarCampos() {
                                                                    document.getElementById("kmEstimado").value = "";
                                                                    document.getElementById("idNeumatico").selectedIndex = 0;
                                                                    }

                                                                    function generarHiddenInputs() {

                                                                    // eliminar anteriores
                                                                    document.querySelectorAll(".hiddenRecapado").forEach(e => e.remove());

                                                                    const form = document.querySelector("form");

                                                                    recapados.forEach((r, i) => {

                                                                    form.insertAdjacentHTML("beforeend", `
                                                                    <input type="hidden" name="recapados[${i}].idNeumatico" 
                                                                    value="${r.id}" class="hiddenRecapado"/>
                                                                    <input type="hidden" name="recapados[${i}].kmEstimado" 
                                                                    value="${r.kmEstimado}" class="hiddenRecapado"/>
                                                                    `);
                                                                    });
                                                                    }

                                                                </script>
                                                                <script>

                                                                    document.getElementById("formRecapado").addEventListener("submit", function (event) {

                                                                    if (recapados.length === 0) {

                                                                    event.preventDefault(); // detiene el submit

                                                                    alert("Debe agregar al menos un neumático para recapar.");

                                                                    return false;
                                                                    }
                                                                    });

                                                                </script>
                                                                <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                                <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                                </body>
                                                                </html>

<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Chofer ModificarPsw</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        </head>
                        <body>
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a title="Volver" th:href= "@{/chofer/listar}"  type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-8 text-center">
                                        <h4>Modificar Contraseña Chofer</h4>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2"> 
                                <div class="card border-secondary p-2" id="color-card">
                                    <form id="form" th:action="@{/chofer/modificaPsw/__${chofer.id}__}" method="POST">

                                        <input hidden th:value="${chofer.id}" name="id">
                                            <div class="row">
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-5 col-xl-5 mb-2">
                                                    <label for="usuario" class="form-label text-secondary">Nombre de Usuario</label>
                                                    <input type="text" class="form-control" id="usuario" name="nombreUsuario" th:value="${chofer.usuario}" disabled readonly>
                                                </div>

                                                <div class="col-6 col-sm-6 col-md-6 col-lg-7 col-xl-7">
                                                </div>
                                            </div>
                                            <div class="row">
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-5 col-xl-5 mb-2">
                                                    <label for="password" class="form-label text-secondary">Nueva Contraseña*</label>
                                                    <div class="input-group">
                                                        <input type="password" class="form-control" id="password" placeholder="Ingrese Contraseña" name="password" required>
                                                            <button class="btn btn-secondary border-secondary bg-light" type="button" id="togglePassword">
                                                                <i class="fas fa-eye"></i> 
                                                            </button>
                                                    </div>
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-5 col-xl-5 mb-5">
                                                    <label for="password2" class="form-label text-secondary">Repita Contraseña*</label>
                                                    <div class="input-group">
                                                        <input type="password" class="form-control" id="password2" placeholder="Repita Contraseña" name="password2" required>
                                                            <button class="btn btn-secondary border-secondary bg-light" type="button" id="togglePassword2">
                                                                <i class="fas fa-eye"></i> 
                                                            </button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="container">
                                                <div th:if="${error == null}" class="card border-primary mb-5 p-3 col-lg-10 col-xl-10 text-center" id="eliminar">
                                                    <h6 id="darkblue">¿Seguro desea MODIFICAR esta Contraseña?</h6>
                                                    <p id="dimgray">Será necesario informar al chofer sobre la nueva contraseña generada.</p>
                                                </div>
                                            </div>
                                            <div class="text-center mb-2">
                                                <button class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Modificar PSW">Modificar</button>
                                            </div>
                                            <div class="text-center">
                                                <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href= "@{/chofer/listar}" title="Cancelar">Cancelar</a>
                                            </div> 
                                            </div>
                                    </form>
                                </div>

                                <div id="spinner" class="modal" style="display: none;">
                                    <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                            <span class="sr-only">Cargando...</span>
                                        </div>
                                    </div>
                                </div>
                                <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
                                <script>
                                    document.getElementById("togglePassword").addEventListener("click", function () {
                                        var passwordInput = document.getElementById("password");
                                        var icon = this.querySelector("i");

                                        if (passwordInput.type === "password") {
                                            passwordInput.type = "text";
                                            icon.classList.remove("fa-eye");
                                            icon.classList.add("fa-eye-slash");
                                        } else {
                                            passwordInput.type = "password";
                                            icon.classList.remove("fa-eye-slash");
                                            icon.classList.add("fa-eye");
                                        }
                                    });
                                    document.getElementById("togglePassword2").addEventListener("click", function () {
                                        var passwordInput = document.getElementById("password2");
                                        var icon = this.querySelector("i");

                                        if (passwordInput.type === "password") {
                                            passwordInput.type = "text";
                                            icon.classList.remove("fa-eye");
                                            icon.classList.add("fa-eye-slash");
                                        } else {
                                            passwordInput.type = "password";
                                            icon.classList.remove("fa-eye-slash");
                                            icon.classList.add("fa-eye");
                                        }
                                    });

                                    const passwordInput = document.getElementById('password');

                                    passwordInput.addEventListener('keydown', function (event) {
                                        if (event.key === ' ') {
                                            event.preventDefault(); // evita que se escriba el espacio
                                        }
                                    });

                                    const passwordInput2 = document.getElementById('password2');

                                    passwordInput2.addEventListener('keydown', function (event) {
                                        if (event.key === ' ') {
                                            event.preventDefault(); // evita que se escriba el espacio
                                        }
                                    });

                                    document.getElementById('form').addEventListener('submit', function (event) {
                                        const psw = document.getElementById('password').value;
                                        const psw2 = document.getElementById('password2').value;

                                        if (psw !== psw2) {
                                            alert('Las Contraseñas ingresadas deben ser iguales');
                                            event.preventDefault();
                                            return;
                                        }
                                        document.getElementById("spinner").style.display = "block";
                                    });
                                </script>
                                <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

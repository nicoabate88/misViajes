<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Neumatico Modificar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">  
                        </head>
                        <body>
                            <div class="card-header mb-2" style="height: 70px;">
                                <div class="row">
                                    <div class="col-2">   
                                        <a id="volver1" title="Volver" th:href="@{/neumatico/listarFiltro(ubicacion=${ubicacion}, estado=${estado})}" type="button">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                            </svg> 
                                        </a>   
                                    </div>
                                    <div  class="col-7 col-sm-7 col-md-7 col-lg-8 col-xl-8 text-center">
                                        <h4>Modificar Neumático</h4>
                                    </div>
                                    <div th:if="${flag == false}" title="Ir a Eliminar Neumático" class="col-3 col-sm-3 col-md-3 col-lg-2 col-xl-2 text-center">
                                        <a th:href="@{/neumatico/eliminar(idNeumatico=${neumatico.id}, ubicacion=${ubicacion}, estado=${estado})}">
                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                                                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                                                <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                                            </svg><h6 id="icono">Eliminar</h6> </a>
                                    </div>
                                </div>
                            </div>
                            <div class="container mb-2"> 
                                <div class="card border-secondary p-2" id="color-card">
                                    <form th:action="@{/neumatico/modifica}" method="POST" onsubmit="return validarCheckboxes()">
                                        <input hidden th:value="${neumatico.id}" name="id">
                                            <input hidden th:value="${ubicacion}" name="ubicacion">
                                                <input hidden th:value="${estado}" name="estado">
                                                    <div class="row">
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                            <label for="numero" class="form-label text-secondary">N° de Neumático*</label>                                
                                                            <input type="number" step="1" class="form-control" id="numero" name="numero" th:value="${neumatico.numero}" required>     
                                                        </div>
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                            <label for="fecha" class="form-label text-secondary">Fecha de Ingreso*</label>
                                                            <input type="date" class="form-control" id="fecha" name="fecha" th:value="${neumatico.fechaIngreso}" required>
                                                        </div>
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                            <label for="marca" class="form-label text-secondary">Marca*</label>
                                                            <select class="form-control text-secondary" id="marca" name="idMarca" required>
                                                                <option selected th:text="${neumatico.marca.marca}" th:value="${neumatico.marca.id}"></option>
                                                                <option th:each="marca : ${marcas}" th:value="${marca.id}" th:text="${marca.marca}"/>
                                                            </select>
                                                        </div>
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                            <label for="modelo" class="form-label text-secondary">Modelo*</label>
                                                            <input type="text" class="form-control" id="modelo" th:value="${neumatico.modelo}" name="modelo" 
                                                                   minlength="1" maxlength="30" size="30" required>
                                                        </div>                                       
                                                    </div>
                                                    <div class="row">    
                                                        <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                            <label for="proveedor" class="form-label text-secondary">Proveedor*</label>
                                                            <select class="form-control text-secondary" id="proveedor" name="idProveedor" required>
                                                                <option selected th:text="${neumatico.proveedor.nombre}" th:value="${neumatico.proveedor.id}"></option>
                                                                <option th:each="proveedor : ${proveedores}" th:value="${proveedor.id}" th:text="${proveedor.nombre}"/>
                                                            </select>
                                                        </div>
                                                        <div th:if="${flag == false}" class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                            <label for="estado" class="form-floting text-secondary">Estado*</label>
                                                            <select class="form-control" id="estado" name="estadoN" required>
                                                                <option selected th:text="${neumatico.estado}" th:value="${neumatico.estado}"></option>
                                                                <option value="NUEVO">NUEVO</option>
                                                                <option value="USADO">USADO</option>
                                                                <option value="RECAPADO">RECAPADO</option>
                                                            </select>
                                                        </div>
                                                        <input th:if="${flag == true}" hidden th:value="${neumatico.estado}" name="estadoN">
                                                            <div th:if="${flag == false}" class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                                <label for="km" class="form-label text-secondary">KM Actual*</label>
                                                                <div class="input-group">
                                                                    <span class="input-group-text">KM</span>
                                                                    <input type="number" step="1" class="form-control" id="km" th:value="${neumatico.km}" name="km" required>
                                                                </div>    
                                                            </div> 
                                                            <input th:if="${flag == true}" hidden th:value="${neumatico.km}" name="km">
                                                                <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                                    <label for="kmEstimado" class="form-label text-secondary">KM Estimado*</label>
                                                                    <div class="input-group">
                                                                        <span class="input-group-text">KM</span>
                                                                        <input type="number" step="1" class="form-control" id="kmEstimado" th:value="${neumatico.kmEstimado}" name="kmEstimado" required>
                                                                    </div>    
                                                                </div>
                                                                </div>
                                                                <div class="row" th:if="${neumatico.ubicacion == 'DEPOSITO' OR neumatico.ubicacion == 'FUERA DE SERVICIO'}">
                                                                    <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                                        <label for="ubicacion" class="form-floting text-secondary">Ubicación*</label>
                                                                        <select class="form-control" id="ubicacion" name="ubicacionN" required>
                                                                            <option selected th:text="${neumatico.ubicacion}" th:value="${neumatico.ubicacion}"></option>
                                                                            <option th:if="${neumatico.ubicacion != 'DEPOSITO'}" th:value="DEPOSITO">DEPOSITO</option>
                                                                            <option th:if="${neumatico.ubicacion != 'FUERA DE SERVICIO'}" th:value="FUERA_DE_SERVICIO">FUERA DE SERVICIO</option>
                                                                        </select>
                                                                    </div>        
                                                                </div>
                                                                <div class="mb-2"> 
                                                                    <label>Aplica a*</label>
                                                                    <div th:each="valor : ${aplicaA}">
                                                                        <input type="checkbox" name="aplicaA"
                                                                               th:value="${valor}"
                                                                               th:id="${valor}"
                                                                               th:checked="${neumatico.aplicaA.contains(valor)}" />
                                                                        <label th:for="${valor}" th:text="${valor}"></label>
                                                                    </div>
                                                                </div>

                                                                <div class="row">    
                                                                    <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 mb-5">
                                                                        <label for="obs" class="form-label text-secondary">Observación</label>
                                                                        <textarea class="form-control text-secondary" id="obs" name="observacion" rows="2" 
                                                                                  th:value="${neumatico.observacion}" maxlength="150" size="150"></textarea>
                                                                    </div> 
                                                                </div> 
                                                                <div th:if="${error != null}" class="card-body mb-5 text-center border border-secondary rounded" id="mensaje">                        
                                                                    <h6 id="white" th:text="${error}"></h6>                                                                             
                                                                </div>
                                                                <br>
                                                                    <div class="text-center mb-2">
                                                                        <button class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Modificar Neumático">Modificar</button>
                                                                    </div>
                                                                    <div class="text-center">
                                                                        <a id="volver2" class="btn btn-primary bg-primary border-light w-50" type="button" th:href="@{/neumatico/listarFiltro(ubicacion=${ubicacion}, estado=${estado})}" title="Cancelar">Cancelar</a>
                                                                    </div> 
                                                                    </form>
                                                                    </div>
                                                                    </div>
                                                                    <div id="spinner" class="modal" style="display: none;">
                                                                        <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                                                            <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                                                                <span class="sr-only">Cargando...</span>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                    <script>
                                                                        document.getElementById('numero').addEventListener('keydown', function (event) {
                                                                            if (event.key === '.' || event.key === ',') {
                                                                                event.preventDefault();
                                                                            }
                                                                        });

                                                                        document.getElementById('numero').addEventListener('input', function () {
                                                                            this.value = this.value.replace(/[^0-9]/g, '');
                                                                        });
                                                                        document.getElementById('km').addEventListener('keydown', function (event) {
                                                                            if (event.key === '.' || event.key === ',') {
                                                                                event.preventDefault();
                                                                            }
                                                                        });

                                                                        document.getElementById('km').addEventListener('input', function () {
                                                                            this.value = this.value.replace(/[^0-9]/g, '');
                                                                        });
                                                                        document.getElementById('kmEstimado').addEventListener('keydown', function (event) {
                                                                            if (event.key === '.' || event.key === ',') {
                                                                                event.preventDefault();
                                                                            }
                                                                        });

                                                                        document.getElementById('kmEstimado').addEventListener('input', function () {
                                                                            this.value = this.value.replace(/[^0-9]/g, '');
                                                                        });

                                                                        function validarCheckboxes() {
                                                                            const checkboxes = document.querySelectorAll('input[name="aplicaA"]');
                                                                            const algunoSeleccionado = Array.from(checkboxes).some(checkbox => checkbox.checked);
                                                                            if (!algunoSeleccionado) {
                                                                                alert('Debe seleccionar al menos una opción en "Aplica a".');
                                                                                return false; // evita el envío del formulario
                                                                            }

                                                                            document.getElementById("spinner").style.display = "block";
                                                                            return true; // permite el envío

                                                                        }

                                                                    </script>
                                                                    <script>
                                                                        document.addEventListener("DOMContentLoaded", function () {
                                                                            const volverBtn = document.getElementById("volver1");
                                                                            volverBtn.addEventListener("click", function (e) {
                                                                                // Mostrar spinner
                                                                                document.getElementById("spinner").style.display = "block";
                                                                            });
                                                                        });
                                                                        document.addEventListener("DOMContentLoaded", function () {
                                                                            const volverBtn = document.getElementById("volver2");
                                                                            volverBtn.addEventListener("click", function (e) {
                                                                                // Mostrar spinner
                                                                                document.getElementById("spinner").style.display = "block";
                                                                            });
                                                                        });
                                                                    </script>
                                                                    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                                    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                                    </body>
                                                                    </html>

<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Viaje Registrar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">
                        <script>
                            window.onload = function () {
                                var fechaActual = new Date();
                                var dia = String(fechaActual.getDate()).padStart(2, '0');
                                var mes = String(fechaActual.getMonth() + 1).padStart(2, '0');
                                var anio = fechaActual.getFullYear();
                                var fechaFormateada = anio + '-' + mes + '-' + dia;

                                document.getElementById('fc').max = fechaFormateada;
                                document.getElementById('ff').max = fechaFormateada;
                            };
                        </script>
                        </head>
                        <body>
                            <section>
                                <div class="card-header mb-2" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">   
                                            <a title="Volver" th:href= "@{/index}" type="button">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                </svg> 
                                            </a>   
                                        </div>
                                        <div  class="col-8 text-center">
                                            <h4>Registrar Viaje</h4>
                                        </div>
                                    </div>
                                </div>
                                <div class="container mb-2">   
                                    <div class="card border-secondary p-2" id="color-card"> 
                                        <form id="form" th:action="@{/flete/registroAdmin}" method="POST">
                                            <div class="row">
                                                <div class="col-12 col-sm-12 col-md-12 col-lg-6 col-xl-6 mb-2">
                                                    <label for="idChofer" class="form-floting text-secondary">Chofer*</label>
                                                    <select class="form-control" id="idChofer" name="idChofer" required onchange="enviarDatos()">
                                                        <option selected th:value="${chofer.id}" th:text="${chofer.nombre}"></option>
                                                        <option th:each="chofer : ${choferes}"
                                                                th:value="${chofer.id}"
                                                                th:text="${chofer.nombre}"/>
                                                    </select>
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                    <label for="dominio" class="form-floting text-secondary">Camión*</label>
                                                    <select class="form-control" id="dominio" name="idCamion" required>
                                                        <option th:if="${chofer.camion} == null" selected value="">Seleccione Camión</option>
                                                        <option th:if="${chofer.camion} != null" selected th:text="${chofer.camion.dominio}+' - '+${chofer.camion.marca}+' '+${chofer.camion.modelo}" th:value="${chofer.camion.id}"></option>
                                                        <option th:each="camion : ${camiones}"
                                                                th:value="${camion.id}"
                                                                th:text="${camion.dominio}+' - '+${camion.marca}+' '+${camion.modelo}"/>
                                                    </select>
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                    <label for="acoplado" class="form-floting text-secondary">Acoplado*</label>
                                                    <select class="form-control" id="acoplado" name="idAcoplado" required>
                                                        <option th:if="${chofer.acoplado} == null" selected value="">Seleccione Acoplado</option>
                                                        <option th:if="${chofer.acoplado} != null" selected 
                                                                th:text="${chofer.acoplado.dominio}+' - '+${chofer.acoplado.marca}+' '+${chofer.acoplado.modelo}" 
                                                                th:value="${chofer.acoplado.id}"></option>
                                                        <option th:each="acoplado : ${acoplados}"
                                                                th:value="${acoplado.id}"
                                                                th:text="${acoplado.dominio}+' - '+${acoplado.marca}+' '+${acoplado.modelo}"/>
                                                        <option value="">Sin Acoplado</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div class="row">
                                                <div class="col-12 col-sm-12 col-md-12 col-lg-6 col-xl-6 mb-2">
                                                    <label for="cliente" class="form-floting text-secondary">Cliente*</label>
                                                    <select class="form-control" id="cliente" name="idCliente" required>
                                                        <option value="" selected disabled>Seleccione Cliente</option>
                                                        <option th:each="cliente : ${clientes}"
                                                                th:value="${cliente.id}"
                                                                th:text="${cliente.nombre}"/>
                                                    </select>
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                    <label for="fc" class="form-label text-secondary">Fecha de Carga*</label>
                                                    <input type="date" class="form-control" id="fc" name="fechaCarga" required>
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                    <label for="ff" class="form-label text-secondary">Fecha de Viaje*</label>
                                                    <input type="date" class="form-control" id="ff" name="fechaFlete" required>
                                                </div>
                                                <div class="d-none d-sm-block col-md-6">
                                                </div>
                                            </div>
                                            <div class="row">
                                                <div class="col-12 col-sm-12 col-md-12 col-lg-6 col-xl-6 mb-2">
                                                    <label for="origen" class="form-label text-secondary">Origen de Carga*</label>
                                                    <input type="text" class="form-control" id="origen" placeholder="Ingrese Lugar de Origen" name="origen" required minlength="1" maxlength="120" size="120">
                                                </div>

                                                <div class="col-12 col-sm-12 col-md-12 col-lg-6 col-xl-6 mb-2">
                                                    <label for="destino" class="form-label text-secondary">Destino de Carga*</label>
                                                    <input type="text" class="form-control" id="destino" placeholder="Ingrese Destino de Carga" name="destino" required minlength="1" maxlength="120" size="120">
                                                </div>
                                            </div>
                                            <div class="row">
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                    <label for="km" class="form-label text-secondary">KM de Viaje*</label>
                                                    <div class="input-group">
                                                        <span class="input-group-text">km</span>
                                                        <input type="number" step="0.01" class="form-control" id="km" placeholder="Ingrese KM" name="km" required>
                                                    </div>    
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                    <label for="producto" class="form-floting text-secondary">Producto*</label>
                                                    <select class="form-control" id="producto" name="idProducto" required>
                                                        <option selected disabled value="">Seleccione Producto</option>
                                                        <option th:each="producto : ${productos}"
                                                                th:value="${producto.id}"
                                                                th:text="${producto.nombre}"/>
                                                    </select>
                                                </div>

                                                <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                    <label for="cp" class="form-label text-secondary">Carta de Porte*</label>
                                                    <input type="text" class="form-control" id="cp" placeholder="Ingrese CP" name="cPorte" required minlength="1" maxlength="40" size="40">
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                    <label for="ctg" class="form-label text-secondary">CTG*</label>
                                                    <input type="text" class="form-control" id="ctg" placeholder="Ingrese CTG" name="ctg" required minlength="1" maxlength="40" size="40">
                                                </div>
                                            </div>
                                            <div class="row">
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                    <label for="tarifa" class="form-label text-secondary">Tarifa de Viaje*</label>
                                                    <div class="input-group">
                                                        <span class="input-group-text">$</span>
                                                        <input type="number" step="0.01" class="form-control" id="tarifa" placeholder="Ingrese Tarifa" 
                                                               name="tarifa" required oninput="calcularNeto()">
                                                    </div>
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-3 col-xl-3 mb-2">
                                                    <label for="kg" class="form-label text-secondary">KG de Viaje*</label>
                                                    <div class="input-group">
                                                        <span class="input-group-text">kg</span>
                                                        <input type="number" step="0.01" class="form-control" id="kg" placeholder="Ingrese KG" 
                                                               name="kg" required oninput="calcularNeto()">
                                                    </div>
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-4 col-lg-2 col-xl-2 mb-2">
                                                    <label for="comision" class="form-label text-secondary">Comisión Tpte</label>
                                                    <div class="input-group">
                                                        <span class="input-group-text">%</span>
                                                        <input type="number" step="0.01" class="form-control" id="comision" th:value="0.0" 
                                                               name="comisionTpte" required oninput="calcularComision()">
                                                    </div>    
                                                </div> 
                                                <div class="col-6 col-sm-6 col-md-4 col-lg-2 col-xl-2 mb-2">
                                                    <label for="comisionValor" class="form-label text-secondary">Comisión Tpte</label>
                                                    <div class="input-group">
                                                        <span class="input-group-text">$</span>
                                                        <input type="number" step="0.01" class="form-control" id="comisionValor" th:value="0.0" 
                                                               name="comisionTpteValor" required oninput="modificarComision()">
                                                    </div>    
                                                </div> 
                                                <div class="col-6 col-sm-6 col-md-4 col-lg-2 col-xl-2 mb-2">
                                                    <label for="comChofer" class="form-flotin text-secondaryg">Comisión Tpte Chofer</label>
                                                    <select class="form-control" id="comChofer" name="comisionTpteChofer" oninput="descuentaChofer()">
                                                        <option selected th:text="NO" th:value="NO"></option>
                                                        <option value="SI">SI</option>
                                                        <option value="NO">NO</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div class="row">  
                                                <div class="col-6 col-sm-6 col-md-4 col-lg-3 col-xl-3 mb-2">
                                                    <label for="neto" class="form-label text-secondary">Neto</label>
                                                    <div class="input-group">
                                                        <span class="input-group-text">$</span>
                                                        <input type="number" step="0.01" class="form-control" id="neto" 
                                                               name="neto" required oninput="modificarNeto()">
                                                    </div>    
                                                </div> 
                                                <div class="col-6 col-sm-6 col-md-4 col-lg-2 col-xl-2 mb-2">
                                                    <label for="iva" class="form-label text-secondary">IVA</label>
                                                    <div class="input-group">
                                                        <span class="input-group-text">$</span>
                                                        <input type="number" step="0.01" class="form-control" id="iva" 
                                                               name="iva" required oninput="modificarIva()">
                                                    </div>    
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-4 col-lg-3 col-xl-3 mb-2">
                                                    <label for="total" class="form-label text-secondary">Total</label>
                                                    <div class="input-group">
                                                        <span class="input-group-text">$</span>
                                                        <input type="number" step="0.01" class="form-control" id="total" name="total" required>
                                                    </div>    
                                                </div> 
                                                <div class="d-block d-md-none col-6">                           
                                                </div>
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-2 col-xl-2 mb-2">
                                                    <label for="porcentaje" class="form-label text-secondary">Porcentaje Chofer</label>
                                                    <div class="input-group">
                                                        <span class="input-group-text">%</span>
                                                        <input type="number" step="0.01" class="form-control" id="porcentaje"
                                                               name="porcentaje" th:value="${chofer.porcentaje}" required oninput="porcentajeChofer()">
                                                    </div>    
                                                </div>  
                                                <div class="col-6 col-sm-6 col-md-6 col-lg-2 col-xl-2 mb-2">
                                                    <label for="ganancia" class="form-label text-secondary">Ganancia Chofer</label>
                                                    <div class="input-group">
                                                        <span class="input-group-text">$</span>
                                                        <input type="number" step="0.01" class="form-control" id="ganancia" 
                                                               name="gananciaChofer" required oninput="modificarPorcentajeChofer()">
                                                    </div>    
                                                </div>   
                                            </div>
                                            <div class="mb-5">
                                                <label for="obs" class="form-label text-secondary">Observación</label>
                                                <textarea class="form-control text-secondary" id="obs" name="observacion" rows="2" placeholder="Ingrese Observación..." maxlength="150" size="150"></textarea>
                                            </div>
                                            <div class="text-center mb-2">
                                                <button class="btn btn-secondary bg-secondary border-light w-50" type="submit" title="Registrar Flete">Registrar</button>
                                            </div>
                                            <div class="text-center">
                                                <a class="btn btn-primary bg-primary border-light w-50" type="button" th:href= "@{/index}" title="Cancelar">Cancelar</a>
                                            </div> 
                                        </form>
                                    </div> 
                                </div>
                                <div id="spinner" class="modal" style="display: none;">
                                    <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                                        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
                                            <span class="sr-only">Cargando...</span>
                                        </div>
                                    </div>
                                </div>
                            </section>
                            <script>
                                function enviarDatos() {
                                    let idChofer = document.getElementById("idChofer").value;

                                    window.location.href = `/flete/registrarAdmin?idChofer=${idChofer}`;
                                }
                            </script>
                            <script>
                                document.getElementById('form').addEventListener('submit', function (event) {

                                    const km = parseInt(document.getElementById('km').value);
                                    const tarifa = parseInt(document.getElementById('tarifa').value);
                                    const kg = parseInt(document.getElementById('kg').value);
                                    const comision = parseInt(document.getElementById('comision').value);
                                    var fechaCarga = new Date(document.getElementById('fc').value);
                                    var fechaFlete = new Date(document.getElementById('ff').value);

                                    if (fechaFlete < fechaCarga) {
                                        alert('Fecha de Flete debe ser igual o mayor que Fecha de Carga');
                                        event.preventDefault();
                                        return;
                                    }
                                    if (km <= 0) {
                                        alert('KM de Flete debe ser mayor que 0');
                                        event.preventDefault();
                                        return;
                                    }
                                    if (tarifa <= 0) {
                                        alert('Tarifa debe ser mayor que 0');
                                        event.preventDefault();
                                        return;
                                    }
                                    if (kg <= 0) {
                                        alert('KG debe ser mayor que 0');
                                        event.preventDefault();
                                        return;
                                    }
                                    if (comision < 0) {
                                        alert('Comisión de Tpte debe ser igual o mayor que 0');
                                        event.preventDefault();
                                        return;
                                    }
                                    document.getElementById("spinner").style.display = "block";
                                });

                            </script>
                            <script>
                                const conceptoInput = document.getElementById('origen');
                                const maxLength = 120;

                                conceptoInput.addEventListener('input', function () {
                                    if (conceptoInput.value.length > maxLength) {
                                        conceptoInput.value = conceptoInput.value.slice(0, maxLength);
                                    }
                                });
                                const conceptoInput = document.getElementById('destino');
                                const maxLength = 120;

                                conceptoInput.addEventListener('input', function () {
                                    if (conceptoInput.value.length > maxLength) {
                                        conceptoInput.value = conceptoInput.value.slice(0, maxLength);
                                    }
                                });
                                const conceptoInput = document.getElementById('cp');
                                const maxLength = 40;

                                conceptoInput.addEventListener('input', function () {
                                    if (conceptoInput.value.length > maxLength) {
                                        conceptoInput.value = conceptoInput.value.slice(0, maxLength);
                                    }
                                });
                                const conceptoInput = document.getElementById('ctg');
                                const maxLength = 40;

                                conceptoInput.addEventListener('input', function () {
                                    if (conceptoInput.value.length > maxLength) {
                                        conceptoInput.value = conceptoInput.value.slice(0, maxLength);
                                    }
                                });
                            </script>
                            <script>
                                function calcularNeto() {
                                    const tarifa = parseFloat(document.getElementById('tarifa').value) || 0;
                                    const kg = parseFloat(document.getElementById('kg').value) || 0;
                                    const porcentaje = parseFloat(document.getElementById('porcentaje').value) || 0;
                                    const neto = tarifa * (kg / 1000);
                                    const iva = neto * 0.21;
                                    const total = neto + iva;
                                    const ganancia = neto * (porcentaje / 100);

                                    document.getElementById('neto').value = neto >= 0 ? neto.toFixed(2) : '';
                                    document.getElementById('iva').value = iva >= 0 ? iva.toFixed(2) : '';
                                    document.getElementById('total').value = total >= 0 ? total.toFixed(2) : '';
                                    document.getElementById('ganancia').value = ganancia >= 0 ? ganancia.toFixed(0) : '';
                                }

                                function calcularComision() {

                                    const comision = parseFloat(document.getElementById('comision').value) || 0;
                                    let neto;
                                    let comisionValor = 0.0;
                                    const opcion = document.getElementById('comChofer').value;

                                    if (comision !== 0) {

                                        neto = parseFloat(document.getElementById('neto').value) || 0;
                                        comisionValor = (comision * neto) / 100;
                                        neto = neto - comisionValor;

                                        if (opcion === 'SI') {

                                            const porcentaje = parseFloat(document.getElementById('porcentaje').value) || 0;
                                            ganancia = neto * (porcentaje / 100);

                                            document.getElementById('ganancia').value = ganancia >= 0 ? ganancia.toFixed(0) : '';

                                        }

                                    } else {

                                        const porcentaje = parseFloat(document.getElementById('porcentaje').value) || 0;
                                        const tarifa = parseFloat(document.getElementById('tarifa').value) || 0;
                                        const kg = parseFloat(document.getElementById('kg').value) || 0;
                                        neto = tarifa * (kg / 1000);
                                        ganancia = neto * (porcentaje / 100);

                                        document.getElementById('ganancia').value = ganancia >= 0 ? ganancia.toFixed(0) : '';
                                    }

                                    const iva = neto * 0.21;
                                    const total = neto + iva;

                                    document.getElementById('comisionValor').value = comisionValor >= 0 ? comisionValor.toFixed(2) : '';
                                    document.getElementById('neto').value = neto >= 0 ? neto.toFixed(2) : '';
                                    document.getElementById('iva').value = iva >= 0 ? iva.toFixed(2) : '';
                                    document.getElementById('total').value = total >= 0 ? total.toFixed(2) : '';
                                }

                                function modificarComision() {

                                    const comision = parseFloat(document.getElementById('comisionValor').value) || 0;
                                    const opcion = document.getElementById('comChofer').value;
                                    const tarifa = parseFloat(document.getElementById('tarifa').value) || 0;
                                    const kg = parseFloat(document.getElementById('kg').value) || 0;
                                    const neto = (tarifa * (kg / 1000)) - comision;
                                    const iva = neto * 0.21;
                                    const total = neto + iva;

                                    document.getElementById('neto').value = neto >= 0 ? neto.toFixed(2) : '';
                                    document.getElementById('iva').value = iva >= 0 ? iva.toFixed(2) : '';
                                    document.getElementById('total').value = total >= 0 ? total.toFixed(2) : '';
                                    document.getElementById('comision').value = 0.0;

                                    if (opcion === 'SI') {

                                        const porcentaje = parseFloat(document.getElementById('porcentaje').value) || 0;
                                        ganancia = neto * (porcentaje / 100);

                                        document.getElementById('ganancia').value = ganancia >= 0 ? ganancia.toFixed(0) : '';

                                    }
                                }

                                function porcentajeChofer() {

                                    const porcentaje = parseFloat(document.getElementById('porcentaje').value) || 0;
                                    const neto = parseFloat(document.getElementById('neto').value) || 0;

                                    if (porcentaje !== 0) {

                                        ganancia = neto * (porcentaje / 100);
                                        document.getElementById('ganancia').value = ganancia >= 0 ? ganancia.toFixed(0) : '';

                                    } else {

                                        ganancia = 0;
                                        document.getElementById('ganancia').value = ganancia >= 0 ? ganancia.toFixed(0) : '';
                                    }

                                }

                                function modificarPorcentajeChofer() {

                                    document.getElementById('porcentaje').value = 0.0;

                                }

                                function descuentaChofer() {

                                    const opcion = document.getElementById('comChofer').value;

                                    if (opcion === 'SI') {

                                        const neto = parseFloat(document.getElementById('neto').value) || 0;
                                        const porcentaje = parseFloat(document.getElementById('porcentaje').value) || 0;

                                        ganancia = neto * (porcentaje / 100);

                                        document.getElementById('ganancia').value = ganancia >= 0 ? ganancia.toFixed(0) : '';

                                    } else if (opcion === 'NO') {

                                        const tarifa = parseFloat(document.getElementById('tarifa').value) || 0;
                                        const kg = parseFloat(document.getElementById('kg').value) || 0;
                                        const porcentaje = parseFloat(document.getElementById('porcentaje').value) || 0;
                                        const neto = tarifa * (kg / 1000);
                                        const ganancia = neto * (porcentaje / 100);

                                        document.getElementById('ganancia').value = ganancia >= 0 ? ganancia.toFixed(0) : '';

                                    }
                                }

                                function modificarNeto() {
                                    const neto = parseFloat(document.getElementById('neto').value) || 0;
                                    const porcentaje = parseFloat(document.getElementById('porcentaje').value) || 0;
                                    const iva = neto * 0.21;
                                    const total = neto + iva;
                                    const ganancia = neto * (porcentaje / 100);

                                    document.getElementById('iva').value = iva >= 0 ? iva.toFixed(2) : '';
                                    document.getElementById('total').value = total >= 0 ? total.toFixed(2) : '';
                                    document.getElementById('ganancia').value = ganancia >= 0 ? ganancia.toFixed(0) : '';
                                }

                                function modificarIva() {
                                    const neto = parseFloat(document.getElementById('neto').value) || 0;
                                    const iva = parseFloat(document.getElementById('iva').value) || 0;
                                    const total = neto + iva;

                                    document.getElementById('total').value = total >= 0 ? total.toFixed(2) : '';

                                }
                            </script>
                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                        </body>
                        </html>

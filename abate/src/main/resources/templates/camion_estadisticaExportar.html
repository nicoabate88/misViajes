<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Estadística Exportar</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css"> 
                        <style>
                            .spinner svg {
                                animation: spin 1s linear infinite;
                            }
                            @keyframes spin {
                                from {
                                    transform: rotate(0deg);
                                }
                                to {
                                    transform: rotate(360deg);
                                }
                            }
                            .fila-alta {
                                height: 50px;
                            }

                            /* Estilo para pantallas md */
                            @media (max-width: 991.98px) {
                                .table {
                                    font-size: 13px;
                                .fila-alta {
                                    height: 35px;
                                }
                                }
                            }
                            /* Estilo para pantallas sm */
                            @media (max-width: 767.98px) {
                                .table {
                                    font-size: 10px;
                                }
                                .fila-alta {
                                    height: 35px;
                                }
                            }
                        </style>    
                        </head>

                        <body>
                            <section>
                                <div class="card-header mb-2" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">   
                                            <a title="Volver" th:href="@{/camion/mostrarEstadistica/__${id}__}" type="button">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                </svg> 
                                            </a>   
                                        </div>
                                        <div  class="col-7 col-sm-7 col-md-7 col-lg-8 col-xl-8 text-center">
                                            <h4>Exportar Estadísticas</h4>
                                        </div>
                                        <div class="col-3 col-sm-3 col-md-3 col-lg-2 col-xl-2 text-center">
                                            <form>
                                                <input id="idCamion" hidden th:value="${id}" name="idCamion">
                                                    <input id="desde" hidden th:value="${desde}" name="desde">
                                                        <input id="hasta" hidden th:value="${hasta}" name="hasta">
                                                            <button id="exportButton" onclick="startExport(event)" class="btn btn-light" type="button">
                                                                <h6 id="icono">Excel</h6>
                                                            </button>
                                                            </form>
                                                            </div>
                                                            </div>
                                                            </div>
                                                            <div class="container mb-2"> 
                                                                <div id="loadingModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); color: white; text-align: center; z-index: 1000;">
                                                                    <div style="margin-top: 20%; font-size: 20px;">
                                                                        <div class="spinner" style="margin-bottom: 20px;">
                                                                            <svg viewBox="0 0 50 50" style="width: 50px; height: 50px;">
                                                                                <circle cx="25" cy="25" r="20" fill="none" stroke-width="5" stroke="#fff" stroke-dasharray="31.4 31.4" stroke-linecap="round">
                                                                                    <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite" />
                                                                                </circle>
                                                                            </svg>
                                                                        </div>
                                                                        Exportando... Por favor, espere.
                                                                    </div>
                                                                </div>
                                                                <div class="table-responsive border border-secondary rounded">
                                                                <table class="table table-md bg-light table-hover mb-0" id="dimgray">
                                                                        <thead>
                                                                            <tr>
                                                                                <th class="text-center">Año</th>
                                                                                <th class="text-center">Mes</th>
                                                                                <th class="text-center">Viajes</th>
                                                                                <th class="text-center">Km</th>
                                                                                <th class="text-center">Diesel</th>
                                                                                <th class="text-center">Consumo</th>
                                                                                <th class="text-center">Gastos</th>
                                                                                <th class="text-center">Neto</th>
                                                                                <th class="text-center">Neto/Km</th>
                                                                            </tr>
                                                                        </thead>
                                                                        <tbody th:each="e, iter : ${estadistica}">
                                                                            <tr class="fila-alta" th:classappend="${iter.last} ? 'font-weight-bold bg-light' : ''">
                                                                                <td class="text-center" th:text="${iter.last} ? 'TOTAL' : ${e.year}"></td>
                                                                                <td class="text-center" th:text="${iter.last} ? '' : ${e.month}"></td>
                                                                                <td class="text-center" th:text="${#numbers.formatDecimal(e.flete, 0, 'POINT', 0, 'POINT')}"></td>
                                                                                <td class="text-center" th:text="${#numbers.formatDecimal(e.kmRecorrido, 0, 'POINT', 0, 'POINT')}"></td>
                                                                                <td class="text-center" th:text="${#numbers.formatDecimal(e.litro, 0, 'POINT', 0, 'POINT')}"></td>
                                                                                <td class="text-center" th:text="${#numbers.formatDecimal(e.consumo, 1, 'POINT', 1, 'COMMA')}"></td>
                                                                                <td class="text-center" th:text="'$'+${#numbers.formatDecimal(e.gasto, 0, 'POINT', 0, 'POINT')}"></td>
                                                                                <td class="text-center" th:text="'$'+${#numbers.formatDecimal(e.neto, 0, 'POINT', 0, 'COMMA')}"></td>
                                                                                <td class="text-center" th:text="'$'+${#numbers.formatDecimal(e.rentabilidad, 0, 'POINT', 0, 'POINT')}"></td>

                                                                            </tr>     
                                                                        </tbody>
                                                                    </table>
                                                                </div>
                                                                <br>
                                                                <div class="text-center mb-2">
                                                                    <a class="btn btn-primary bg-primary btn-lg w-50" type="button" th:href="@{/camion/mostrarEstadistica/__${id}__}">Volver</a>
                                                                </div>
                                                            </div>
                                                            </section>
                                                            <script>
                                                                function startExport(event) {
                                                                    event.preventDefault();

                                                                    const modal = document.getElementById('loadingModal');
                                                                    modal.style.display = 'block';

                                                                    const idCamion = document.getElementById('idCamion').value;
                                                                    const desde = document.getElementById('desde').value;
                                                                    const hasta = document.getElementById('hasta').value;

                                                                    const url = `/camion/estadisticaExporta?desde=${desde}&hasta=${hasta}&id=${idCamion}`;

                                                                    fetch(url, {method: 'POST'})
                                                                            .then(response => {
                                                                                const contentDisposition = response.headers.get('Content-Disposition');
                                                                                let fileName = 'exportacion.xlsx';

                                                                                if (contentDisposition) {
                                                                                    const match = contentDisposition.match(/filename="?([^"]+)"?/);
                                                                                    if (match && match[1]) {
                                                                                        fileName = match[1];
                                                                                    }
                                                                                }

                                                                                return response.blob().then(blob => ({blob, fileName}));
                                                                            })
                                                                            .then(({ blob, fileName }) => {
                                                                                const downloadUrl = window.URL.createObjectURL(blob);
                                                                                const a = document.createElement('a');
                                                                                a.href = downloadUrl;
                                                                                a.download = fileName;
                                                                                document.body.appendChild(a);
                                                                                a.click();
                                                                                a.remove();
                                                                            })
                                                                            .catch(error => {
                                                                                console.error('Error:', error);
                                                                                alert('Error durante la exportación.');
                                                                            })
                                                                            .finally(() => {
                                                                                modal.style.display = 'none';
                                                                            });
                                                                }

                                                            </script>
                                                            <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                            <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                            </body>
                                                            </html>

<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Chofer Estadistica</title>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
                    <link rel="stylesheet" href="/css/medidas_container.css">   
                        <style>

                            /* Estilo para pantallas md */
                            @media (max-width: 991.98px) {
                                .table {
                                    font-size: 13px;
                                }
                            }
                            /* Estilo para pantallas sm */
                            @media (max-width: 767.98px) {
                                .table {
                                    font-size: 10px;
                                }
                            }
                                                        .total-general {
                                font-weight: bold;
                                background-color: #d9d9d9;
                            }
                            .no-border {
                                border: none;
                                background: none;
                                padding: 0;
                                cursor: pointer;
                            }

                            #dimgray td {
                                padding: 6px 1px 1px 1px !important;  /* Reduce el espacio interno */
                                line-height: 1 !important; /* Ajusta la altura mínima */
                                vertical-align: middle;
                                text-align: center;
                            }
                        </style>
                        </head>
                        <body>
                            <div class="container mb-4">                           
                                <div class="card-header mb-2" style="height: 70px;">
                                    <div class="row">
                                        <div class="col-2">   
                                            <a title="Volver" th:href="@{/index}" type="button">
                                                <svg id="white" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-square-fill" viewBox="0 0 16 16">
                                                    <path d="M16 14a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2zm-4.5-6.5H5.707l2.147-2.146a.5.5 0 1 0-.708-.708l-3 3a.5.5 0 0 0 0 .708l3 3a.5.5 0 0 0 .708-.708L5.707 8.5H11.5a.5.5 0 0 0 0-1"/>
                                                </svg> 
                                            </a>   
                                        </div>
                                        <div  class="col-7">
                                            <h4>Estadísticas de Choferes</h4>
                                        </div>
                                        <div title="Exportar a Excel" class="col-3 text-center" th:if="${flag == true}">
                                            <form th:action="@{/chofer/exportarEstadisticaTodos}" method="POST">
                                                <input hidden th:value="${desde}" name="desde"> 
                                                    <input hidden th:value="${hasta}" name="hasta"> 

                                                        <button class="btn btn-light" type="submit">
                                                            <h6 id="icono">Exportar</h6> 
                                                        </button>
                                                        </form>
                                                        </div>
                                                        </div>
                                                        </div>
                                                        <div class="card-header" id="bgWhite">
                                                            <form class="row g-3" th:action="@{/chofer/mostrarEstadisticaFiltro}" method="POST">
                                                                <div class="row">    
                                                                    <div class="col-5">
                                                                        <label for="desde" class="form-label">Desde</label>
                                                                        <input type="date" class="form-control" id="desde" th:value="${desde}" name="desde" required>
                                                                    </div>
                                                                    <div class="col-5">
                                                                        <label for="hasta" class="form-label">Hasta</label>
                                                                        <input type="date" class="form-control" id="hasta" th:value="${hasta}" name="hasta" required>                                                                                              
                                                                    </div>
                                                                    <div class="col-2 text-center">
                                                                        <label for="ver" class="form-label">Ver</label>
                                                                        <button id="ver" class="btn btn-primary" type="submit">
                                                                            <svg id="white" xmlns="http://www.w3.org/2000/svg" width="18" height="24" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                                                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                                            </svg>
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            </form>   
                                                        </div>
                                                        <div th:if="${estadistica.size > 1}">
                                                            <table class="table border-secondary bg-light table-hover mb-4" id="dimgray">
                                                                <thead>
                                                                    <tr>
                                                                        <th class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 text-center">Chofer</th>
                                                                        <th class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1 text-center">Viajes</th>
                                                                        <th class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1 text-center">KM</th>
                                                                        <th class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1 text-center">Diesel</th>
                                                                        <th class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1 text-center">Consumo</th>
                                                                        <th class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 text-center">Gastos</th>
                                                                        <th class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 text-center">Neto</th>
                                                                        <th class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 text-center">Neto/Km</th>
                                                                    </tr>
                                                                </thead>
                                                                <tbody>
                                                                    <tr th:each="entry : ${estadistica}" th:classappend="${entry.key.nombre == 'TOTAL' ? 'total-general' : ''}">
                                                                        <td class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 text-center"><b><a id="dimgray" th:href="@{/chofer/estadistica/__${entry.key.id}__}" th:text="${entry.key.nombre}"></a></b></td>
                                                                        <td colspan="7">
                                                                            <table class="table table-borderless table-sm" id="dimgray">
                                                                                    <tr th:each="estadistica : ${entry.value}" th:classappend="${entry.key.nombre == 'TOTAL' ? 'total-general' : ''}">
                                                                                    <td class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1 text-center" th:text="${#numbers.formatDecimal(estadistica.flete, 0, 'POINT', 0, 'COMMA')}"></td>
                                                                                    <td class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1" th:text="${#numbers.formatDecimal(estadistica.kmRecorrido, 0, 'POINT', 0, 'COMMA')}"></td>
                                                                                    <td class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1 text-center" th:text="${#numbers.formatDecimal(estadistica.litro, 0, 'POINT', 0, 'COMMA')}"></td>
                                                                                    <td class="col-1 col-sm-1 col-md-1 col-lg-1 col-xl-1 text-center" th:text="${estadistica.consumo}"></td>
                                                                                    <td class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 text-center" th:text="'$'+${#numbers.formatDecimal(estadistica.gasto, 0, 'POINT', 0, 'COMMA')}"></td>
                                                                                    <td class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 text-center" th:text="'$'+${#numbers.formatDecimal(estadistica.neto, 0, 'POINT', 0, 'COMMA')}"></td>
                                                                                    <td class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 text-center" th:text="'$'+${#numbers.formatDecimal(estadistica.rentabilidad, 0, 'POINT', 0, 'COMMA')}"></td>
                                                                                </tr>
                                                                            </table>
                                                                        </td>
                                                                    </tr>
                                                                </tbody>
                                                            </table>
                                                            <br>
                                                                <div class="text-center mb-2">
                                                                    <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/index}">Volver</a>
                                                                </div>
                                                        </div>
                                                        <div th:if="${estadistica.size <= 1}">
                                                                <div class="card border-secondary p-4 mb-4 text-center" id="color-card">
                                                                    <h6 id="azul">No existen Estadísticas de Choferes para la fecha seleccionada</h6>
                                                                </div>
                                                                    <div class="text-center mb-2">
                                                                        <a class="btn btn-primary bg-primary btn-lg w-50" type="button" title="Volver" th:href="@{/index}">Volver</a>
                                                                    </div>
                                                        </div>
                            </div>
                                                        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
                                                        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
                                                        </body>
                                                        </html>
